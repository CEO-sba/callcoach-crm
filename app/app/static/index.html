                    </div>
                )}
            </div>
        );
    }

    // Module List View (Academy Home)
    const completedCount = progress ? progress.completed_count : 0;
    const totalModules = progress ? progress.total_modules : modules.length;
    const pct = totalModules ? Math.round((completedCount/totalModules)*100) : 0;

    return (
        <div style={{animation:'fadeIn 0.3s ease'}}>
            <h1 style={{fontSize:26,fontWeight:800,marginBottom:6}}>SBA Learning Academy</h1>
            <p style={{fontSize:14,color:'var(--text-secondary)',marginBottom:28}}>Master the SBA Sales Methodology. Module by module.</p>

            {/* Progress Overview */}
            <div className="resp-grid-4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:32}}>
                <div className="glass" style={{borderRadius:12,padding:20,textAlign:'center'}}>
                    <div style={{fontSize:32,fontWeight:800,color:'var(--gold)'}}>{completedCount}/{totalModules}</div>
                    <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Modules Done</div>
                </div>
                <div className="glass" style={{borderRadius:12,padding:20,textAlign:'center'}}>
                    <div style={{fontSize:32,fontWeight:800,color:'var(--success)'}}>{progress?.avg_quiz_score || 0}%</div>
                    <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Avg Quiz Score</div>
                </div>
                <div className="glass" style={{borderRadius:12,padding:20,textAlign:'center'}}>
                    <div style={{fontSize:32,fontWeight:800,color:'var(--info)'}}>{progress?.avg_mock_score || 0}%</div>
                    <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Avg Mock Score</div>
                </div>
                <div className="glass" style={{borderRadius:12,padding:20,textAlign:'center'}}>
                    <div style={{fontSize:32,fontWeight:800,color:'var(--warning)'}}>{progress?.earned_certifications?.length || 0}</div>
                    <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Certifications</div>
                </div>
            </div>

            {/* Progress Bar */}
            <div className="glass" style={{borderRadius:12,padding:16,marginBottom:32}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:8}}>
                    <span style={{fontWeight:600}}>Overall Progress</span>
                    <span style={{color:'var(--gold)',fontWeight:700}}>{pct}%</span>
                </div>
                <div style={{height:8,background:'rgba(255,255,255,0.06)',borderRadius:4,overflow:'hidden'}}>
                    <div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg, var(--gold), var(--gold-light))',borderRadius:4,transition:'width 0.5s ease'}}></div>
                </div>
            </div>

            {/* Category Filter */}
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}}>
                {[{id:'all',label:'All Modules'},{id:'5_phase_framework',label:'5 Phase Framework'},{id:'advanced_skills',label:'Advanced Skills'},{id:'channel_skills',label:'Channel Skills'},{id:'operations',label:'Operations'},{id:'treatment_knowledge',label:'Treatment Knowledge'},{id:'career',label:'Career'}].map(cat => (
                    <button key={cat.id} className={`btn btn-xs ${categoryFilter===cat.id?'btn-gold':'btn-ghost'}`} onClick={()=>setCategoryFilter(cat.id)}>{cat.label}</button>
                ))}
            </div>

            {/* Module Cards */}
            <div className="resp-grid-3" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
                {modules.filter(mod => categoryFilter === 'all' || mod.category === categoryFilter).map(mod => (
                    <div key={mod.id} className="glass" style={{borderRadius:12,padding:20,cursor:'pointer',transition:'all 0.2s'}} onClick={()=>openModule(mod.id)}>
                        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
                            <div style={{width:40,height:40,borderRadius:10,background:mod.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,color:mod.color}}>{mod.order}</div>
                            <div style={{flex:1}}>
                                <div style={{fontSize:15,fontWeight:700}}>{mod.title}</div>
                                <div style={{fontSize:12,color:'var(--text-muted)'}}>{mod.subtitle}</div>
                            </div>
                            <span className={`badge ${mod.status==='completed'?'badge-green':mod.status==='in_progress'?'badge-yellow':'badge-gray'}`}>{mod.status==='completed'?'Done':mod.status==='in_progress'?'In Progress':'Start'}</span>
                        </div>
                        <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.5,marginBottom:12}}>{mod.description.substring(0,120)}...</p>
                        <div style={{display:'flex',gap:8}}>
                            <span className="badge badge-gray">{mod.duration_minutes} min</span>
                            {mod.quiz_passed && <span className="badge badge-green">Quiz Passed</span>}
                            {mod.quiz_score != null && !mod.quiz_passed && <span className="badge badge-yellow">Quiz {mod.quiz_score}%</span>}
                        </div>
                    </div>
                ))}
            </div>

            {/* Training Documents Download Section */}
            <div className="glass" style={{borderRadius:16,padding:24,marginTop:24}}>
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
                    {Icons.download}
                    <h3 style={{margin:0,fontSize:18,fontWeight:700}}>Training Documents</h3>
                </div>
                <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16}}>Download companion training manuals for offline study and reference.</p>
                <a href={`${API}/learning/training-documents/SBA_Sales_Training_Manual.docx`}
                   download
                   className="btn btn-gold btn-sm"
                   style={{display:'inline-flex',alignItems:'center',gap:8,textDecoration:'none'}}>
                    {Icons.download}
                    <span>SBA Sales Training Manual (.docx)</span>
                </a>
            </div>
        </div>
    );
};

                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                        {reports.map(r => (
                            <div key={r.id} className="table-row" style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>setCurrent(r)}>
                                <div>
                                    <div style={{fontWeight:600,fontSize:14}}>Week of {new Date(r.week_start).toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata'})}</div>
                                    <div style={{fontSize:12,color:'var(--text-muted)'}}>{r.total_calls} calls analyzed</div>
                                </div>
                                <div style={{display:'flex',gap:12,alignItems:'center'}}>
                                    <span style={{fontSize:14,fontWeight:600,color:'var(--gold)'}}>{(r.avg_score||0).toFixed(1)}</span>
                                    <span className="badge badge-green">{(r.conversion_rate||0).toFixed(1)}%</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            )}
        </div>
    );
};

// ============ WHATSAPP INBOX PAGE ============
const WhatsAppInboxPage = () => {
    const [conversations, setConversations] = useState([]);
    const [selected, setSelected] = useState(null);
    const [messages, setMessages] = useState([]);
    const [newMsg, setNewMsg] = useState('');
    const [loading, setLoading] = useState(true);
    const [filter, setFilter] = useState('');
    const [sending, setSending] = useState(false);
    const msgEnd = useRef(null);

    useEffect(() => { loadConversations(); }, []);
    useEffect(() => { if (msgEnd.current) msgEnd.current.scrollIntoView({behavior:'smooth'}); }, [messages]);

    const loadConversations = async () => {
        setLoading(true);
        try {
            const data = await apiFetch('/whatsapp/conversations');
            setConversations(data);
        } catch(e) { console.error(e); }
        setLoading(false);
    };

    const selectConvo = async (convo) => {
        setSelected(convo);
        try {
            const detail = await apiFetch(`/whatsapp/conversations/${convo.id}`);
            setMessages(detail.messages || []);
        } catch(e) { console.error(e); }
    };

    const sendMessage = async () => {
        if (!newMsg.trim() || !selected) return;
        setSending(true);
        try {
            await apiFetch(`/whatsapp/conversations/${selected.id}/send`, { method:'POST', body:{content:newMsg} });
            setNewMsg('');
            const detail = await apiFetch(`/whatsapp/conversations/${selected.id}`);
            setMessages(detail.messages || []);
            loadConversations();
        } catch(e) { console.error(e); }
        setSending(false);
    };

    const toggleAI = async () => {
        if (!selected) return;
        try {
            const res = await apiFetch(`/whatsapp/conversations/${selected.id}/toggle-ai`, {method:'POST'});
            setSelected({...selected, is_ai_handling: res.is_ai_handling, status: res.status});
            loadConversations();
        } catch(e) { console.error(e); }
    };

    const filtered = conversations.filter(c => !filter || (c.contact_name||'').toLowerCase().includes(filter.toLowerCase()) || (c.wa_phone||'').includes(filter));

    const timeAgo = (dt) => {
        if (!dt) return '';
        const diff = (Date.now() - new Date(dt).getTime()) / 1000;
        if (diff < 60) return 'now';
        if (diff < 3600) return Math.floor(diff/60) + 'm';
        if (diff < 86400) return Math.floor(diff/3600) + 'h';
        return Math.floor(diff/86400) + 'd';
    };

    return (
        <div className="fade-in">
            <h1 className="page-title" style={{fontSize:24,fontWeight:700,marginBottom:24}}>WhatsApp Inbox</h1>
            <div style={{display:'flex',gap:16,height:'calc(100vh - 140px)'}}>
                {/* Conversation List */}
                <div className="glass" style={{width:340,borderRadius:12,display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
                    <div style={{padding:12,borderBottom:'1px solid var(--border)'}}>
                        <input className="input" placeholder="Search conversations..." value={filter} onChange={e=>setFilter(e.target.value)} style={{fontSize:13}}/>
                    </div>
                    <div style={{flex:1,overflowY:'auto'}} className="scrollbar-hide">
                        {loading ? <div style={{padding:24,textAlign:'center'}}><span className="spinner"></span></div> : filtered.length === 0 ? <div style={{padding:24,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No conversations yet</div> : filtered.map(c => (
                            <div key={c.id} onClick={()=>selectConvo(c)} style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',cursor:'pointer',background:selected?.id===c.id?'rgba(232,135,37,0.08)':'transparent',transition:'background 0.15s'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                                    <span style={{fontWeight:600,fontSize:14,color:'var(--text-primary)'}}>{c.contact_name || c.wa_phone}</span>
                                    <span style={{fontSize:11,color:'var(--text-muted)'}}>{timeAgo(c.last_message_at)}</span>
                                </div>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                    <span style={{fontSize:12,color:'var(--text-secondary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}>{c.last_message_preview || 'No messages'}</span>
                                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                                        {c.unread_count > 0 && <span style={{background:'var(--success)',color:'#000',fontSize:10,fontWeight:700,borderRadius:10,padding:'1px 6px',minWidth:18,textAlign:'center'}}>{c.unread_count}</span>}
                                        {c.is_ai_handling && <span style={{fontSize:10,color:'var(--info)',fontWeight:600}}>AI</span>}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
                {/* Chat Area */}
                <div className="glass" style={{flex:1,borderRadius:12,display:'flex',flexDirection:'column',overflow:'hidden'}}>
                    {!selected ? (
                        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)',fontSize:14}}>Select a conversation to start chatting</div>
                    ) : (
                        <>
                            <div style={{padding:'12px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                <div>
                                    <span style={{fontWeight:600,fontSize:15}}>{selected.contact_name || selected.wa_phone}</span>
                                    <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:12}}>{selected.wa_phone}</span>
                                </div>
                                <div style={{display:'flex',gap:8}}>
                                    <button className={`btn btn-xs ${selected.is_ai_handling?'btn-ghost':'btn-ghost'}`} onClick={toggleAI} style={{fontSize:11}}>
                                        {selected.is_ai_handling ? 'AI Active' : 'Manual'}
                                    </button>
                                    <span className={`badge ${selected.status==='active'?'badge-green':selected.status==='handed_off'?'badge-yellow':'badge-gray'}`}>{selected.status}</span>
                                </div>
                            </div>
                            <div style={{flex:1,overflowY:'auto',padding:20,display:'flex',flexDirection:'column',gap:8}} className="scrollbar-hide">
                                {messages.map(m => (
                                    <div key={m.id} style={{display:'flex',justifyContent:m.direction==='outbound'?'flex-end':'flex-start'}}>
                                        <div style={{maxWidth:'70%',padding:'10px 14px',borderRadius:12,fontSize:13,lineHeight:1.6,background:m.direction==='outbound'?'rgba(59,130,246,0.15)':'rgba(255,255,255,0.05)',border:'1px solid '+(m.direction==='outbound'?'rgba(59,130,246,0.2)':'var(--border)'),color:'var(--text-primary)'}}>
                                            {m.sender_type==='ai_employee' && <div style={{fontSize:10,color:'var(--info)',fontWeight:600,marginBottom:4}}>AI Employee</div>}
                                            {m.content}
                                            <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4,textAlign:'right'}}>{new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} {m.status==='read'?'Read':'Sent'}</div>
                                        </div>
                                    </div>
                                ))}
                                <div ref={msgEnd}/>
                            </div>
                            <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',display:'flex',gap:8}}>
                                <input className="input" placeholder="Type a message..." value={newMsg} onChange={e=>setNewMsg(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendMessage()} style={{flex:1,fontSize:13}}/>
                                <button className="btn btn-gold btn-sm" onClick={sendMessage} disabled={sending}>{sending?<span className="spinner"></span>:Icons.send}</button>
                            </div>
                        </>
                    )}
                </div>
            </div>
        </div>
    );
};

    useEffect(() => { loadConfig(); }, []);

        setSaving(false);
    };

    const updateField = (field, value) => setConfig({...config, [field]: value});

    const updateProcedure = (i, field, val) => {
        const procs = [...(config.procedures_offered||[])];

    };
    const removeProcedure = (i) => {
        const procs = [...(config.procedures_offered||[])];

        setConfig({...config, procedures_offered: procs});
    };

    const testAI = async () => {
        if (!testMsg) return;
        setTesting(true); setTestReply('');
        try {
            const res = await apiFetch('/whatsapp/test-ai', {method:'POST', body:{message:testMsg}});

// ============ LEADS PAGE ============
const LeadsPage = () => {
    const [leads, setLeads] = useState([]);
    const [loading, setLoading] = useState(true);
    const [filter, setFilter] = useState({status:'',source:'',search:''});
    const [stats, setStats] = useState(null);

    useEffect(() => { loadLeads(); loadStats(); }, [filter.status, filter.source]);

    const loadLeads = async () => {
        setLoading(true);
        let url = '/leads?limit=100';
        if (filter.status) url += `&status=${filter.status}`;
        if (filter.source) url += `&source=${filter.source}`;
        if (filter.search) url += `&search=${filter.search}`;
        try { setLeads(await apiFetch(url)); } catch(e) { console.error(e); }
        setLoading(false);
    };

    const loadStats = async () => {
        try { setStats(await apiFetch('/leads/stats')); } catch(e) {}
    };

    const searchLeads = () => loadLeads();

    const statusColors = {new:'badge-blue',contacted:'badge-yellow',qualified:'badge-gold',consultation_booked:'badge-green',converted:'badge-green',lost:'badge-red'};

    return (
        <div className="fade-in">
            <h1 className="page-title" style={{fontSize:24,fontWeight:700,marginBottom:24}}>Leads</h1>

            {stats && (
                <div className="stat-card-row" style={{display:'flex',gap:16,marginBottom:24,flexWrap:'wrap'}}>
                    <StatCard label="Total Leads" value={stats.total || 0}/>
                    <StatCard label="New" value={stats.by_status?.new || 0} accent="var(--info)"/>
                    <StatCard label="Qualified" value={stats.by_status?.qualified || 0} accent="var(--gold)"/>
                    <StatCard label="Converted" value={stats.by_status?.converted || 0} accent="var(--success)"/>
                    <StatCard label="Avg Score" value={stats.average_score || 0} accent="var(--warning)"/>

                <select className="input" value={filter.status} onChange={e=>setFilter({...filter,status:e.target.value})} style={{maxWidth:160,fontSize:13}}>
                    <option value="">All Status</option><option value="new">New</option><option value="contacted">Contacted</option><option value="qualified">Qualified</option><option value="consultation_booked">Consultation Booked</option><option value="converted">Converted</option><option value="lost">Lost</option>
                </select>
                <select className="input" value={filter.source} onChange={e=>setFilter({...filter,source:e.target.value})} style={{maxWidth:160,fontSize:13}}>
                    <option value="">All Sources</option><option value="whatsapp">WhatsApp</option><option value="form_google">Google Form</option><option value="form_meta">Meta Form</option><option value="meta_lead_form">Meta Lead Form</option><option value="call">Call</option><option value="walk_in">Walk-in</option><option value="manual">Manual</option>
                </select>
                <button className="btn btn-ghost btn-sm" onClick={searchLeads}>{Icons.search} Search</button>
            </div>
            {/* Table */}
            <div className="glass" style={{borderRadius:12,overflow:'hidden'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                    <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                        <th style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase'}}>Name</th>
                        <th style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase'}}>Phone</th>
                        <th style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase'}}>Source</th>
                        <th style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase'}}>Procedure</th>
                        <th style={{padding:'12px 16px',textAlign:'center',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase'}}>Score</th>
                        <th style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase'}}>Status</th>
                        <th style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase'}}>Date</th>
                    </tr></thead>
                    <tbody>
                        {loading ? <tr><td colSpan={7} style={{padding:24,textAlign:'center'}}><span className="spinner"></span></td></tr> :
                        leads.length === 0 ? <tr><td colSpan={7} style={{padding:24,textAlign:'center',color:'var(--text-muted)'}}>No leads found</td></tr> :
                        leads.map(l => (
                            <tr key={l.id} className="table-row" style={{borderBottom:'1px solid var(--border)'}}>
                                <td style={{padding:'10px 16px',fontWeight:500}}>{l.name || 'Unknown'}</td>
                                <td style={{padding:'10px 16px',color:'var(--text-secondary)'}}>

                                </td>
                                <td style={{padding:'10px 16px'}}><span className="badge badge-gray">{l.source}</span></td>
                                <td style={{padding:'10px 16px',color:'var(--text-secondary)',fontSize:12}}>{l.procedure_interest || '-'}</td>
                                <td style={{padding:'10px 16px',textAlign:'center'}}><span style={{fontWeight:700,color:l.lead_score>=70?'var(--success)':l.lead_score>=40?'var(--warning)':'var(--text-muted)'}}>{l.lead_score}</span></td>
                                <td style={{padding:'10px 16px'}}><span className={`badge ${statusColors[l.status]||'badge-gray'}`}>{l.status}</span></td>
                                <td style={{padding:'10px 16px',color:'var(--text-muted)',fontSize:12}}>{l.created_at ? new Date(l.created_at).toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata'}) : '-'}</td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        </div>
    );
};

// ============ NURTURE SEQUENCES PAGE ============
const NurturePage = () => {
    const [sequences, setSequences] = useState([]);
    const [loading, setLoading] = useState(true);
    const [selected, setSelected] = useState(null);
    const [seeding, setSeeding] = useState(false);
    const [showCreate, setShowCreate] = useState(false);
    const [generating, setGenerating] = useState(false);
    const [createForm, setCreateForm] = useState({procedure_name:'',procedure_description:'',clinic_name:'',doctor_name:'',tone:'warm, professional, educational',language:'English'});
    const [nurtureTab, setNurtureTab] = useState('all');

    useEffect(() => { loadSequences(); }, []);

    const loadSequences = async () => {
        setLoading(true);
        try {
            const data = await apiFetch('/nurture/sequences');
            setSequences(Array.isArray(data) ? data : []);
        } catch(e) { console.error(e); }
        setLoading(false);
    };

    const viewSequence = async (seq) => {
        try {
            const detail = await apiFetch(`/nurture/sequences/${seq.id}`);
            setSelected(detail);
        } catch(e) { console.error(e); }
    };

    const toggleSequence = async (id, e) => {
        if(e) e.stopPropagation();
        try {
            await apiFetch(`/nurture/sequences/${id}/toggle`, {method:'PUT'});
            loadSequences();
        } catch(e) { console.error(e); }
    };

    const deleteSequence = async (id, e) => {
        if(e) e.stopPropagation();
        if(!confirm('Delete this sequence? Active enrollments will be cancelled.')) return;
        try {
            await apiFetch(`/nurture/sequences/${id}`, {method:'DELETE'});
            loadSequences();
        } catch(e) { console.error(e); }
    };

    const seedTemplates = async () => {
        setSeeding(true);
        try {
            const res = await apiFetch('/nurture/seed-templates', {method:'POST'});
            alert(`Templates seeded! ${res.template_count} templates available.`);
            loadSequences();
        } catch(e) { console.error(e); }
        setSeeding(false);
    };

    const generateAISequence = async () => {
        if(!createForm.procedure_name.trim()) return alert('Enter a procedure name');
        setGenerating(true);
        try {
            const res = await apiFetch('/nurture/generate-sequence', {method:'POST', body:createForm});
            alert(`${res.message}`);
            setShowCreate(false);
            setCreateForm({procedure_name:'',procedure_description:'',clinic_name:'',doctor_name:'',tone:'warm, professional, educational',language:'English'});
            loadSequences();
            // Auto-view the new sequence
            if(res.sequence_id) {
                const detail = await apiFetch(`/nurture/sequences/${res.sequence_id}`);
                setSelected(detail);
            }
        } catch(e) {
            alert('Generation failed: ' + (e.message || 'Try again'));
        }
        setGenerating(false);
    };

    const filteredSeqs = nurtureTab === 'all' ? sequences : nurtureTab === 'templates' ? sequences.filter(s=>s.is_template) : sequences.filter(s=>!s.is_template);

    // Detail view
    if (selected) {
        const steps = selected.steps || [];
        return (
            <div className="fade-in">
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24,flexWrap:'wrap'}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>setSelected(null)}>{Icons.back} Back</button>
                    <h1 style={{fontSize:20,fontWeight:700,flex:1,minWidth:200}}>{selected.name}</h1>
                    <span className={`badge ${selected.is_active?'badge-green':'badge-red'}`}>{selected.is_active?'Active':'Inactive'}</span>
                    {selected.is_template && <span className="badge badge-blue">Template</span>}
                    <button className="btn btn-sm" style={{background:selected.is_active?'var(--error)':'var(--success)',color:'#fff',fontSize:11,padding:'4px 12px',borderRadius:6}} onClick={()=>{toggleSequence(selected.id);setSelected({...selected,is_active:!selected.is_active});}}>
                        {selected.is_active ? 'Deactivate' : 'Activate'}
                    </button>
                </div>
                <div className="glass" style={{padding:20,borderRadius:12,marginBottom:16}}>
                    <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:8}}>{selected.description}</div>
                    <div style={{fontSize:12,color:'var(--text-muted)'}}>Category: {selected.procedure_category || 'General'} | Steps: {selected.total_steps} | Trigger: {selected.trigger_type}</div>
                    <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>Duration: ~{Math.round((steps.length > 0 ? Math.max(...steps.map(s=>s.delay_hours||0)) : 0) / 24)} days | WhatsApp automated delivery via background scheduler</div>
                </div>
                <h3 style={{fontSize:16,fontWeight:600,marginBottom:12}}>Messages ({steps.length})</h3>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {steps.map((step, i) => {
                        const dayNum = Math.round((step.delay_hours||0)/24);
                        const weekNum = Math.round(dayNum/7);
                        const monthNum = Math.round(dayNum/30);
                        const timing = step.delay_hours === 0 ? 'Day 0 (Immediately)' : monthNum >= 2 ? `Month ${monthNum} (Day ${dayNum})` : weekNum >= 1 ? `Week ${weekNum} (Day ${dayNum})` : `Day ${dayNum}`;
                        return (
                            <div key={step.id || i} className="glass" style={{padding:14,borderRadius:10}}>
                                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,flexWrap:'wrap',gap:6}}>
                                    <span style={{fontWeight:600,fontSize:13,color:'var(--gold)'}}>#{step.step_number} {timing}</span>
                                    <span style={{fontSize:11,color:'var(--text-muted)'}}>
                                        {step.channel} {step.is_ai_generated && ' | AI personalized at send'}
                                    </span>
                                </div>
                                <div style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',background:'rgba(255,255,255,0.02)',padding:12,borderRadius:8,border:'1px solid var(--border)'}}>{step.message_template}</div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    }

    // Create modal
    if (showCreate) {
        return (
            <div className="fade-in">
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>setShowCreate(false)}>{Icons.back} Back</button>
                    <h1 style={{fontSize:22,fontWeight:700}}>Create Custom Nurture Sequence</h1>
                </div>
                <div className="glass" style={{padding:24,borderRadius:14,maxWidth:700}}>
                    <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:20,lineHeight:1.6}}>AI will generate a complete 60-message nurture sequence spread over 12 months for your procedure. Messages are optimized for WhatsApp and include education, social proof, objection handling, and re-engagement.</p>
                    <div style={{display:'flex',flexDirection:'column',gap:14}}>
                        <div>
                            <label style={{fontSize:12,fontWeight:600,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Procedure Name *</label>
                            <input style={{width:'100%',padding:'10px 14px',background:'var(--bg-secondary)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-primary)',fontSize:14}} placeholder="e.g. Hair Transplant FUE, Botox, Rhinoplasty, Dental Implants" value={createForm.procedure_name} onChange={e=>setCreateForm({...createForm,procedure_name:e.target.value})}/>
                        </div>
                        <div>

    }

    // Main list view
    const nTabs = [{id:'all',label:`All (${sequences.length})`},{id:'templates',label:'Pre-built'},{id:'custom',label:'Custom'}];

                    <p style={{fontSize:13,color:'var(--text-muted)',marginTop:4}}>12-month WhatsApp nurture automation. 60 messages per procedure.</p>

                    <button className="btn btn-ghost" onClick={seedTemplates} disabled={seeding}>{seeding ? <span className="spinner"></span> : 'Seed Templates'}</button>
                </div>
            </div>
            <div style={{display:'flex',gap:0,borderBottom:'1px solid var(--border)',marginBottom:20}}>
                {nTabs.map(t=>(
                    <button key={t.id} onClick={()=>setNurtureTab(t.id)} style={{padding:'10px 20px',background:'none',border:'none',borderBottom:nurtureTab===t.id?'2px solid var(--gold)':'2px solid transparent',color:nurtureTab===t.id?'var(--gold)':'var(--text-muted)',fontSize:13,fontWeight:600,cursor:'pointer'}}>{t.label}</button>
                ))}
            </div>
            {loading ? <div style={{padding:40,textAlign:'center'}}><span className="spinner"></span></div> : filteredSeqs.length === 0 ? (
                <div className="glass" style={{padding:40,borderRadius:12,textAlign:'center'}}>
                    <p style={{fontSize:15,color:'var(--text-muted)',marginBottom:16}}>{nurtureTab==='custom'?'No custom sequences yet. Create one with AI.':'No nurture sequences yet. Seed pre-built templates or create a custom one.'}</p>
                    <div style={{display:'flex',gap:12,justifyContent:'center'}}>
                        <button className="btn btn-gold" onClick={()=>setShowCreate(true)}>+ Create Custom Procedure</button>
                        {nurtureTab !== 'custom' && <button className="btn btn-ghost" onClick={seedTemplates} disabled={seeding}>{seeding ? <span className="spinner"></span> : 'Seed 25+ Templates'}</button>}
                    </div>
                </div>
            ) : (
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))',gap:14}}>
                    {filteredSeqs.map(seq => (
                        <div key={seq.id} className="glass" style={{padding:18,borderRadius:12,cursor:'pointer',position:'relative'}} onClick={()=>viewSequence(seq)}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:6}}>
                                <h3 style={{fontSize:14,fontWeight:600,color:'var(--text-primary)',flex:1,paddingRight:8}}>{seq.name}</h3>
                                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                                    <span className={`badge ${seq.is_active?'badge-green':'badge-red'}`} style={{fontSize:10}}>{seq.is_active?'Active':'Off'}</span>
                                    <button onClick={(e)=>toggleSequence(seq.id,e)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,padding:2}} title={seq.is_active?'Deactivate':'Activate'}>{seq.is_active?'||':'>'}</button>
                                    {!seq.is_template && <button onClick={(e)=>deleteSequence(seq.id,e)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--error)',padding:2}} title="Delete">x</button>}
                                </div>
                            </div>
                            <p style={{fontSize:12,color:'var(--text-secondary)',marginBottom:8,lineHeight:1.5}}>{(seq.description||'').slice(0,120)}{(seq.description||'').length>120?'...':''}</p>
                            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                                {seq.procedure_category && <span className="badge badge-gold" style={{fontSize:10}}>{seq.procedure_category.replace(/_/g,' ')}</span>}
                                <span className="badge badge-gray" style={{fontSize:10}}>{seq.total_steps} msgs</span>
                                {seq.is_template ? <span className="badge badge-blue" style={{fontSize:10}}>Pre-built</span> : <span className="badge" style={{fontSize:10,background:'rgba(212,175,55,0.15)',color:'var(--gold)'}}>AI Custom</span>}
                            </div>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
};

    useEffect(() => { loadSettings(); loadTelephony(); if(canManageTeam) { loadTeam(); loadDistribution(); } }, []);

    };

    const addTeamMember = async () => {
        if (!memberForm.full_name || !memberForm.email || !memberForm.password) { alert('Please fill all fields'); return; }

        try {
            const res = await apiFetch('/auth/team', {method:'POST', body:memberForm});

            setMemberForm({full_name:'',email:'',password:'',role:'agent'});
            setShowAddMember(false);
            alert('Team member added successfully!');
        } catch(e) { alert(e.message || 'Error adding team member'); }
        setAddingMember(false);
    };

    const updateTeamMember = async (userId) => {
        try {
            const body = {};
            if (editForm.full_name) body.full_name = editForm.full_name;
            if (editForm.role) body.role = editForm.role;
            if (editForm.is_active !== undefined) body.is_active = editForm.is_active;
            if (editForm.allowed_tabs !== undefined) body.allowed_tabs = editForm.allowed_tabs;

            setTeamMembers(prev => prev.map(m => m.id === userId ? res : m));
            setEditingMember(null);
            alert('Team member updated');
        } catch(e) { alert(e.message || 'Error updating'); }

    // Smart URL parser for social accounts
    const parseSocialUrl = (url) => {
        const u = url.trim().toLowerCase();
        const patterns = [
            {platform:'instagram', regex:/(?:instagram\.com|instagr\.am)\/([^\/\?]+)/i},
            {platform:'facebook', regex:/(?:facebook\.com|fb\.com)\/([^\/\?]+)/i},
            {platform:'youtube', regex:/(?:youtube\.com)\/(?:@|channel\/|c\/|user\/)([^\/\?]+)/i},
            {platform:'linkedin', regex:/linkedin\.com\/(?:in|company)\/([^\/\?]+)/i},
            {platform:'twitter', regex:/(?:twitter\.com|x\.com)\/([^\/\?]+)/i},
            {platform:'tiktok', regex:/tiktok\.com\/@?([^\/\?]+)/i},
        ];
        for (const p of patterns) {
            const m = url.match(p.regex);
            if (m) return {platform:p.platform, username:m[1].replace(/^@/,''), url:url.trim()};
        }
        return null;
    };

    const handleSmartSocialInput = (val) => {

                        const totalPct = agentRules.reduce((s,r) => s + r.percentage, 0);

                            const num = Math.max(0, Math.min(100, parseInt(val) || 0));
                            setDistRules(prev => {
                                const others = prev.filter(r => !(r.channel === distChannel && r.agent_id === agentId));

                            });

// ============ UNIFIED INBOX PAGE ============
const UnifiedInboxPage = () => {
    const [conversations, setConversations] = useState([]);
    const [stats, setStats] = useState(null);
    const [selected, setSelected] = useState(null);
    const [messages, setMessages] = useState([]);
    const [newMsg, setNewMsg] = useState('');
    const [filter, setFilter] = useState('all');
    const [loading, setLoading] = useState(true);
    const [sending, setSending] = useState(false);
    const [aiLoading, setAiLoading] = useState(false);

    useEffect(() => {
        Promise.all([
            apiFetch('/inbox/conversations').catch(()=>[]),
            apiFetch('/inbox/stats').catch(()=>null)
        ]).then(([convos, s]) => { const arr = Array.isArray(convos?.conversations) ? convos.conversations : Array.isArray(convos) ? convos : []; setConversations(arr); setStats(s); setLoading(false); });
    }, []);

    const selectConvo = async (convo) => {
        setSelected(convo);
        try {
            const detail = await apiFetch(`/inbox/conversations/${convo.id}`);
            setMessages(detail.messages || []);
        } catch(e) { setMessages([]); }
    };

    const sendMessage = async () => {
        if(!newMsg.trim() || !selected) return;
        setSending(true);
        try {
            const resp = await apiFetch(`/inbox/conversations/${selected.id}/messages`, { method:'POST', body:{ content:newMsg, channel: selected.platform || 'whatsapp' }});
            setMessages(prev => [...prev, resp]);
            setNewMsg('');
        } catch(e) { alert('Failed to send message: ' + (e.message || 'Check your connection and try again')); }
        setSending(false);
    };

    const generateAiReply = async () => {
        if(!selected) return;
        setAiLoading(true);
        try {
            const resp = await apiFetch(`/inbox/conversations/${selected.id}/ai-reply`, { method:'POST' });
            if(resp.suggested_reply) setNewMsg(resp.suggested_reply);
        } catch(e) { alert('AI reply generation failed: ' + (e.message || 'Check your API key in Settings')); }
        setAiLoading(false);
    };

    const filtered = filter === 'all' ? conversations : conversations.filter(c => c.platform === filter);
    const platformIcons = {whatsapp:'\uD83D\uDCAC', instagram:'\uD83D\uDCF8', facebook:'\uD83D\uDC4D', linkedin:'\uD83D\uDD17', x:'\uD835\uDD4F', email:'\u2709\uFE0F'};
    const timeAgo = (d) => { if(!d) return ''; const diff = Date.now() - new Date(d).getTime(); const mins = Math.floor(diff/60000); if(mins<60) return mins+'m'; const hrs = Math.floor(mins/60); if(hrs<24) return hrs+'h'; return Math.floor(hrs/24)+'d'; };

    return (
        <div className="fade-in">
            <h1 className="page-title" style={{fontSize:24,fontWeight:700,marginBottom:20}}>Unified Inbox</h1>
            {stats && <div className="resp-grid-4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
                {[{label:'Total Conversations',value:stats.total_conversations||0},{label:'Unread',value:stats.unread_count||0},{label:'AI Handled',value:stats.ai_handled||0},{label:'Avg Response',value:stats.avg_response_time||'N/A'}].map(s=>(
                    <div key={s.label} className="glass" style={{padding:14,borderRadius:10}}>
                        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:6}}>{s.label}</div>
                        <div style={{fontSize:22,fontWeight:700,color:'var(--gold)'}}>{s.value}</div>
                    </div>
                ))}
            </div>}
            <div style={{display:'flex',gap:16,height:'calc(100vh - '+(stats?'240':'140')+'px)'}}>
                <div className="glass" style={{width:320,borderRadius:12,display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
                    <div style={{padding:12,borderBottom:'1px solid var(--border)',display:'flex',gap:8,flexWrap:'wrap'}}>
                        {['all','whatsapp','instagram','facebook','email'].map(p => (
                            <button key={p} onClick={()=>setFilter(p)} className={filter===p?'btn btn-gold':'btn btn-ghost'} style={{fontSize:11,padding:'4px 10px'}}>
                                {p.charAt(0).toUpperCase() + p.slice(1)}
                            </button>
                        ))}
                    </div>
                    <div style={{flex:1,overflowY:'auto',overflowX:'hidden'}} className="scrollbar-hide">
                        {loading ? <div style={{padding:20,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>Loading...</div> : filtered.length===0 ? <div style={{padding:20,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No conversations</div> : filtered.map(c => (
                            <div key={c.id} onClick={()=>selectConvo(c)} style={{padding:12,borderBottom:'1px solid var(--border)',cursor:'pointer',background:selected?.id===c.id?'rgba(232,135,37,0.08)':'transparent',transition:'all 0.2s'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:6}}>
                                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                                        <span style={{fontSize:16}}>{platformIcons[c.platform]||'\uD83D\uDCAC'}</span>
                                        <span style={{fontWeight:600,fontSize:13,color:'var(--text-primary)'}}>{c.contact_name||c.lead_name||'Unknown'}</span>
                                    </div>
                                    <span style={{fontSize:11,color:'var(--text-muted)'}}>{timeAgo(c.last_message_at||c.updated_at)}</span>
                                </div>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                    <span style={{fontSize:12,color:'var(--text-secondary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}>{c.last_message||c.subject||''}</span>
                                    {(c.unread_count>0||c.unread) && <span className="badge badge-gold" style={{fontSize:10}}>NEW</span>}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
                <div className="glass" style={{flex:1,borderRadius:12,display:'flex',flexDirection:'column',overflow:'hidden'}}>
                    {!selected ? (
                        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)'}}>Select a conversation to start</div>
                    ) : (
                        <>
                            <div style={{padding:'12px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                <div>
                                    <span style={{fontWeight:600,fontSize:14}}>{selected.contact_name||selected.lead_name||'Unknown'}</span>
                                    <span className="badge" style={{marginLeft:10,fontSize:10}}>{platformIcons[selected.platform]||''} {selected.platform}</span>
                                </div>
                                <div style={{display:'flex',gap:8}}>
                                    <span className={`badge ${selected.status==='active'?'badge-green':selected.status==='handed_off'?'badge-yellow':'badge-gray'}`} style={{fontSize:10}}>{selected.status||'active'}</span>
                                </div>
                            </div>
                            <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:10}} className="scrollbar-hide">
                                {messages.length===0 ? <div style={{textAlign:'center',color:'var(--text-muted)',fontSize:13,marginTop:40}}>No messages yet</div> : messages.map((m,i) => (
                                    <div key={m.id||i} style={{display:'flex',justifyContent:(m.direction==='outbound'||m.sender_type==='agent'||m.sender_type==='ai_employee')?'flex-end':'flex-start'}}>
                                        <div style={{maxWidth:'65%',padding:'10px 14px',borderRadius:10,fontSize:13,background:(m.direction==='outbound'||m.sender_type==='agent'||m.sender_type==='ai_employee')?'rgba(59,130,246,0.15)':'rgba(255,255,255,0.05)',border:'1px solid '+((m.direction==='outbound'||m.sender_type==='agent'||m.sender_type==='ai_employee')?'rgba(59,130,246,0.2)':'var(--border)'),color:'var(--text-primary)'}}>
                                            {m.sender_type==='ai_employee' && <div style={{fontSize:10,color:'var(--gold)',marginBottom:4}}>AI Employee</div>}
                                            {m.content}<div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>{m.created_at ? new Date(m.created_at).toLocaleTimeString() : ''}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div style={{padding:12,borderTop:'1px solid var(--border)',display:'flex',gap:8}}>
                                <button className="btn btn-ghost" onClick={generateAiReply} disabled={aiLoading} style={{fontSize:11,whiteSpace:'nowrap'}}>{aiLoading?'Thinking...':'AI Reply'}</button>
                                <input className="input" placeholder="Type message..." value={newMsg} onChange={e=>setNewMsg(e.target.value)} onKeyPress={e=>e.key==='Enter'&&sendMessage()} style={{flex:1,fontSize:13}}/>
                                <button className="btn btn-gold" onClick={sendMessage} disabled={sending} style={{fontSize:12}}>{sending?'...':'Send'}</button>
                            </div>
                        </>
                    )}
                </div>
            </div>
        </div>
    );
};

const HiringPage = () => {
    const [tab, setTab] = useState('positions');
    const [dashboard, setDashboard] = useState(null);
    const [positions, setPositions] = useState([]);
    const [candidates, setCandidates] = useState([]);
    const [loading, setLoading] = useState(true);
    const [showAddPosition, setShowAddPosition] = useState(false);
    const [showAddCandidate, setShowAddCandidate] = useState(false);
    const [newPosition, setNewPosition] = useState({title:'',department:'',salary_range:'',description:'',requirements:''});
    const [newCandidate, setNewCandidate] = useState({name:'',email:'',phone:'',position_id:'',source:'',resume_text:''});
    const [genJdLoading, setGenJdLoading] = useState(null);
    const [evalLoading, setEvalLoading] = useState(null);

    const loadData = () => {
        setLoading(true);
        Promise.all([
            apiFetch('/hiring/dashboard').catch(()=>null),
            apiFetch('/hiring/positions').catch(()=>[]),
            apiFetch('/hiring/candidates').catch(()=>[])
        ]).then(([d, p, c]) => { setDashboard(d); const posArr = Array.isArray(p?.positions) ? p.positions : Array.isArray(p) ? p : []; setPositions(posArr); const canArr = Array.isArray(c?.candidates) ? c.candidates : Array.isArray(c) ? c : []; setCandidates(canArr); setLoading(false); });
    };
    useEffect(loadData, []);

    const createPosition = async () => {
        try {
            await apiFetch('/hiring/positions', { method:'POST', body:newPosition });
            setShowAddPosition(false); setNewPosition({title:'',department:'',salary_range:'',description:'',requirements:''});
            loadData();
        } catch(e) { alert('Failed to create position: ' + (e.message || 'Please check all fields and try again')); }
    };

    const addCandidate = async () => {
        try {
            await apiFetch('/hiring/candidates', { method:'POST', body:newCandidate });
            setShowAddCandidate(false); setNewCandidate({name:'',email:'',phone:'',position_id:'',source:'',resume_text:''});

        } catch(e) { alert('Failed to add candidate: ' + (e.message || 'Please check all fields and try again')); }

            loadData();

            await apiFetch(`/hiring/candidates/${candId}/ai-evaluate`, { method:'POST' });

                {tab==='positions' && (
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
                        {positions.map(p => (
                            <div key={p.id} style={{padding:16,border:'1px solid var(--border)',borderRadius:10,background:'rgba(255,255,255,0.02)'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:12}}>

                                    <span className="badge badge-gray" style={{fontSize:11}}>{p.department}</span></div>

                                </div>
                                <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:10}}>{p.salary_range ? '\u20B9' + p.salary_range : 'Not set'}</div>
                                <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{p.candidate_count||0} candidates</div>
                                <button className="btn btn-ghost" onClick={()=>generateJD(p.id)} disabled={genJdLoading===p.id} style={{fontSize:11}}>{genJdLoading===p.id?'Generating...':'Generate JD'}</button>
                            </div>
                        ))}
                        <div style={{padding:40,border:'2px dashed var(--border)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <button className="btn btn-gold" onClick={()=>setShowAddPosition(true)} style={{fontSize:13}}>+ Add Position</button>
                        </div>
                    </div>
                )}
                {tab==='candidates' && (
                    <>
                        <button className="btn btn-gold" onClick={()=>setShowAddCandidate(true)} style={{fontSize:12,marginBottom:12}}>+ Add Candidate</button>
                        <div style={{overflowX:'auto'}}>
                            <table style={{width:'100%',fontSize:13}}>
                                <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                                    <th style={{textAlign:'left',padding:12,fontWeight:600,color:'var(--text-secondary)'}}>Name</th>
                                    <th style={{textAlign:'left',padding:12,fontWeight:600,color:'var(--text-secondary)'}}>Position</th>
                                    <th style={{textAlign:'left',padding:12,fontWeight:600,color:'var(--text-secondary)'}}>Status</th>
                                    <th style={{textAlign:'left',padding:12,fontWeight:600,color:'var(--text-secondary)'}}>Score</th>
                                    <th style={{textAlign:'left',padding:12,fontWeight:600,color:'var(--text-secondary)'}}>Source</th>
                                    <th style={{textAlign:'left',padding:12,fontWeight:600,color:'var(--text-secondary)'}}>Actions</th>
                                </tr></thead>
                                <tbody>
                                    {candidates.map(c => (

                                            <td style={{padding:12,color:'var(--text-muted)'}}>{c.source||''}</td>

                <div className="glass" style={{padding:24,borderRadius:12,width:420,maxHeight:'80vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
                    <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Add Candidate</h3>
                    {[{f:'name',type:'text'},{f:'email',type:'email'},{f:'phone',type:'text'},{f:'source',type:'text'}].map(({f,type})=>(

                            <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>{f.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</label>
                            <input className="input" type={type} value={newCandidate[f]} onChange={e=>setNewCandidate({...newCandidate,[f]:e.target.value})} style={{fontSize:13,width:'100%'}}/>

                    ))}
                    <div style={{marginBottom:12}}>
                        <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Position</label>
                        <select className="input" value={newCandidate.position_id} onChange={e=>setNewCandidate({...newCandidate,position_id:e.target.value})} style={{fontSize:13,width:'100%'}}>
                            <option value="">Select Position</option>

                    <div style={{marginBottom:12}}>
                        <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Resume / Notes</label>
                        <textarea className="input" value={newCandidate.resume_text} onChange={e=>setNewCandidate({...newCandidate,resume_text:e.target.value})} rows={3} style={{fontSize:13,width:'100%'}}/>

        </div>
    );
};

            setDetail(d);

            loadData();

    const analyzeConsult = async (id) => {

        try {
            const resp = await apiFetch(`/consultations/${id}/analyze`, { method:'POST' });

        } catch(e) { alert('Consultation analysis failed: ' + (e.message || 'Check your API key in Settings')); }

                    <div key={s.label} className="glass" style={{padding:16,borderRadius:10}}>
                        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{s.label}</div>

                            <div key={c.id} onClick={()=>selectConsult(c)} style={{padding:12,border:'1px solid var(--border)',borderRadius:8,cursor:'pointer',background:selected?.id===c.id?'rgba(232,135,37,0.08)':'transparent',transition:'all 0.2s'}}>

                            <div><span style={{color:'var(--text-muted)',fontSize:12}}>Procedure:</span> <span style={{fontWeight:600,fontSize:13}}>{d.procedure||'General'}</span></div>
                            <div><span style={{color:'var(--text-muted)',fontSize:12}}>Date & Time:</span> <span style={{fontWeight:600,fontSize:13}}>{d.scheduled_at ? new Date(d.scheduled_at).toLocaleString('en-IN',{timeZone:'Asia/Kolkata'}) : ''}</span></div>
                            {d.notes && <div><span style={{color:'var(--text-muted)',fontSize:12}}>Notes:</span> <span style={{fontSize:13}}>{d.notes}</span></div>}
                            {d.meeting_link && <div style={{marginTop:12}}>

                            </div>}
                        </div>
                    )}
                </div>
            </div>
            {showSchedule && <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={()=>setShowSchedule(false)}>
                <div className="glass" style={{padding:24,borderRadius:12,width:420}} onClick={e=>e.stopPropagation()}>

                    {['patient_name','doctor_name','procedure','meeting_link'].map(f=>(
                        <div key={f} style={{marginBottom:12}}>
                            <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>{f.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</label>
                            <input className="input" value={newConsult[f]} onChange={e=>setNewConsult({...newConsult,[f]:e.target.value})} style={{fontSize:13,width:'100%'}}/>

                    ))}
                    <div style={{marginBottom:12}}>
                        <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Date & Time</label>
                        <input className="input" type="datetime-local" value={newConsult.scheduled_at} onChange={e=>setNewConsult({...newConsult,scheduled_at:e.target.value})} style={{fontSize:13,width:'100%'}}/>
                    </div>
                    <div style={{marginBottom:12}}>
                        <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Notes</label>
                        <textarea className="input" value={newConsult.notes} onChange={e=>setNewConsult({...newConsult,notes:e.target.value})} rows={3} style={{fontSize:13,width:'100%'}}/>
                    </div>
                    <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                        <button className="btn btn-ghost" onClick={()=>setShowSchedule(false)}>Cancel</button>
                        <button className="btn btn-gold" onClick={scheduleNew}>Schedule</button>
                    </div>
                </div>
            </div>}
        </div>
    );
};

const OperationsPage = () => {
    const [tab, setTab] = useState('billing');
    const [dashboard, setDashboard] = useState(null);
    const [inventory, setInventory] = useState([]);
    const [patients, setPatients] = useState([]);
    const [procedures, setProcedures] = useState([]);
    const [loading, setLoading] = useState(true);
    const [showAddItem, setShowAddItem] = useState(false);
    const [showAddPatient, setShowAddPatient] = useState(false);
    const [newItem, setNewItem] = useState({name:'',category:'',current_stock:0,min_stock:0,unit_cost:0,supplier:''});
    const [newPatient, setNewPatient] = useState({name:'',phone:'',email:'',date_of_birth:'',medical_history:''});
    const [aiLoading, setAiLoading] = useState(null);
    const [aiResult, setAiResult] = useState(null);

    const loadData = () => {
        setLoading(true);
        Promise.all([
            apiFetch('/operations/dashboard').catch(()=>null),
            apiFetch('/operations/inventory').catch(()=>[]),
            apiFetch('/operations/patients').catch(()=>[]),
            apiFetch('/operations/procedures').catch(()=>[])
        ]).then(([d, inv, pat, proc]) => { setDashboard(d); const invArr = Array.isArray(inv?.items) ? inv.items : Array.isArray(inv) ? inv : []; setInventory(invArr); const patArr = Array.isArray(pat?.patients) ? pat.patients : Array.isArray(pat) ? pat : []; setPatients(patArr); const procArr = Array.isArray(proc?.procedures) ? proc.procedures : Array.isArray(proc) ? proc : []; setProcedures(procArr); setLoading(false); });
    };
    useEffect(loadData, []);

    const addInventoryItem = async () => {
        try { await apiFetch('/operations/inventory', { method:'POST', body:newItem }); setShowAddItem(false); setNewItem({name:'',category:'',current_stock:0,min_stock:0,unit_cost:0,supplier:''}); loadData(); } catch(e) { alert('Failed to add inventory item: ' + (e.message || 'Check all fields and try again')); }
    };

    const addPatientRecord = async () => {
        try { await apiFetch('/operations/patients', { method:'POST', body:newPatient }); setShowAddPatient(false); setNewPatient({name:'',phone:'',email:'',date_of_birth:'',medical_history:''}); loadData(); } catch(e) { alert('Failed to add patient record: ' + (e.message || 'Check all fields and try again')); }
    };

    const restockItem = async (id) => {
        const qty = prompt('Enter restock quantity:');
        if(!qty) return;

                    <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Date of Birth</label><input className="input" type="date" value={newPatient.date_of_birth} onChange={e=>setNewPatient({...newPatient,date_of_birth:e.target.value})} style={{fontSize:13,width:'100%'}}/></div>

};

// ============ MARKETING HUB PAGE ============
const MarketingHubPage = () => {
    const [tab, setTab] = useState('performance');
    const [dashboard, setDashboard] = useState(null);
    const [adData, setAdData] = useState([]);
    const [content, setContent] = useState([]);
    const [reports, setReports] = useState([]);
    const [loading, setLoading] = useState(true);
    const [filterPlatform, setFilterPlatform] = useState('all');
    const [aiInsights, setAiInsights] = useState(null);
    const [insightsLoading, setInsightsLoading] = useState(false);
    const [genContentLoading, setGenContentLoading] = useState(false);
    const [genReportLoading, setGenReportLoading] = useState(false);
    const [showGenContent, setShowGenContent] = useState(false);
    const [contentPrompt, setContentPrompt] = useState({content_type:'video_script', procedure:'', target_audience:'', platform:'instagram', tone:'professional'});

    const loadData = () => {
        setLoading(true);
        Promise.all([
            apiFetch('/marketing/dashboard').catch(()=>null),
            apiFetch('/marketing/ad-performance').catch(()=>[]),
            apiFetch('/marketing/content').catch(()=>[]),
            apiFetch('/marketing/reports').catch(()=>[])
        ]).then(([d, ads, cont, reps]) => {
            setDashboard(d);
            const adArr = Array.isArray(ads?.performances) ? ads.performances : Array.isArray(ads) ? ads : [];
            setAdData(adArr);
            const contArr = Array.isArray(cont?.content_pieces) ? cont.content_pieces : Array.isArray(cont) ? cont : [];
            setContent(contArr);
            const repArr = Array.isArray(reps?.reports) ? reps.reports : Array.isArray(reps) ? reps : [];
            setReports(repArr);
            setLoading(false);
        });
    };
    useEffect(loadData, []);

    const getInsights = async () => {
        setInsightsLoading(true);
        try {
            const resp = await apiFetch('/marketing/ad-performance/insights');
            setAiInsights(resp);
        } catch(e) { alert('Failed to get ad insights: ' + (e.message || 'Check your API key in Settings')); }
        setInsightsLoading(false);
    };

    const generateContent = async (regenerateChanges) => {
        setGenContentLoading(true);
        try {
            const body = {...contentPrompt};
            if (regenerateChanges) body.regenerate_changes = regenerateChanges;
            await apiFetch('/marketing/content/generate', { method:'POST', body });
            setShowGenContent(false);
            loadData();
        } catch(e) { alert('Content generation failed: ' + (e.message || 'Check your API key in Settings')); }
        setGenContentLoading(false);
    };

    const generateReport = async (regenerateChanges) => {
        setGenReportLoading(true);
        try {
            const body = { report_type:'weekly', platform:'combined' };
            if (regenerateChanges) body.regenerate_changes = regenerateChanges;
            await apiFetch('/marketing/reports/generate', { method:'POST', body });
            loadData();
        } catch(e) { alert('Report generation failed: ' + (e.message || 'Check your API key in Settings')); }
        setGenReportLoading(false);
    };

    const scoreContent = async (id) => {
        try {
            await apiFetch(`/marketing/content/${id}/score`, { method:'POST' });
            loadData();
        } catch(e) { alert('Content scoring failed: ' + (e.message || 'Check your API key in Settings')); }
    };

    const ds = dashboard || {};
    const filtered = filterPlatform === 'all' ? adData : adData.filter(a => (a.platform||'').toLowerCase() === filterPlatform.toLowerCase());
    const contentTypeColor = (t) => t==='video_script'||t==='Video Script'?'badge-blue':t==='image_ad'||t==='Image Ad'?'badge-gold':'badge-green';

    return (
        <div className="fade-in">
            <h1 className="page-title" style={{fontSize:24,fontWeight:700,marginBottom:20}}>Marketing Hub</h1>
            <div className="resp-grid-4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>
                {[{label:'Total Ad Spend',value:'20B9'+(ds.total_spend||0).toLocaleString('en-IN')},{label:'Total Conversions',value:ds.total_conversions||0},{label:'Avg CPC',value:'20B9'+(ds.avg_cpc||0).toFixed(2)},{label:'Avg ROAS',value:(ds.avg_roas||0).toFixed(1)+'x'}].map(s => (
                    <div key={s.label} className="glass" style={{padding:16,borderRadius:10}}>
                        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{s.label}</div>
                        <div style={{fontSize:24,fontWeight:700,color:'var(--gold)'}}>{s.value}</div>
                    </div>
                ))}
            </div>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
                {['performance','content','reports'].map(t => (
                    <button key={t} onClick={()=>setTab(t)} className={tab===t?'btn btn-gold':'btn btn-ghost'} style={{fontSize:13,textTransform:'capitalize'}}>{t}</button>
                ))}
            </div>
            <div className="glass" style={{borderRadius:12,padding:20}}>
                {loading ? <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>Loading...</div> : <>
                {tab==='performance' && (
                    <>
                        <div style={{display:'flex',gap:8,marginBottom:16}}>
                            {['all','meta','google'].map(p => (
                                <button key={p} onClick={()=>setFilterPlatform(p)} className={filterPlatform===p?'btn btn-gold':'btn btn-ghost'} style={{fontSize:12,textTransform:'capitalize'}}>{p}</button>
                            ))}
                            <button className="btn btn-ghost" onClick={getInsights} disabled={insightsLoading} style={{fontSize:12,marginLeft:'auto'}}>{insightsLoading?'Analyzing...':'Get AI Insights'}</button>
                        </div>
                        {filtered.length===0 ? <div style={{textAlign:'center',padding:40,color:'var(--text-muted)',fontSize:13}}>No ad performance data yet. Add campaign data to get started.</div> :
                        <table style={{width:'100%',fontSize:11}}>
                            <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Campaign</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Platform</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Impressions</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Clicks</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>CTR</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Spend</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Conversions</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Cost/Conv</th>

                                {filtered.map(a => (
                                    <tr key={a.id} style={{borderBottom:'1px solid var(--border)'}}>

                        </div>}
                    </>

// ============ SHARED FORM INPUT (stable reference, prevents re-mount) ============
const StableInput = ({label, value, onChange, type, placeholder, style:extraStyle}) => (
    <div style={{flex:1,minWidth:180,...(extraStyle||{})}}>
        <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:3}}>{label}</label>

    </div>
);
const StableSelect = ({label, value, onChange, options, style:extraStyle}) => (
    <div style={{flex:1,minWidth:180,...(extraStyle||{})}}>
        <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:3}}>{label}</label>
        <select className="input" value={value} onChange={onChange} style={{fontSize:12}}>{options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}</select>
    </div>
);

// ============ SHARED DEEP RENDERER (replaces JSON.stringify everywhere) ============
const DeepRender = ({data, depth=0}) => {
    if (data === null || data === undefined) return null;
    if (typeof data === 'boolean') return <span style={{fontSize:13,color:data?'var(--success)':'var(--text-muted)'}}>{data?'Yes':'No'}</span>;
    if (typeof data === 'number') return <span style={{fontSize:13,color:'var(--text-secondary)'}}>{data.toLocaleString()}</span>;
    if (typeof data === 'string') return <span style={{fontSize:13,color:'var(--text-secondary)',whiteSpace:'pre-wrap',lineHeight:1.7}}>{data}</span>;
    if (Array.isArray(data)) {
        if (data.length === 0) return <span style={{fontSize:12,color:'var(--text-muted)'}}>None</span>;
        if (data.every(i => typeof i === 'string' || typeof i === 'number')) return <div style={{marginTop:2}}>{data.map((item,i) => <span key={i} style={{display:'inline-block',fontSize:11,background:'rgba(212,175,55,0.1)',border:'1px solid rgba(212,175,55,0.2)',borderRadius:4,padding:'2px 8px',margin:'2px 4px 2px 0',color:'var(--text-secondary)'}}>{item}</span>)}</div>;
        return <div style={{marginTop:4,paddingLeft:depth>0?12:0}}>{data.map((item,i) => <div key={i} style={{padding:depth>1?8:12,border:'1px solid var(--border)',borderRadius:8,marginBottom:8,background:depth>0?'rgba(0,0,0,0.1)':'transparent'}}>{typeof item==='object'&&item!==null?Object.entries(item).map(([k,v])=><div key={k} style={{marginBottom:6}}><span style={{fontSize:11,color:'var(--gold)',fontWeight:600,textTransform:'uppercase'}}>{k.replace(/_/g,' ')}: </span><DeepRender data={v} depth={depth+1}/></div>):<DeepRender data={item} depth={depth+1}/>}</div>)}</div>;
    }
    if (typeof data === 'object') return <div style={{marginTop:4,paddingLeft:depth>0?12:0}}>{Object.entries(data).map(([k,v]) => <div key={k} style={{marginBottom:depth>0?6:14}}>{depth===0?<h4 style={{fontSize:13,fontWeight:700,color:'var(--gold)',marginBottom:6,textTransform:'uppercase'}}>{k.replace(/_/g,' ')}</h4>:<span style={{fontSize:11,color:'var(--gold)',fontWeight:600,textTransform:'uppercase'}}>{k.replace(/_/g,' ')}: </span>}<DeepRender data={v} depth={depth+1}/></div>)}</div>;
    return null;
};

    const [history, setHistory] = useState([]);
    const [showHistory, setShowHistory] = useState(false);
    const [loading, setLoading] = useState(false);

    const loadHistory = async () => {
        if (history.length > 0) { setShowHistory(!showHistory); return; }
        setLoading(true);
        try {
            const res = await apiFetch(`/${endpoint}/history${filterAction?'?action_filter='+filterAction:''}`);
            setHistory(res.history || []);
            setShowHistory(true);
        } catch(e) {}
        setLoading(false);
    };

    const handleRestore = (h) => {
        if (h.details?.output && onRestore) {
            onRestore(h.details.output);
        }
    };

    return (
        <div style={{marginTop:16}}>
            <button onClick={loadHistory} style={{background:'none',border:'1px solid var(--border)',borderRadius:8,padding:'6px 14px',color:'var(--text-muted)',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                {loading?'Loading...':showHistory?'Hide History':'Show Generation History'} <span style={{fontSize:10}}>{showHistory?'(hide)':'(show)'}</span>
            </button>
            {showHistory && history.length > 0 && (
                <div style={{marginTop:10,maxHeight:300,overflowY:'auto',border:'1px solid var(--border)',borderRadius:10,padding:12}}>
                    {history.map((h,i) => (
                        <div key={i} onClick={()=>handleRestore(h)} style={{padding:'8px 0',borderBottom:i<history.length-1?'1px solid rgba(255,255,255,0.04)':'none',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:h.details?.output?'pointer':'default',borderRadius:6,paddingLeft:6,paddingRight:6,transition:'background 0.15s'}} onMouseEnter={e=>{if(h.details?.output)e.currentTarget.style.background='rgba(212,175,55,0.08)'}} onMouseLeave={e=>{e.currentTarget.style.background='transparent'}}>
                            <div style={{display:'flex',alignItems:'center',gap:6}}>
                                {h.details?.output && <span style={{fontSize:10,color:'var(--gold)'}}>&#9654;</span>}
                                <span style={{fontSize:12,fontWeight:600,color:'var(--text-primary)'}}>{(h.action||'').replace(/_/g,' ').replace('meta ','').replace('google ','')}</span>
                                {h.details?.procedure && <span style={{fontSize:11,color:'var(--text-muted)',marginLeft:8}}>({h.details.procedure})</span>}
                                {h.details?.language && <span style={{fontSize:10,color:'var(--gold)',marginLeft:6,background:'rgba(212,175,55,0.1)',padding:'1px 6px',borderRadius:3}}>{h.details.language}</span>}
                            </div>
                            <span style={{fontSize:10,color:'var(--text-muted)',whiteSpace:'nowrap'}}>{h.timestamp ? new Date(h.timestamp).toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : ''}</span>
                        </div>
                    ))}
                </div>
            )}
            {showHistory && history.length === 0 && <p style={{fontSize:12,color:'var(--text-muted)',marginTop:8}}>No generation history yet. Generated content will appear here.</p>}
        </div>
    );
};

// ============ SHARED REGENERATE WITH CHANGES PANEL ============
const RegenerateWithChanges = ({onRegenerate, loading}) => {
    const [changes, setChanges] = useState('');
    const [expanded, setExpanded] = useState(false);
    if (!onRegenerate) return null;
    return (
        <div style={{marginTop:12,border:'1px solid rgba(212,175,55,0.2)',borderRadius:10,background:'rgba(212,175,55,0.03)',overflow:'hidden'}}>
            <button onClick={()=>setExpanded(!expanded)} style={{width:'100%',background:'none',border:'none',padding:'10px 16px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',color:'var(--text-secondary)',fontSize:13}}>
                <span style={{fontWeight:600,color:'var(--gold)'}}>Want specific changes? Regenerate with feedback</span>
                <span style={{fontSize:10,color:'var(--text-muted)'}}>{expanded?'(less)':'(more)'}</span>
            </button>
            {expanded && (
                <div style={{padding:'0 16px 14px'}}>
                    <textarea value={changes} onChange={e=>setChanges(e.target.value)} placeholder="Tell us what to change. Examples:\n- Make the tone more aggressive and direct\n- Focus more on hair transplant cost savings\n- Add more emotional hooks in the opening\n- Include a specific offer: Rs. 999 consultation\n- Make it shorter / longer\n- Use more Hinglish slang\n- Change the CTA to WhatsApp booking\n- Add doctor credentials in every script" rows={4} style={{width:'100%',fontSize:12,borderRadius:8,border:'1px solid var(--border)',background:'var(--card-bg)',color:'var(--text-primary)',padding:10,resize:'vertical',fontFamily:'inherit',lineHeight:1.6}} className="input"/>
                    <div style={{display:'flex',gap:8,marginTop:8,alignItems:'center'}}>
                        <button className="btn btn-gold" onClick={()=>{if(!changes.trim()){alert('Please describe what changes you want.');return;}onRegenerate(changes);}} disabled={loading||!changes.trim()} style={{fontSize:12,padding:'6px 18px'}}>{loading?'Regenerating...':'Regenerate with Changes'}</button>
                        <button onClick={()=>{setChanges('');setExpanded(false);}} style={{background:'none',border:'none',color:'var(--text-muted)',fontSize:12,cursor:'pointer'}}>Cancel</button>
                    </div>
                </div>
            )}
        </div>
    );
};
