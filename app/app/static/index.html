<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallCoach | AI Sales Training & CRM | Skin Business Accelerator</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

    <style>
        :root {
            --bg-primary: #06080F;
            --bg-secondary: #0D1117;
            --bg-card: rgba(15, 20, 30, 0.7);
            --bg-card-hover: rgba(20, 28, 42, 0.8);
            --border: rgba(192, 196, 203, 0.12);
            --border-hover: rgba(192, 196, 203, 0.3);
            --gold: #C0C4CB;
            --gold-light: #E8EAED;
            --gold-dark: #8A9099;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --success: #22C55E;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(192, 196, 203, 0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(192, 196, 203, 0.4); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Glass morphism */
        .glass { background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .glass:hover { border-color: var(--border-hover); }
        .glass-solid { background: var(--bg-secondary); border: 1px solid var(--border); }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none; font-family: inherit; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #000; }
        .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(192, 196, 203, 0.3); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
        .btn-danger { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #EF4444; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .btn-xs { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

        /* Inputs */
        .input { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .input:focus { border-color: var(--gold); }
        .input::placeholder { color: var(--text-muted); }
        select.input { cursor: pointer; }
        textarea.input { resize: vertical; min-height: 80px; }

        /* Score Ring */
        .score-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
        .score-ring svg { transform: rotate(-90deg); }
        .score-ring .score-text { position: absolute; font-weight: 700; font-family: 'Inter', sans-serif; }

        /* Badge */
        .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-gold { background: rgba(192, 196, 203, 0.15); color: var(--gold); }
        .badge-green { background: rgba(34, 197, 94, 0.15); color: #22C55E; }
        .badge-red { background: rgba(239, 68, 68, 0.15); color: #EF4444; }
        .badge-blue { background: rgba(59, 130, 246, 0.15); color: #3B82F6; }
        .badge-yellow { background: rgba(245, 158, 11, 0.15); color: #F59E0B; }
        .badge-gray { background: rgba(148, 163, 184, 0.1); color: #94A3B8; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes recPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); } 70% { box-shadow: 0 0 0 15px rgba(239,68,68,0); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .recording-pulse { animation: recPulse 1s infinite; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .tip-card { animation: slideIn 0.3s ease-out; }

        /* Stage columns for pipeline */
        .stage-col { min-width: 280px; }

        /* Gradient text */
        .text-gradient { background: linear-gradient(135deg, #C0C4CB, #F5F6F8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        /* Sidebar */
        .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 8px; color: var(--text-secondary); font-weight: 500; font-size: 14px; transition: all 0.2s; cursor: pointer; text-decoration: none; }
        .sidebar-link:hover { color: var(--text-primary); background: rgba(192, 196, 203, 0.06); }
        .sidebar-link.active { color: var(--gold); background: rgba(192, 196, 203, 0.1); border: 1px solid rgba(192, 196, 203, 0.15); }

        /* Table */
        .table-row { transition: background 0.15s; }
        .table-row:hover { background: rgba(192, 196, 203, 0.04); }

        /* Loading spinner */
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.6s linear infinite; }

        /* Glow effect */
        .glow-gold { box-shadow: 0 0 30px rgba(192, 196, 203, 0.08); }

        /* Audio Player */
        .audio-player { width: 100%; border-radius: 8px; background: rgba(255,255,255,0.03); }
        .audio-player::-webkit-media-controls-panel { background: rgba(15,20,30,0.9); }

        /* AI Coach Chat */
        .coach-chat-bubble { background: rgba(192,196,203,0.06); border: 1px solid rgba(192,196,203,0.15); border-radius: 12px; padding: 16px; font-size: 13px; line-height: 1.7; color: var(--text-secondary); white-space: pre-wrap; animation: fadeIn 0.4s ease-out; }
        .coach-prompt-btn { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .coach-prompt-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(192,196,203,0.06); }

        /* Drag and Drop Pipeline */
        .pipeline-card { transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s; cursor: grab; user-select: none; }
        .pipeline-card:active { cursor: grabbing; }
        .pipeline-card.dragging { opacity: 0.5; transform: scale(0.95); }
        .stage-drop-zone { min-height: 120px; border-radius: 10px; transition: background 0.2s, border-color 0.2s; border: 2px dashed transparent; }
        .stage-drop-zone.drag-over { background: rgba(192,196,203,0.04); border-color: rgba(192,196,203,0.3); }

        /* Learning card */
        .learning-card { padding: 14px 18px; border-radius: 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); transition: all 0.2s; cursor: default; }
        .learning-card:hover { border-color: rgba(192,196,203,0.2); background: rgba(192,196,203,0.03); }

        /* Typing indicator */
        .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: typingBounce 1.4s infinite; display: inline-block; margin: 0 2px; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

        /* Tab nav */
        .detail-tab { padding: 10px 20px; border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text-muted); background: transparent; border: none; border-bottom: 2px solid transparent; }
        .detail-tab:hover { color: var(--text-secondary); }
        .detail-tab.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(192,196,203,0.06); }

        /* Mobile hamburger */
        .mobile-header { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 60; background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 12px 16px; align-items: center; justify-content: space-between; }
        .hamburger { background: none; border: none; color: var(--text-primary); cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
        .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 55; }
        .mobile-overlay.show { display: block; }

        /* Responsive */

            .resp-grid-2 { grid-template-columns: 1fr !important; }

            .resp-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
            .page-title { font-size: 20px !important; }
            .detail-tab { padding: 8px 12px; font-size: 12px; }
            .pipeline-scroll { gap: 10px !important; }
            .stage-col { min-width: 260px !important; }
            .coach-chat-bubble { font-size: 13px; padding: 12px; }
            .btn { padding: 8px 14px; font-size: 13px; }
            .btn-sm { padding: 6px 10px; font-size: 12px; }
            h1 { font-size: 20px !important; }
            .resp-header { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }

            .btn { padding: 8px 12px; font-size: 12px; gap: 6px; }
            .badge { font-size: 10px; padding: 2px 8px; }
            .glass { padding: 14px !important; }

</head>

// ============ API HELPERS ============
const API = '/api';
const getToken = () => localStorage.getItem('callcoach_token');
const setToken = (t) => localStorage.setItem('callcoach_token', t);
const clearToken = () => localStorage.removeItem('callcoach_token');

const apiFetch = async (path, opts = {}) => {
    const headers = { ...opts.headers };
    const token = getToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;
    if (opts.body && !(opts.body instanceof FormData) && typeof opts.body !== 'string') {
        if (!headers['Content-Type']) headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(opts.body);
    }
    const res = await fetch(`${API}${path}`, { ...opts, headers });
    if (res.status === 401) { clearToken(); window.location.reload(); }
    if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        const detail = e.detail;
        const msg = typeof detail === 'string' ? detail : (Array.isArray(detail) ? detail.map(d => d.msg || String(d)).join(', ') : 'Request failed');
        throw new Error(msg);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
};

// ============ ERROR BOUNDARY ============
class ErrorBoundary extends React.Component {
    constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
    }
    static getDerivedStateFromError(error) {
        return { hasError: true, error };
    }
    componentDidCatch(error, errorInfo) {
        this.setState({ errorInfo });
        console.error('ErrorBoundary caught:', error, errorInfo);
    }
    render() {
        if (this.state.hasError) {
            return React.createElement('div', {
                style: { padding: 40, textAlign: 'center', color: '#94A3B8' }
            },
                React.createElement('div', { style: { fontSize: 20, fontWeight: 700, color: '#EF4444', marginBottom: 12 } }, 'Something went wrong'),
                React.createElement('div', { style: { fontSize: 13, marginBottom: 16 } }, this.state.error?.message || 'An unexpected error occurred'),
                React.createElement('button', {
                    onClick: () => this.setState({ hasError: false, error: null, errorInfo: null }),
                    className: 'btn btn-ghost',
                    style: { fontSize: 13 }
                }, 'Try Again')
            );
        }
        return this.props.children;
    }
}

// ============ SCORE RING ============
const ScoreRing = ({ score, size = 56, strokeWidth = 4 }) => {
    const r = (size - strokeWidth) / 2;
    const circ = 2 * Math.PI * r;
    const offset = circ - (score / 100) * circ;
    const color = score >= 80 ? 'var(--success)' : score >= 60 ? 'var(--gold)' : score >= 40 ? 'var(--warning)' : 'var(--danger)';
    return (
        <div className="score-ring" style={{width:size,height:size}}>
            <svg width={size} height={size}>
                <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={strokeWidth}/>
                <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeWidth} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"/>
            </svg>
            <span className="score-text" style={{fontSize:size*0.26,color}}>{Math.round(score)}</span>
        </div>
    );
};

const RecordCallPage = ({ onBack, onDone }) => {
    const [mode, setMode] = useState('choose');
    const [recording, setRecording] = useState(false);
    const [elapsed, setElapsed] = useState(0);
    const [form, setForm] = useState({caller_name:'',caller_phone:'',call_type:'inbound'});
    const [uploading, setUploading] = useState(false);
    const [error, setError] = useState('');
    const [status, setStatus] = useState('');
    const mediaRec = useRef(null);
    const chunks = useRef([]);
    const timer = useRef(null);
    const fileRef = useRef(null);

    const startRecording = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({audio:true});
            mediaRec.current = new MediaRecorder(stream);
            chunks.current = [];
            mediaRec.current.ondataavailable = e => chunks.current.push(e.data);
            mediaRec.current.start(1000);
            setRecording(true); setElapsed(0);
            timer.current = setInterval(()=>setElapsed(p=>p+1),1000);
        } catch(e) { setError('Microphone access denied'); }
    };

    const stopAndUpload = async () => {
        return new Promise(resolve => {
            mediaRec.current.onstop = async () => {
                clearInterval(timer.current); setRecording(false);
                const blob = new Blob(chunks.current, {type:'audio/webm'});
                await uploadAudio(blob);
                resolve();
            };
            mediaRec.current.stop();
            mediaRec.current.stream.getTracks().forEach(t=>t.stop());
        });
    };

    const uploadAudio = async (blob) => {
        setUploading(true); setStatus('Uploading...'); setError('');
        try {
            const fd = new FormData();
            fd.append('file', blob, `recording_${Date.now()}.webm`);
            fd.append('caller_name', form.caller_name);
            fd.append('caller_phone', form.caller_phone);
            fd.append('call_type', form.call_type);
            const result = await fetch(`${API}/calls/record`, { method:'POST', headers:{'Authorization':`Bearer ${getToken()}`}, body:fd });
            if (!result.ok) throw new Error('Upload failed');
            setStatus('Processing with AI...');
            const data = await result.json();
            let tries = 0;
            const poll = setInterval(async ()=>{
                tries++;
                try {
                    const s = await apiFetch(`/calls/${data.id}`);
                    if (s.transcription_status==='completed' || tries > 60) { clearInterval(poll); setStatus('Done!'); setTimeout(()=>onDone(data.id),1000); }
                    else { setStatus(`Processing... ${s.transcription_status}`); }
                } catch(e) { if(tries>60) clearInterval(poll); }
            }, 3000);
        } catch(e) { setError(e.message); setUploading(false); }
    };

    const handleFileUpload = async (e) => {
        const file = e.target.files?.[0]; if (!file) return;
        await uploadAudio(file);
    };

    const formatTime = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

    return (
        <div className="fade-in">
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:28}}>
                <button className="btn btn-ghost btn-sm" onClick={onBack}>{Icons.back}<span>Back</span></button>
                <h1 style={{fontSize:24,fontWeight:700}}>Record Call</h1>
            </div>
            <div className="glass" style={{padding:32,borderRadius:16,maxWidth:560}}>
                <div style={{display:'flex',flexDirection:'column',gap:16,marginBottom:24}}>

                    <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Phone Number</label><input className="input" placeholder="+91 98765 43210" value={form.caller_phone} onChange={e=>setForm({...form,caller_phone:e.target.value})}/></div>
                    <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Call Type</label>
                        <select className="input" value={form.call_type} onChange={e=>setForm({...form,call_type:e.target.value})}>
                            <option value="inbound">Inbound</option><option value="outbound">Outbound</option><option value="follow_up">Follow-up</option>
                        </select>
                    </div>
                </div>
                {!recording && !uploading && (
                    <div style={{display:'flex',gap:12}}>
                        <button className="btn btn-gold" onClick={startRecording}>{Icons.mic}<span>Start Recording</span></button>

                        </div>
                        <div style={{fontSize:32,fontWeight:700,fontVariantNumeric:'tabular-nums',marginBottom:16}}>{formatTime(elapsed)}</div>
                        <button className="btn btn-danger" onClick={stopAndUpload}>{Icons.stop}<span>Stop & Analyze</span></button>
                    </div>
                )}
                {uploading && (
                    <div style={{textAlign:'center',padding:'20px 0'}}>
                        <div className="spinner" style={{width:32,height:32,margin:'0 auto 16px'}}></div>

                )}
                {error && <div style={{padding:'10px 14px',borderRadius:8,background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.2)',color:'#EF4444',fontSize:13,marginTop:16}}>{error}</div>}
            </div>
        </div>
    );
};

// ============ PIPELINE (DRAG & DROP) ============
const PipelinePage = () => {
    const [deals, setDeals] = useState([]);
    const [showAdd, setShowAdd] = useState(false);
    const [form, setForm] = useState({contact_name:'',title:'',treatment_interest:'',deal_value:0,source:'phone',contact_phone:'',contact_email:''});
    const [draggedDeal, setDraggedDeal] = useState(null);
    const [dragOverStage, setDragOverStage] = useState(null);

    const stages = ['new_inquiry','contacted','consultation_booked','consultation_done','proposal_sent','won','lost'];
    const stageLabels = {'new_inquiry':'New Inquiry','contacted':'Contacted','consultation_booked':'Consult Booked','consultation_done':'Consult Done','proposal_sent':'Proposal Sent','won':'Won','lost':'Lost'};
    const stageColors = {'new_inquiry':'var(--info)','contacted':'#8B5CF6','consultation_booked':'var(--gold)','consultation_done':'#F59E0B','proposal_sent':'#EC4899','won':'var(--success)','lost':'var(--danger)'};

    useEffect(()=>{ apiFetch('/pipeline').then(setDeals).catch(()=>{}); },[]);

    const addDeal = async () => {
        try { await apiFetch('/pipeline',{method:'POST',body:form}); setShowAdd(false); setForm({contact_name:'',title:'',treatment_interest:'',deal_value:0,source:'phone',contact_phone:'',contact_email:''}); apiFetch('/pipeline').then(setDeals); } catch(e){}
    };

    const moveStage = async (id, stage) => {
        // Optimistic update
        setDeals(prev => prev.map(d => d.id === id ? {...d, stage} : d));
        try {
            await apiFetch(`/pipeline/${id}`,{method:'PATCH',body:{stage}});
        } catch(e) {
            apiFetch('/pipeline').then(setDeals); // revert on failure
        }
    };

    const handleDragStart = (e, deal) => {
        setDraggedDeal(deal);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', deal.id);
        // Make the drag image slightly transparent
        setTimeout(() => { e.target.classList.add('dragging'); }, 0);
    };

    const handleDragEnd = (e) => {
        e.target.classList.remove('dragging');
        setDraggedDeal(null);
        setDragOverStage(null);
    };

    const handleDragOver = (e, stage) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (dragOverStage !== stage) setDragOverStage(stage);
    };

    const handleDragLeave = (e, stage) => {
        // Only clear if actually leaving the drop zone
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX; const y = e.clientY;
        if (x < rect.left || x > rect.right || y < rect.top || y > rect.bottom) {
            if (dragOverStage === stage) setDragOverStage(null);
        }
    };

    const handleDrop = (e, targetStage) => {
        e.preventDefault();
        setDragOverStage(null);
        if (draggedDeal && draggedDeal.stage !== targetStage) {
            moveStage(draggedDeal.id, targetStage);
        }
        setDraggedDeal(null);
    };

    // Compute pipeline value per stage
    const stageValue = (stage) => deals.filter(d=>d.stage===stage).reduce((sum,d)=>sum+(d.deal_value||0),0);
    const totalValue = deals.reduce((sum,d)=>sum+(d.deal_value||0),0);

    return (
        <div className="fade-in">
            <div className="resp-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                <div>
                    <h1 style={{fontSize:24,fontWeight:700}}>Pipeline</h1>
                    <div style={{display:'flex',gap:16,marginTop:4}}>
                        <span style={{color:'var(--text-muted)',fontSize:14}}>{deals.length} active deals</span>
                        <span style={{color:'var(--gold)',fontSize:14,fontWeight:600}}>Total: {'\u20B9'}{totalValue.toLocaleString('en-IN')}</span>
                    </div>
                </div>
                <button className="btn btn-gold" onClick={()=>setShowAdd(!showAdd)}>{Icons.plus}<span>New Deal</span></button>
            </div>

            {/* Drag hint */}
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16,display:'flex',alignItems:'center',gap:6}}>
                <span style={{opacity:0.5}}>{Icons.drag}</span>
                Drag and drop deal cards between columns to change stages
            </div>

            {showAdd && (
                <div className="glass" style={{padding:24,borderRadius:12,marginBottom:20}}>
                    <div className="resp-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Contact Name *</label><input className="input" value={form.contact_name} onChange={e=>setForm({...form,contact_name:e.target.value})} required/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Deal Title *</label><input className="input" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} required/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Treatment</label><input className="input" placeholder="e.g. Hair Transplant" value={form.treatment_interest} onChange={e=>setForm({...form,treatment_interest:e.target.value})}/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Deal Value</label><input className="input" type="number" value={form.deal_value} onChange={e=>setForm({...form,deal_value:parseFloat(e.target.value)||0})}/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Phone</label><input className="input" value={form.contact_phone} onChange={e=>setForm({...form,contact_phone:e.target.value})}/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Source</label>
                            <select className="input" value={form.source} onChange={e=>setForm({...form,source:e.target.value})}><option value="phone">Phone</option><option value="walk_in">Walk-in</option><option value="website">Website</option><option value="referral">Referral</option><option value="social_media">Social Media</option><option value="ad">Ad</option></select>
                        </div>
                    </div>
                    <div style={{display:'flex',gap:8}}><button className="btn btn-gold btn-sm" onClick={addDeal}>Create Deal</button><button className="btn btn-ghost btn-sm" onClick={()=>setShowAdd(false)}>Cancel</button></div>
                </div>
            )}
            <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:16}} className="scrollbar-hide pipeline-scroll">
                {stages.map(stage => {
                    const stageDeals = deals.filter(d=>d.stage===stage);
                    const sv = stageValue(stage);
                    const isOver = dragOverStage === stage && draggedDeal?.stage !== stage;
                    return (
                        <div key={stage} className="stage-col" style={{flexShrink:0}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'0 4px'}}>
                                <div style={{width:8,height:8,borderRadius:'50%',background:stageColors[stage]}}></div>
                                <span style={{fontSize:13,fontWeight:600,color:'var(--text-secondary)'}}>{stageLabels[stage]}</span>
                                <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:'auto'}}>{stageDeals.length}</span>
                            </div>
                            {sv > 0 && <div style={{fontSize:11,color:stageColors[stage],fontWeight:600,marginBottom:8,padding:'0 4px'}}>{'\u20B9'}{sv.toLocaleString('en-IN')}</div>}
                            <div
                                className={`stage-drop-zone ${isOver ? 'drag-over' : ''}`}
                                onDragOver={(e) => handleDragOver(e, stage)}
                                onDragLeave={(e) => handleDragLeave(e, stage)}
                                onDrop={(e) => handleDrop(e, stage)}
                                style={{display:'flex',flexDirection:'column',gap:8,padding:4}}
                            >
                                {stageDeals.map(deal => (
                                    <div key={deal.id}
                                        className="glass pipeline-card"
                                        draggable="true"
                                        onDragStart={(e) => handleDragStart(e, deal)}
                                        onDragEnd={handleDragEnd}
                                        style={{padding:16,borderRadius:10,borderLeft:`3px solid ${stageColors[stage]}`}}
                                    >
                                        <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
                                            <span style={{color:'var(--text-muted)',marginTop:2,cursor:'grab',opacity:0.4}}>{Icons.drag}</span>
                                            <div style={{flex:1,minWidth:0}}>
                                                <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{deal.title}</div>
                                                <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{deal.contact_name}</div>
                                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                                    <span style={{fontWeight:700,fontSize:14,color:'var(--gold)'}}>{'\u20B9'}{(deal.deal_value||0).toLocaleString('en-IN')}</span>
                                                    {deal.treatment_interest && <span className="badge badge-gold" style={{fontSize:10}}>{deal.treatment_interest}</span>}
                                                </div>
                                                {deal.source && <div style={{fontSize:10,color:'var(--text-muted)',marginTop:6}}>via {deal.source}</div>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {stageDeals.length === 0 && !isOver && (
                                    <div style={{padding:'20px',textAlign:'center',color:'var(--text-muted)',fontSize:12,opacity:0.5}}>
                                        Drop deals here
                                    </div>
                                )}
                                {isOver && (
                                    <div style={{padding:'16px',textAlign:'center',color:'var(--gold)',fontSize:12,borderRadius:8,border:'1px dashed rgba(192,196,203,0.3)',background:'rgba(192,196,203,0.04)'}}>
                                        Move to {stageLabels[stage]}
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                })}
            </div>
        </div>
    );
};

const CoachingPage = () => {
    const [insights, setInsights] = useState([]);
    const [perf, setPerf] = useState(null);
    const [leaderboard, setLeaderboard] = useState([]);
    const [lbVisible, setLbVisible] = useState(true);
    const [lbMessage, setLbMessage] = useState('');
    const [weeklyReport, setWeeklyReport] = useState(null);
    const [growthPlan, setGrowthPlan] = useState(null);
    const [activeTab, setActiveTab] = useState('overview');
    const [growthLoading, setGrowthLoading] = useState(false);
    const [reportLoading, setReportLoading] = useState(false);
    const [comparison, setComparison] = useState(null);
    const [compareIds, setCompareIds] = useState([]);
    const [compareLoading, setCompareLoading] = useState(false);

    useEffect(()=>{
        apiFetch('/coaching/insights').then(d => setInsights(Array.isArray(d) ? d : [])).catch(()=>{});
        apiFetch('/coaching/performance').then(d => setPerf(d && typeof d === 'object' && !d.detail ? d : null)).catch(()=>{});
        apiFetch('/coaching/leaderboard').then(data => {
            if (data && data.leaderboard) { setLeaderboard(Array.isArray(data.leaderboard) ? data.leaderboard : []); setLbVisible(data.visible !== false); setLbMessage(data.message || ''); }
            else if (Array.isArray(data)) { setLeaderboard(data); }
        }).catch(()=>{});
        apiFetch('/reports/weekly').then(d => setWeeklyReport(d && typeof d === 'object' && !d.detail ? d : null)).catch(()=>{});

    const runCompare = async () => {
        if (compareIds.length < 2) return;
        setCompareLoading(true);
        try {
            const res = await apiFetch(`/coaching/compare?user_ids=${compareIds.join(',')}`);
            setComparison(res.comparison || res);

        setCompareIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : prev.length >= 5 ? prev : [...prev, id]);

        setGrowthLoading(true);
        try {
            const res = await apiFetch('/coaching/growth-plan', {method:'POST'});
            setGrowthPlan(res);
        } catch(e) {} finally { setGrowthLoading(false); }
    };

    const generateReport = async () => {
        setReportLoading(true);

            </div>

            {perf && (

                    <StatCard label="Calls Handled" value={perf.total_calls||0}/>

    const filtered = contacts.filter(c => !search || (c.name||'').toLowerCase().includes(search.toLowerCase()) || (c.phone||'').includes(search) || (c.email||'').toLowerCase().includes(search.toLowerCase()));

                <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                    <div style={{position:'relative',flex:'1 1 180px'}}><span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)'}}>{Icons.search}</span><input className="input" style={{paddingLeft:36,width:'100%'}} placeholder="Search contacts..." value={search} onChange={e=>setSearch(e.target.value)}/></div>

                <div className="glass" style={{padding:60,borderRadius:12,textAlign:'center'}}><p style={{color:'var(--text-muted)',fontSize:15}}>No contacts found</p></div>
            ) : (
                <div className="glass" style={{borderRadius:12,overflow:'hidden'}}>
                    <div style={{overflowX:'auto'}}>
                        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>

                            </tr></thead>
                            <tbody>
                                {filtered.map(c=>(
                                    <tr key={c.id} className="table-row" style={{borderBottom:'1px solid rgba(255,255,255,0.03)'}}>
                                        <td style={{padding:'12px 16px',fontWeight:600}}>{c.name||'Unknown'}</td>
                                        <td style={{padding:'12px 16px',color:'var(--text-secondary)'}}>{c.phone||'-'}</td>
                                        <td style={{padding:'12px 16px',color:'var(--text-secondary)'}}>{c.email||'-'}</td>
                                        <td style={{padding:'12px 16px'}}>{c.total_calls}</td>
                                        <td style={{padding:'12px 16px'}}>{c.total_deals}</td>
                                        <td style={{padding:'12px 16px'}}>{c.treatments_interested ? <span className="badge badge-gold">{c.treatments_interested}</span> : '-'}</td>
                                        <td style={{padding:'12px 16px'}}>{c.latest_sentiment ? <span className={`badge ${c.latest_sentiment==='positive'?'badge-green':c.latest_sentiment==='negative'?'badge-red':'badge-gray'}`}>{c.latest_sentiment}</span> : '-'}</td>
                                        <td style={{padding:'12px 16px',fontWeight:600,color:'var(--gold)'}}>{c.deal_value ? `\u20B9${c.deal_value.toLocaleString('en-IN')}` : '-'}</td>

                </div>

};

// ============ LEARNING ACADEMY ============
const LearningPage = () => {
    const [modules, setModules] = useState([]);
    const [selectedModule, setSelectedModule] = useState(null);
    const [progress, setProgress] = useState(null);
    const [activeSection, setActiveSection] = useState('learn');
    const [quizMode, setQuizMode] = useState(false);
    const [quizAnswers, setQuizAnswers] = useState({});
    const [quizResult, setQuizResult] = useState(null);
    const [loading, setLoading] = useState(true);
    const [categoryFilter, setCategoryFilter] = useState('all');

    useEffect(() => {
        Promise.all([
            apiFetch('/learning/modules'),
            apiFetch('/learning/progress')
        ]).then(([modData, progData]) => {
            setModules(modData.modules || []);
            setProgress(progData);
            setLoading(false);
        }).catch(() => setLoading(false));
    }, []);

    const openModule = (modId) => {
        apiFetch(`/learning/modules/${modId}`).then(data => {
            setSelectedModule(data);
            setActiveSection('learn');
            setQuizMode(false);
            setQuizResult(null);
            setQuizAnswers({});
        });
    };

    const submitQuiz = () => {
        apiFetch(`/learning/modules/${selectedModule.id}/quiz/submit`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({answers: quizAnswers})
        }).then(result => {
            setQuizResult(result);
            // Refresh modules
            apiFetch('/learning/modules').then(d => setModules(d.modules || []));
            apiFetch('/learning/progress').then(setProgress);
        });
    };

    if (loading) return <div style={{textAlign:'center',padding:60,color:'var(--text-muted)'}}>Loading Academy...</div>;

    // Module Detail View
    if (selectedModule) {
        const mod = selectedModule;
        const quiz = mod.quiz || [];
        const scenarios = mod.mock_scenarios || [];

        return (
            <div style={{animation:'fadeIn 0.3s ease'}}>
                <button className="btn btn-ghost btn-sm" onClick={() => setSelectedModule(null)} style={{marginBottom:20}}>← Back to Academy</button>

                <div className="glass" style={{borderRadius:16,padding:28,marginBottom:24}}>
                    <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:16}}>
                        <div style={{width:48,height:48,borderRadius:12,background:mod.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:mod.color}}>{mod.order}</div>
                        <div>
                            <h2 style={{fontSize:22,fontWeight:700}}>{mod.title}</h2>
                            <p style={{fontSize:14,color:'var(--text-secondary)',marginTop:2}}>{mod.subtitle}</p>
                        </div>
                    </div>
                    <div style={{display:'flex',gap:8,marginBottom:16}}>
                        <span className="badge badge-gold">{mod.duration_minutes} min</span>
                        <span className={`badge ${mod.progress?.quiz_passed ? 'badge-green' : 'badge-gray'}`}>Quiz: {mod.progress?.quiz_score != null ? mod.progress.quiz_score + '%' : 'Not taken'}</span>
                        <span className={`badge ${mod.progress?.mock_score >= 70 ? 'badge-green' : 'badge-gray'}`}>Mock: {mod.progress?.mock_score != null ? mod.progress.mock_score + '%' : 'Not done'}</span>
                    </div>

                    {/* Section tabs */}
                    <div style={{display:'flex',gap:4,borderBottom:'1px solid var(--border)',paddingBottom:8}}>
                        {[{id:'learn',label:'Learn'},{id:'quiz',label:'Quiz'},{id:'practice',label:'Practice'},{id:'mock',label:'Mock Calls'}].map(tab => (
                            <button key={tab.id} className={`btn btn-xs ${activeSection===tab.id?'btn-gold':'btn-ghost'}`} onClick={()=>{setActiveSection(tab.id);setQuizMode(tab.id==='quiz');setQuizResult(null);}}>{tab.label}</button>
                        ))}
                    </div>
                </div>

                {/* LEARN SECTION */}
                {activeSection === 'learn' && (
                    <div>
                        <div className="glass" style={{borderRadius:12,padding:24,marginBottom:16}}>
                            <h3 style={{fontSize:16,fontWeight:700,color:'var(--gold)',marginBottom:12}}>Learning Objectives</h3>
                            {mod.learning_objectives.map((obj, i) => (
                                <div key={i} style={{display:'flex',gap:10,marginBottom:8,fontSize:14,color:'var(--text-secondary)'}}>
                                    <span style={{color:'var(--success)',fontWeight:700}}>✓</span> {obj}
                                </div>
                            ))}
                        </div>

                        {(mod.key_concepts || []).map((concept, i) => (
                            <div key={i} className="glass" style={{borderRadius:12,padding:24,marginBottom:12}}>
                                <h4 style={{fontSize:15,fontWeight:700,marginBottom:8}}>{concept.title}</h4>
                                <p style={{fontSize:14,color:'var(--text-secondary)',lineHeight:1.7}}>{concept.content}</p>
                            </div>
                        ))}

                        <div className="glass" style={{borderRadius:12,padding:24,marginBottom:12,borderColor:'rgba(239,68,68,0.2)'}}>
                            <h4 style={{fontSize:15,fontWeight:700,marginBottom:8,color:'var(--danger)'}}>Common Mistakes to Avoid</h4>
                            {(mod.common_mistakes || []).map((m, i) => (
                                <div key={i} style={{display:'flex',gap:10,marginBottom:6,fontSize:14,color:'var(--text-secondary)'}}>
                                    <span style={{color:'var(--danger)'}}>✗</span> {m}
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* QUIZ SECTION */}
                {activeSection === 'quiz' && (
                    <div>

                            <div className="glass" style={{borderRadius:12,padding:24}}>
                                <div style={{textAlign:'center',marginBottom:24}}>
                                    <div style={{fontSize:48,fontWeight:800,color:quizResult.passed?'var(--success)':'var(--danger)'}}>{quizResult.percentage}%</div>

                                        <div style={{fontSize:13,color:r.is_correct?'var(--success)':'var(--danger)',marginBottom:4}}>{r.is_correct ? '✓ Correct' : '✗ Incorrect'}</div>

                                                     background: quizAnswers[String(qi)]===oi ? 'rgba(192,196,203,0.15)' : 'rgba(255,255,255,0.03)',
                                                     border: `1px solid ${quizAnswers[String(qi)]===oi ? 'var(--gold)' : 'var(--border)'}`,

                                <details style={{cursor:'pointer'}}>
                                    <summary style={{fontSize:13,color:'var(--gold)',fontWeight:600}}>View Sample Answer</summary>

// ============ WHATSAPP INBOX PAGE ============
const WhatsAppInboxPage = () => {
    const [conversations, setConversations] = useState([]);
    const [selected, setSelected] = useState(null);
    const [messages, setMessages] = useState([]);
    const [newMsg, setNewMsg] = useState('');
    const [loading, setLoading] = useState(true);
    const [filter, setFilter] = useState('');
    const [sending, setSending] = useState(false);
    const msgEnd = useRef(null);

    useEffect(() => { loadConversations(); }, []);
    useEffect(() => { if (msgEnd.current) msgEnd.current.scrollIntoView({behavior:'smooth'}); }, [messages]);

    const loadConversations = async () => {
        setLoading(true);
        try {
            const data = await apiFetch('/whatsapp/conversations');
            setConversations(data);
        } catch(e) { console.error(e); }
        setLoading(false);
    };

    const selectConvo = async (convo) => {
        setSelected(convo);
        try {
            const detail = await apiFetch(`/whatsapp/conversations/${convo.id}`);
            setMessages(detail.messages || []);
        } catch(e) { console.error(e); }
    };

    const sendMessage = async () => {
        if (!newMsg.trim() || !selected) return;
        setSending(true);
        try {
            await apiFetch(`/whatsapp/conversations/${selected.id}/send`, { method:'POST', body:{content:newMsg} });
            setNewMsg('');
            const detail = await apiFetch(`/whatsapp/conversations/${selected.id}`);
            setMessages(detail.messages || []);
            loadConversations();
        } catch(e) { console.error(e); }
        setSending(false);
    };

    const toggleAI = async () => {
        if (!selected) return;
        try {
            const res = await apiFetch(`/whatsapp/conversations/${selected.id}/toggle-ai`, {method:'POST'});
            setSelected({...selected, is_ai_handling: res.is_ai_handling, status: res.status});
            loadConversations();
        } catch(e) { console.error(e); }
    };

    const filtered = conversations.filter(c => !filter || (c.contact_name||'').toLowerCase().includes(filter.toLowerCase()) || (c.wa_phone||'').includes(filter));

    const timeAgo = (dt) => {
        if (!dt) return '';
        const diff = (Date.now() - new Date(dt).getTime()) / 1000;
        if (diff < 60) return 'now';
        if (diff < 3600) return Math.floor(diff/60) + 'm';
        if (diff < 86400) return Math.floor(diff/3600) + 'h';
        return Math.floor(diff/86400) + 'd';
    };

    return (
        <div className="fade-in">
            <h1 className="page-title" style={{fontSize:24,fontWeight:700,marginBottom:24}}>WhatsApp Inbox</h1>
            <div style={{display:'flex',gap:16,height:'calc(100vh - 140px)'}}>
                {/* Conversation List */}

                        </>
                    )}
                </div>
            </div>
        </div>
    );
};

    };

        setSaving(true); setMsg('');
        try {
            const res = await apiFetch('/whatsapp/ai-employee', {method:'PUT',body:config});

            setTimeout(()=>setMsg(''), 3000);
        } catch(e) { setMsg('Error saving'); }
        setSaving(false);
    };

                {/* Identity & Behavior */}

                    <h3 style={{fontSize:15,fontWeight:600,marginBottom:16,color:'var(--gold)'}}>Identity & Behavior</h3>

                        <div><label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:4}}>Assistant Name</label><input className="input" value={config.name||''} onChange={e=>updateField('name',e.target.value)}/></div>
                        <div><label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:4}}>Doctor Name</label><input className="input" value={config.doctor_name||''} onChange={e=>updateField('doctor_name',e.target.value)}/></div>
                        <div><label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:4}}>Tone</label>
                            <select className="input" value={config.tone||'professional'} onChange={e=>updateField('tone',e.target.value)}>
                                <option value="professional">Professional</option><option value="friendly">Friendly</option><option value="warm">Warm</option>
                            </select>
                        </div>
                        <div><label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:4}}>Language</label>
                            <select className="input" value={config.language||'english'} onChange={e=>updateField('language',e.target.value)}>

                        <div><label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:4}}>Clinic Phone</label><input className="input" value={config.clinic_phone||''} onChange={e=>updateField('clinic_phone',e.target.value)}/></div>

                                <input className="input" placeholder="Description" value={p.description||''} onChange={e=>updateProcedure(i,'description',e.target.value)} style={{fontSize:13}}/>

const LeadsPage = () => {

    useEffect(() => { loadLeads(); loadStats(); }, [filter.status, filter.source]);

        setLoading(true);
        let url = '/leads?limit=100';
        if (filter.status) url += `&status=${filter.status}`;
        if (filter.source) url += `&source=${filter.source}`;
        if (filter.search) url += `&search=${filter.search}`;
        try { setLeads(await apiFetch(url)); } catch(e) { console.error(e); }
        setLoading(false);
    };

    const loadStats = async () => {
        try { setStats(await apiFetch('/leads/stats')); } catch(e) {}
    };

    const searchLeads = () => loadLeads();

    const statusColors = {new:'badge-blue',contacted:'badge-yellow',qualified:'badge-gold',consultation_booked:'badge-green',converted:'badge-green',lost:'badge-red'};

                <select className="input" value={filter.status} onChange={e=>setFilter({...filter,status:e.target.value})} style={{maxWidth:160,fontSize:13}}>
                    <option value="">All Status</option><option value="new">New</option><option value="contacted">Contacted</option><option value="qualified">Qualified</option><option value="consultation_booked">Consultation Booked</option><option value="converted">Converted</option><option value="lost">Lost</option>
                </select>
                <select className="input" value={filter.source} onChange={e=>setFilter({...filter,source:e.target.value})} style={{maxWidth:160,fontSize:13}}>

                </select>
                <button className="btn btn-ghost btn-sm" onClick={searchLeads}>{Icons.search} Search</button>
            </div>
            {/* Table */}
            <div className="glass" style={{borderRadius:12,overflow:'hidden'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                    <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                        <th style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase'}}>Name</th>
                        <th style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase'}}>Phone</th>
                        <th style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase'}}>Source</th>

                        <th style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase'}}>Status</th>

                        leads.length === 0 ? <tr><td colSpan={7} style={{padding:24,textAlign:'center',color:'var(--text-muted)'}}>No leads found</td></tr> :
                        leads.map(l => (

const NurturePage = () => {
    const [sequences, setSequences] = useState([]);
    const [loading, setLoading] = useState(true);
    const [selected, setSelected] = useState(null);
    const [enrollments, setEnrollments] = useState([]);
    const [seeding, setSeeding] = useState(false);

    useEffect(() => { loadSequences(); }, []);

    const loadSequences = async () => {
        setLoading(true);
        try { setSequences(await apiFetch('/nurture/sequences')); } catch(e) { console.error(e); }
        setLoading(false);
    };

    const viewSequence = async (seq) => {
        try {
            const detail = await apiFetch(`/nurture/sequences/${seq.id}`);
            setSelected(detail);
        } catch(e) { console.error(e); }
    };

    const toggleSequence = async (id) => {
        try {
            await apiFetch(`/nurture/sequences/${id}/toggle`, {method:'PUT'});
            loadSequences();
        } catch(e) { console.error(e); }
    };

    const seedTemplates = async () => {
        setSeeding(true);
        try {
            const res = await apiFetch('/nurture/seed-templates', {method:'POST'});
            alert(`Templates seeded! ${res.template_count} templates available.`);
            loadSequences();
        } catch(e) { console.error(e); }
        setSeeding(false);
    };

    if (selected) {
        return (
            <div className="fade-in">
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>setSelected(null)}>{Icons.back} Back</button>
                    <h1 style={{fontSize:20,fontWeight:700}}>{selected.name}</h1>
                    <span className={`badge ${selected.is_active?'badge-green':'badge-red'}`}>{selected.is_active?'Active':'Inactive'}</span>
                    {selected.is_template && <span className="badge badge-blue">Template</span>}
                </div>
                <div className="glass" style={{padding:20,borderRadius:12,marginBottom:16}}>
                    <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:8}}>{selected.description}</div>
                    <div style={{fontSize:12,color:'var(--text-muted)'}}>Category: {selected.procedure_category || 'General'} | Steps: {selected.total_steps} | Trigger: {selected.trigger_type}</div>
                </div>
                <h3 style={{fontSize:16,fontWeight:600,marginBottom:12}}>Sequence Steps</h3>
                <div style={{display:'flex',flexDirection:'column',gap:12}}>
                    {(selected.steps || []).map((step, i) => (
                        <div key={step.id || i} className="glass" style={{padding:16,borderRadius:10}}>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                                <span style={{fontWeight:600,fontSize:13,color:'var(--gold)'}}>Step {step.step_number}</span>
                                <span style={{fontSize:12,color:'var(--text-muted)'}}>
                                    {step.delay_hours === 0 ? 'Immediately' : step.delay_type === 'days' ? `After ${step.delay_hours/24}d` : step.delay_type === 'weeks' ? `After ${step.delay_hours/168}w` : `After ${step.delay_hours}h`}
                                    {' via '}{step.channel} {step.is_ai_generated && '(AI personalized)'}
                                </span>
                            </div>
                            <div style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',background:'rgba(255,255,255,0.02)',padding:12,borderRadius:8,border:'1px solid var(--border)'}}>{step.message_template}</div>
                        </div>
                    ))}
                </div>
            </div>
        );

    return (
        <div className="fade-in">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}} className="resp-header">

                    {sequences.map(seq => (
                        <div key={seq.id} className="glass" style={{padding:20,borderRadius:12,cursor:'pointer'}} onClick={()=>viewSequence(seq)}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:8}}>
                                <h3 style={{fontSize:14,fontWeight:600,color:'var(--text-primary)'}}>{seq.name}</h3>
                                <span className={`badge ${seq.is_active?'badge-green':'badge-red'}`} style={{fontSize:10}}>{seq.is_active?'Active':'Off'}</span>
                            </div>
                            <p style={{fontSize:12,color:'var(--text-secondary)',marginBottom:8,lineHeight:1.5}}>{(seq.description||'').slice(0,100)}{(seq.description||'').length>100?'...':''}</p>
                            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                                {seq.procedure_category && <span className="badge badge-gold">{seq.procedure_category}</span>}
                                <span className="badge badge-gray">{seq.total_steps} steps</span>
                                {seq.is_template && <span className="badge badge-blue">Template</span>}
                            </div>
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
};

// ============ WHATSAPP SETTINGS PAGE ============
const SettingsPage = () => {
    const [waConfig, setWaConfig] = useState(null);
    const [waForm, setWaForm] = useState({phone_number_id:'',waba_id:'',access_token:'',business_name:'',business_phone:''});
    const [loading, setLoading] = useState(true);
    const [saving, setSaving] = useState(false);
    const [apiKey, setApiKey] = useState('');
    const [metaConfig, setMetaConfig] = useState(null);
    const [metaForm, setMetaForm] = useState({access_token:'',page_id:'',page_name:''});
    const [savingMeta, setSavingMeta] = useState(false);
    const [socialAccounts, setSocialAccounts] = useState([]);
    const [showSocialModal, setShowSocialModal] = useState(false);
    const [socialForm, setSocialForm] = useState({platform:'instagram',access_token:'',account_name:'',account_id:'',profile_url:''});
    const [savingSocial, setSavingSocial] = useState(false);
    const [gadsConfig, setGadsConfig] = useState(null);
    const [gadsForm, setGadsForm] = useState({customer_id:'',developer_token:'',client_id:'',client_secret:'',refresh_token:'',login_customer_id:''});
    const [savingGads, setSavingGads] = useState(false);
    const [settingsTab, setSettingsTab] = useState('connections');

    useEffect(() => { loadSettings(); }, []);

    const loadSettings = async () => {
        setLoading(true);
        try {
            const wa = await apiFetch('/whatsapp/config');
            if (wa) { setWaConfig(wa); setWaForm({phone_number_id:wa.phone_number_id||'',waba_id:wa.waba_id||'',access_token:'',business_name:wa.business_name||'',business_phone:wa.business_phone||''}); }
        } catch(e) {}
        try {
            const key = await apiFetch('/leads/api-key/current');
            if (key) setApiKey(key.api_key);
        } catch(e) {}
        try {
            const meta = await apiFetch('/meta/config');
            if (meta) { setMetaConfig(meta); setMetaForm({access_token:'',page_id:meta.page_id||'',page_name:meta.page_name||''}); }
        } catch(e) {}
        try {
            const accts = await apiFetch('/social/accounts');
            if (accts) setSocialAccounts(Array.isArray(accts) ? accts : []);
        } catch(e) {}
        try {
            const gc = await apiFetch('/google-ads/config');
            if (gc && !gc.detail) { setGadsConfig(gc); setGadsForm({customer_id:gc.customer_id||'',developer_token:'',client_id:'',client_secret:'',refresh_token:'',login_customer_id:gc.login_customer_id||''}); }
        } catch(e) {}
        setLoading(false);
    };

    const saveGoogleAds = async () => {
        setSavingGads(true);
        try {
            const body = {...gadsForm};
            Object.keys(body).forEach(k => { if(!body[k]) delete body[k]; });
            const res = await apiFetch('/google-ads/config', {method:'POST', body});
            setGadsConfig(res);
            alert('Google Ads config saved!');
        } catch(e) { alert('Error saving'); }
        setSavingGads(false);
    };

    const saveWhatsApp = async () => {
        setSaving(true);
        try {
            const body = {...waForm};
            if (!body.access_token && waConfig) delete body.access_token;
            const res = await apiFetch('/whatsapp/config', {method:'POST', body});
            setWaConfig(res);
            alert('WhatsApp config saved!');
        } catch(e) { alert('Error saving'); }
        setSaving(false);
    };

    const disconnectWhatsApp = async () => {
        if (!confirm('Disconnect WhatsApp?')) return;
        try { await apiFetch('/whatsapp/config', {method:'DELETE'}); setWaConfig(null); alert('Disconnected'); } catch(e) {}
    };

    const regenApiKey = async () => {
        if (!confirm('Regenerate API key? Old webhooks will stop working.')) return;
        try { const res = await apiFetch('/leads/api-key/regenerate', {method:'POST'}); setApiKey(res.api_key); } catch(e) {}
    };

    const saveMeta = async () => {
        setSavingMeta(true);
        try {
            const body = {...metaForm};
            if (!body.access_token && metaConfig) { setSavingMeta(false); alert('Access token required'); return; }
            const res = await apiFetch('/meta/connect', {method:'POST', body});
            setMetaConfig(res);
            setMetaForm({access_token:'',page_id:res.page_id||'',page_name:res.page_name||''});
            alert('Meta Ads connected!');
        } catch(e) { alert('Error connecting Meta'); }
        setSavingMeta(false);
    };

    const disconnectMeta = async () => {
        if (!confirm('Disconnect Meta Ads?')) return;
        try { await apiFetch('/meta/disconnect', {method:'DELETE'}); setMetaConfig(null); setMetaForm({access_token:'',page_id:'',page_name:''}); alert('Meta disconnected'); } catch(e) {}
    };

    const connectSocial = async () => {
        setSavingSocial(true);
        try {
            const res = await apiFetch('/social/accounts', {method:'POST', body:socialForm});
            setSocialAccounts(prev => {
                const idx = prev.findIndex(a => a.platform === res.platform);
                if (idx >= 0) { const n = [...prev]; n[idx] = res; return n; }
                return [...prev, res];
            });
            setShowSocialModal(false);
            setSocialForm({platform:'instagram',access_token:'',account_name:'',account_id:'',profile_url:''});
            alert('Account connected!');

// ============ UNIFIED INBOX PAGE ============
const UnifiedInboxPage = () => {
    const [conversations, setConversations] = useState([]);
    const [stats, setStats] = useState(null);
    const [selected, setSelected] = useState(null);
    const [messages, setMessages] = useState([]);
    const [newMsg, setNewMsg] = useState('');
    const [filter, setFilter] = useState('all');
    const [loading, setLoading] = useState(true);
    const [sending, setSending] = useState(false);
    const [aiLoading, setAiLoading] = useState(false);

    useEffect(() => {
        Promise.all([
            apiFetch('/inbox/conversations').catch(()=>[]),
            apiFetch('/inbox/stats').catch(()=>null)
        ]).then(([convos, s]) => { const arr = Array.isArray(convos?.conversations) ? convos.conversations : Array.isArray(convos) ? convos : []; setConversations(arr); setStats(s); setLoading(false); });
    }, []);

    const selectConvo = async (convo) => {
        setSelected(convo);
        try {
            const detail = await apiFetch(`/inbox/conversations/${convo.id}`);
            setMessages(detail.messages || []);
        } catch(e) { setMessages([]); }
    };

    const sendMessage = async () => {
        if(!newMsg.trim() || !selected) return;
        setSending(true);
        try {
            const resp = await apiFetch(`/inbox/conversations/${selected.id}/messages`, { method:'POST', body:{ content:newMsg, channel: selected.platform || 'whatsapp' }});
            setMessages(prev => [...prev, resp]);
            setNewMsg('');
        } catch(e) { alert(e.message); }
        setSending(false);
    };

    const generateAiReply = async () => {
        if(!selected) return;
        setAiLoading(true);
        try {
            const resp = await apiFetch(`/inbox/conversations/${selected.id}/ai-reply`, { method:'POST' });
            if(resp.suggested_reply) setNewMsg(resp.suggested_reply);
        } catch(e) { alert(e.message); }
        setAiLoading(false);
    };

    const filtered = filter === 'all' ? conversations : conversations.filter(c => c.platform === filter);
    const platformIcons = {whatsapp:'\uD83D\uDCAC', instagram:'\uD83D\uDCF8', facebook:'\uD83D\uDC4D', linkedin:'\uD83D\uDD17', x:'\uD835\uDD4F', email:'\u2709\uFE0F'};
    const timeAgo = (d) => { if(!d) return ''; const diff = Date.now() - new Date(d).getTime(); const mins = Math.floor(diff/60000); if(mins<60) return mins+'m'; const hrs = Math.floor(mins/60); if(hrs<24) return hrs+'h'; return Math.floor(hrs/24)+'d'; };

    return (
        <div className="fade-in">
            <h1 className="page-title" style={{fontSize:24,fontWeight:700,marginBottom:20}}>Unified Inbox</h1>
            {stats && <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
                {[{label:'Total Conversations',value:stats.total_conversations||0},{label:'Unread',value:stats.unread_count||0},{label:'AI Handled',value:stats.ai_handled||0},{label:'Avg Response',value:stats.avg_response_time||'N/A'}].map(s=>(
                    <div key={s.label} className="glass" style={{padding:14,borderRadius:10}}>
                        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:6}}>{s.label}</div>
                        <div style={{fontSize:22,fontWeight:700,color:'var(--gold)'}}>{s.value}</div>
                    </div>
                ))}
            </div>}
            <div style={{display:'flex',gap:16,height:'calc(100vh - '+(stats?'240':'140')+'px)'}}>
                <div className="glass" style={{width:320,borderRadius:12,display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
                    <div style={{padding:12,borderBottom:'1px solid var(--border)',display:'flex',gap:8,flexWrap:'wrap'}}>
                        {['all','whatsapp','instagram','facebook','email'].map(p => (
                            <button key={p} onClick={()=>setFilter(p)} className={filter===p?'btn btn-gold':'btn btn-ghost'} style={{fontSize:11,padding:'4px 10px'}}>
                                {p.charAt(0).toUpperCase() + p.slice(1)}
                            </button>
                        ))}
                    </div>
                    <div style={{flex:1,overflowY:'auto',overflowX:'hidden'}} className="scrollbar-hide">
                        {loading ? <div style={{padding:20,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>Loading...</div> : filtered.length===0 ? <div style={{padding:20,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No conversations</div> : filtered.map(c => (
                            <div key={c.id} onClick={()=>selectConvo(c)} style={{padding:12,borderBottom:'1px solid var(--border)',cursor:'pointer',background:selected?.id===c.id?'rgba(192,196,203,0.08)':'transparent',transition:'all 0.2s'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:6}}>
                                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                                        <span style={{fontSize:16}}>{platformIcons[c.platform]||'\uD83D\uDCAC'}</span>
                                        <span style={{fontWeight:600,fontSize:13,color:'var(--text-primary)'}}>{c.contact_name||c.lead_name||'Unknown'}</span>
                                    </div>
                                    <span style={{fontSize:11,color:'var(--text-muted)'}}>{timeAgo(c.last_message_at||c.updated_at)}</span>
                                </div>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                    <span style={{fontSize:12,color:'var(--text-secondary)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:200}}>{c.last_message||c.subject||''}</span>
                                    {(c.unread_count>0||c.unread) && <span className="badge badge-gold" style={{fontSize:10}}>NEW</span>}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
                <div className="glass" style={{flex:1,borderRadius:12,display:'flex',flexDirection:'column',overflow:'hidden'}}>
                    {!selected ? (
                        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)'}}>Select a conversation to start</div>
                    ) : (
                        <>
                            <div style={{padding:'12px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                <div>
                                    <span style={{fontWeight:600,fontSize:14}}>{selected.contact_name||selected.lead_name||'Unknown'}</span>
                                    <span className="badge" style={{marginLeft:10,fontSize:10}}>{platformIcons[selected.platform]||''} {selected.platform}</span>
                                </div>
                                <div style={{display:'flex',gap:8}}>
                                    <span className={`badge ${selected.status==='active'?'badge-green':selected.status==='handed_off'?'badge-yellow':'badge-gray'}`} style={{fontSize:10}}>{selected.status||'active'}</span>
                                </div>
                            </div>
                            <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:10}} className="scrollbar-hide">
                                {messages.length===0 ? <div style={{textAlign:'center',color:'var(--text-muted)',fontSize:13,marginTop:40}}>No messages yet</div> : messages.map((m,i) => (
                                    <div key={m.id||i} style={{display:'flex',justifyContent:(m.direction==='outbound'||m.sender_type==='agent'||m.sender_type==='ai_employee')?'flex-end':'flex-start'}}>
                                        <div style={{maxWidth:'65%',padding:'10px 14px',borderRadius:10,fontSize:13,background:(m.direction==='outbound'||m.sender_type==='agent'||m.sender_type==='ai_employee')?'rgba(59,130,246,0.15)':'rgba(255,255,255,0.05)',border:'1px solid '+((m.direction==='outbound'||m.sender_type==='agent'||m.sender_type==='ai_employee')?'rgba(59,130,246,0.2)':'var(--border)'),color:'var(--text-primary)'}}>
                                            {m.sender_type==='ai_employee' && <div style={{fontSize:10,color:'var(--gold)',marginBottom:4}}>AI Employee</div>}
                                            {m.content}<div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>{m.created_at ? new Date(m.created_at).toLocaleTimeString() : ''}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div style={{padding:12,borderTop:'1px solid var(--border)',display:'flex',gap:8}}>
                                <button className="btn btn-ghost" onClick={generateAiReply} disabled={aiLoading} style={{fontSize:11,whiteSpace:'nowrap'}}>{aiLoading?'Thinking...':'AI Reply'}</button>
                                <input className="input" placeholder="Type message..." value={newMsg} onChange={e=>setNewMsg(e.target.value)} onKeyPress={e=>e.key==='Enter'&&sendMessage()} style={{flex:1,fontSize:13}}/>
                                <button className="btn btn-gold" onClick={sendMessage} disabled={sending} style={{fontSize:12}}>{sending?'...':'Send'}</button>
                            </div>
                        </>
                    )}
                </div>
            </div>
        </div>
    );
};

const HiringPage = () => {
    const [tab, setTab] = useState('positions');

    const [positions, setPositions] = useState([]);
    const [candidates, setCandidates] = useState([]);
    const [loading, setLoading] = useState(true);
    const [showAddPosition, setShowAddPosition] = useState(false);
    const [showAddCandidate, setShowAddCandidate] = useState(false);
    const [newPosition, setNewPosition] = useState({title:'',department:'',salary_range:'',description:'',requirements:''});
    const [newCandidate, setNewCandidate] = useState({name:'',email:'',phone:'',position_id:'',source:'',resume_text:''});
    const [genJdLoading, setGenJdLoading] = useState(null);
    const [evalLoading, setEvalLoading] = useState(null);

    const loadData = () => {
        setLoading(true);
        Promise.all([
            apiFetch('/hiring/dashboard').catch(()=>null),
            apiFetch('/hiring/positions').catch(()=>[]),
            apiFetch('/hiring/candidates').catch(()=>[])
        ]).then(([d, p, c]) => { setDashboard(d); const posArr = Array.isArray(p?.positions) ? p.positions : Array.isArray(p) ? p : []; setPositions(posArr); const canArr = Array.isArray(c?.candidates) ? c.candidates : Array.isArray(c) ? c : []; setCandidates(canArr); setLoading(false); });
    };
    useEffect(loadData, []);

    const createPosition = async () => {
        try {
            await apiFetch('/hiring/positions', { method:'POST', body:newPosition });
            setShowAddPosition(false); setNewPosition({title:'',department:'',salary_range:'',description:'',requirements:''});
            loadData();
        } catch(e) { alert(e.message); }
    };

    const addCandidate = async () => {
        try {
            await apiFetch('/hiring/candidates', { method:'POST', body:newCandidate });
            setShowAddCandidate(false); setNewCandidate({name:'',email:'',phone:'',position_id:'',source:'',resume_text:''});
            loadData();
        } catch(e) { alert(e.message); }
    };

    const generateJD = async (posId) => {
        setGenJdLoading(posId);
        try {
            const resp = await apiFetch(`/hiring/positions/${posId}/generate-jd`, { method:'POST' });
            alert('JD Generated! Check the position details.');
            loadData();
        } catch(e) { alert(e.message); }
        setGenJdLoading(null);
    };

    const aiEvaluate = async (candId) => {
        setEvalLoading(candId);
        try {
            await apiFetch(`/hiring/candidates/${candId}/ai-evaluate`, { method:'POST' });
            loadData();
        } catch(e) { alert(e.message); }
        setEvalLoading(null);
    };

    const interviews = candidates.filter(c => c.interviews && c.interviews.length > 0).flatMap(c => (c.interviews||[]).map(iv => ({...iv, candidate_name: c.name, position_title: c.position_title || ''})));
    const statBadgeColor = (s) => s==='open'||s==='Open'?'badge-green':s==='reviewing'||s==='Reviewing'?'badge-yellow':'badge-gray';

    const loadData = () => {
        setLoading(true);
        Promise.all([
            apiFetch('/consultations').catch(()=>[]),
            apiFetch('/consultations/dashboard').catch(()=>null)
        ]).then(([c, d]) => { const conArr = Array.isArray(c?.consultations) ? c.consultations : Array.isArray(c) ? c : []; setConsultations(conArr); setDashboard(d); setLoading(false); });
    };
    useEffect(loadData, []);

    const selectConsult = async (c) => {
        setSelected(c);

            const d = await apiFetch(`/consultations/${c.id}`);
            setDetail(d);

    const scheduleNew = async () => {

            const resp = await apiFetch(`/consultations/${id}/analyze`, { method:'POST' });
            setDetail(prev => ({...prev, analysis: resp.analysis || resp}));
        } catch(e) { alert(e.message); }
        setAnalyzing(false);

                    <div key={s.label} className="glass" style={{padding:16,borderRadius:10}}>
                        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{s.label}</div>
                        <div style={{fontSize:24,fontWeight:700,color:'var(--gold)'}}>{s.value}</div>

                    <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:8}} className="scrollbar-hide">
                        {loading ? <div style={{padding:20,textAlign:'center',color:'var(--text-muted)'}}>Loading...</div> : consultations.length===0 ? <div style={{padding:20,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No consultations yet</div> : consultations.map(c => (
                            <div key={c.id} onClick={()=>selectConsult(c)} style={{padding:12,border:'1px solid var(--border)',borderRadius:8,cursor:'pointer',background:selected?.id===c.id?'rgba(192,196,203,0.08)':'transparent',transition:'all 0.2s'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:6}}>

                                    <span className={c.status==='completed'?'badge badge-green':c.status==='scheduled'?'badge badge-blue':'badge badge-yellow'} style={{fontSize:10}}>{c.status}</span>

                        <div style={{flex:1,overflowY:'auto'}} className="scrollbar-hide">
                            <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>{d.patient_name} - {d.doctor_name}</div>
                            {d.transcription && <div style={{marginBottom:16}}>
                                <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:8,fontWeight:600}}>Transcription</div>
                                <div style={{fontSize:12,color:'var(--text-primary)',lineHeight:1.6,padding:12,background:'rgba(255,255,255,0.02)',borderRadius:8,maxHeight:120,overflowY:'auto'}} className="scrollbar-hide">{d.transcription}</div>

                            <div><span style={{color:'var(--text-muted)',fontSize:12}}>Procedure:</span> <span style={{fontWeight:600,fontSize:13}}>{d.procedure||'General'}</span></div>
                            <div><span style={{color:'var(--text-muted)',fontSize:12}}>Date & Time:</span> <span style={{fontWeight:600,fontSize:13}}>{d.scheduled_at ? new Date(d.scheduled_at).toLocaleString() : ''}</span></div>
                            {d.notes && <div><span style={{color:'var(--text-muted)',fontSize:12}}>Notes:</span> <span style={{fontSize:13}}>{d.notes}</span></div>}
                            {d.meeting_link && <div style={{marginTop:12}}>
                                <a href={d.meeting_link} target="_blank" rel="noopener noreferrer" className="btn btn-gold" style={{width:'100%',textAlign:'center',fontSize:12}}>Join Meeting</a>
                            </div>}
                        </div>
                    )}
                </div>
            </div>
            {showSchedule && <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={()=>setShowSchedule(false)}>

                    {['patient_name','doctor_name','procedure','meeting_link'].map(f=>(
                        <div key={f} style={{marginBottom:12}}>
                            <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>{f.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</label>

                    ))}
                    <div style={{marginBottom:12}}>
                        <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Date & Time</label>
                        <input className="input" type="datetime-local" value={newConsult.scheduled_at} onChange={e=>setNewConsult({...newConsult,scheduled_at:e.target.value})} style={{fontSize:13,width:'100%'}}/>

                        <textarea className="input" value={newConsult.notes} onChange={e=>setNewConsult({...newConsult,notes:e.target.value})} rows={3} style={{fontSize:13,width:'100%'}}/>
                    </div>
                    <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
