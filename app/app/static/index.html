                            {title:'Step 6: Create System User and Access Token',desc:'Go to Business Settings > Users > System Users. Create a new system user (name it "SBA CRM"). Assign it the "Admin" role. Generate a token with these permissions: ads_management, ads_read, leads_retrieval, pages_read_engagement, pages_manage_metadata, whatsapp_business_management. Copy the token immediately as it will not be shown again.',link:'https://business.facebook.com/settings/system-users',tips:['Never share system user tokens in plain text','Set token expiry to "Never" for CRM integration','If token expires, regenerate and update in Settings']},
                            {title:'Step 7: Get Your Page ID',desc:'Go to your Facebook Page > About > Page Transparency. Your Page ID is the numeric ID shown there. Alternatively, go to Business Settings > Accounts > Pages and copy the ID from there. You need this to connect lead forms and run page-level ads.',link:'https://www.facebook.com/business/help/1199464373557428',tips:['Store your Page ID in a safe place','Each page has a unique numeric ID','Page ID is different from page username']},
                            {title:'Step 8: Set Up Lead Form Webhooks',desc:'For progressive lead forms: In Meta App Dashboard > Webhooks, subscribe to the "leadgen" webhook event. Use your SBA CRM webhook URL from Settings > Integrations. This ensures every lead form submission is instantly sent to your CRM for immediate follow-up and nurture sequence enrollment.',link:'https://developers.facebook.com/docs/marketing-api/guides/lead-ads/',tips:['Test webhook with Meta lead ad testing tool','Set up instant notification alerts for new leads','Auto-enroll leads in nurture sequences via CRM']},
                            {title:'Step 9: Configure Audiences',desc:'Before launching ads, create these audiences in Ads Manager > Audiences: (1) Custom Audience from website visitors (last 30 days), (2) Custom Audience from video viewers (50% watched, last 30 days), (3) Custom Audience from page engagers (last 90 days), (4) Custom Audience from lead form openers who did not submit. Then create Lookalike audiences (1%) from your converted leads list once you have 50+ conversions.',link:'https://adsmanager.facebook.com/adsmanager/audiences',tips:['Start with broad targeting, add interests only for low budgets','Exclude existing patients from prospecting campaigns','Refresh lookalike audiences monthly with new data']},
                            {title:'Step 10: Enter Credentials in SBA CRM',desc:'Go to Settings > Meta Ads section in SBA CRM. Enter: Page ID, Page Name, Access Token (system user token from Step 6), and WABA Phone Number ID (from Step 5). Click "Test Connection" to verify. Once connected, all lead form submissions and WhatsApp conversations will auto-sync to your CRM.'},
                            {title:'Step 11: Launch Your First Campaign',desc:'Use the Campaign Strategy Generator tab above to get a complete SBA-methodology campaign plan. Follow the WhatsApp click-to-chat funnel as your primary strategy. Start with 50% of your planned budget for the first 3 days. Monitor CPL and adjust. Use the 72-Hour Report feature to track performance and make data-driven optimizations.',tips:['Never edit ads in the first 24 hours (let Meta learn)','Check ad rejections within 2 hours of launch','Use the Retargeting tab to set up warm audience campaigns after Day 7']}
                        ].map((s,i) => (

                                {s.link && <a href={s.link} target="_blank" rel="noopener" style={{fontSize:12,color:'var(--gold)',textDecoration:'underline',marginTop:8,display:'inline-block'}}>Open Link</a>}

                </div>

        </div>

};

// ============ GOOGLE ADS MANAGEMENT ============
const GoogleAdsPage = () => {
    const [activeTab, setActiveTab] = useState('search-ads');

                    {result && <div className="glass" style={{padding:20,borderRadius:12}}><h3 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Generated Search Ads</h3><DeepRender data={result.ads}/><RegenerateWithChanges loading={loading} onRegenerate={(changes)=>generate('generate-search-ads',{procedure:form.procedure,location:form.location,usp:form.usp,num_ads:parseInt(form.num_ads)||3},changes)}/></div>}

                            <StableInput label="Location" value={form.location} onChange={e=>updateForm('location',e.target.value)} placeholder="Delhi, Mumbai"/>
                        </div>
                        <button className="btn btn-gold" onClick={()=>generate('generate-keywords',{procedures:form.procedures?form.procedures.split(',').map(s=>s.trim()):[form.procedure||'aesthetic treatment'],location:form.location})} disabled={loading}>{loading?'Generating...':'Generate Keywords'}</button>
                    </div>
                    {result && <div className="glass" style={{padding:20,borderRadius:12}}><h3 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Keyword Research</h3><DeepRender data={result.keywords}/><RegenerateWithChanges loading={loading} onRegenerate={(changes)=>generate('generate-keywords',{procedures:form.procedures?form.procedures.split(',').map(s=>s.trim()):[form.procedure||'aesthetic treatment'],location:form.location},changes)}/></div>}
                    <GenerationHistory endpoint="google-ads" filterAction="keywords" onRestore={(o)=>setResult(o)}/>
                </div>

                    <GenerationHistory endpoint="google-ads" filterAction="landing_page" onRestore={(o)=>setResult(o)}/>
                </div>
            )}

            {activeTab === 'campaign' && (
                <div>
                    <div className="glass" style={{padding:20,borderRadius:12,marginBottom:16}}>
                        <h3 style={{fontSize:14,fontWeight:600,marginBottom:12,color:'var(--gold)'}}>Campaign Structure Generator</h3>
                        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:12}}>
                            <StableInput label="Procedures (comma-separated)" value={form.procedures} onChange={e=>updateForm('procedures',e.target.value)} placeholder="Hair Transplant, Botox, PRP"/>
                            <StableInput label="Monthly Budget (INR)" value={form.monthly_budget} onChange={e=>updateForm('monthly_budget',e.target.value)} type="number" placeholder="50000"/>
                            <StableInput label="Location" value={form.location} onChange={e=>updateForm('location',e.target.value)} placeholder="Mumbai"/>
                        </div>
                        <button className="btn btn-gold" onClick={()=>generate('generate-campaign-structure',{procedures:form.procedures?form.procedures.split(',').map(s=>s.trim()):[form.procedure||'aesthetic treatments'],monthly_budget:form.monthly_budget,location:form.location})} disabled={loading}>{loading?'Generating...':'Generate Structure'}</button>
                    </div>
                    {result && <div className="glass" style={{padding:20,borderRadius:12}}><h3 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Campaign Structure</h3><DeepRender data={result.structure}/><RegenerateWithChanges loading={loading} onRegenerate={(changes)=>generate('generate-campaign-structure',{procedures:form.procedures?form.procedures.split(',').map(s=>s.trim()):[form.procedure||'aesthetic treatments'],monthly_budget:form.monthly_budget,location:form.location},changes)}/></div>}
                    <GenerationHistory endpoint="google-ads" filterAction="campaign_structure" onRestore={(o)=>setResult(o)}/>
                </div>

                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>Performance Overview</h3>
                    {perf ? <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:16}}>{Object.entries(perf).map(([k,v])=><div key={k} style={{padding:16,border:'1px solid var(--border)',borderRadius:10}}><div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4,textTransform:'uppercase'}}>{k.replace(/_/g,' ')}</div><div style={{fontSize:18,fontWeight:700}}>{typeof v==='number'?v.toLocaleString():v}</div></div>)}</div> : <p style={{color:'var(--text-muted)',textAlign:'center',padding:30}}>Connect Google Ads in Settings to see performance data</p>}

            )}

            {activeTab === 'setup' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <h3 style={{fontSize:16,fontWeight:600,marginBottom:16,color:'var(--gold)'}}>Google Ads Complete Setup Guide</h3>
                    <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:20}}>Follow these steps to connect your Google Ads account, set up conversion tracking, configure landing pages, and start running search ads for your clinic.</p>
                    <div style={{display:'flex',flexDirection:'column',gap:16}}>
                        {[
                            {title:'Step 1: Create Google Ads Account',desc:'Go to ads.google.com and create a new Google Ads account. Use your clinic business email. Select "Expert Mode" (not Smart Mode) for full control over campaigns. Set your billing to INR and timezone to IST. Add a payment method (credit card, debit card, or UPI).',link:'https://ads.google.com/',tips:['Always use Expert Mode for full campaign control','Set a conservative daily budget initially (Rs. 500-1000)','Enable auto-tagging for proper conversion tracking']},
                            {title:'Step 2: Get Your Customer ID',desc:'Your Google Ads Customer ID is the 10-digit number shown in the top-right corner of your Google Ads dashboard (format: XXX-XXX-XXXX). Copy this number. You will need it to connect Google Ads to SBA CRM.',link:'https://ads.google.com/',tips:['Customer ID is account-specific, not user-specific','If you manage multiple accounts, use the MCC (Manager) account ID','Store the Customer ID securely']},
                            {title:'Step 3: Set Up Conversion Tracking',desc:'Go to Tools & Settings > Measurement > Conversions. Create conversion actions for: (1) Phone Calls from ads (call extensions), (2) Website Form Submissions (use Google Tag or GTM), (3) WhatsApp Click (track as custom conversion), (4) Booking Confirmation (if you have online booking). For each conversion, set the category to "Lead" and count "One" per interaction. Set the conversion window to 30 days.',link:'https://ads.google.com/aw/conversions',tips:['Install Google Tag (gtag.js) on all website pages','Use Google Tag Manager for easier event management','Test each conversion action before launching ads']},
                            {title:'Step 4: Install Google Tag on Website',desc:'Go to Tools & Settings > Setup > Google Tag. Copy the tag code and install it on every page of your clinic website in the <head> section. For WordPress, use the "Site Kit by Google" plugin or "Google Tag Manager for WordPress" plugin. This enables conversion tracking, remarketing audiences, and proper attribution.',link:'https://tagmanager.google.com/',tips:['Use Google Tag Assistant Chrome extension to verify installation','Set up enhanced conversions for better attribution','Install on landing pages as well, not just your main website']},
                            {title:'Step 5: Create Developer Token (for API access)',desc:'To connect Google Ads to SBA CRM via API: Go to Google Ads > Tools & Settings > Setup > API Center. Apply for a developer token. For basic access (read-only reporting), approval is usually fast. For standard access (campaign management), you need to fill out an application form. The token format is a long alphanumeric string.',link:'https://developers.google.com/google-ads/api/docs/first-call/dev-token',tips:['Basic access is sufficient for reporting integration','Standard access takes 3-5 business days for approval','Keep your developer token confidential']},
                            {title:'Step 6: Set Up OAuth 2.0 Credentials',desc:'Go to Google Cloud Console > APIs & Services > Credentials. Create a new OAuth 2.0 Client ID (type: Web Application). Add your redirect URI. Generate a refresh token using the OAuth Playground or the google-ads-api authentication flow. You need: Client ID, Client Secret, and Refresh Token.',link:'https://console.cloud.google.com/apis/credentials',tips:['Enable the Google Ads API in your Google Cloud project first','Use OAuth Playground for easy refresh token generation','Refresh tokens do not expire unless you revoke them']},
                            {title:'Step 7: Configure Landing Pages',desc:'For each procedure you advertise, create a dedicated landing page with: (1) Hero section with procedure name and CTA, (2) Doctor credentials and clinic trust signals, (3) Before/After concepts (no real patient photos without consent), (4) FAQ section addressing top 5 patient concerns, (5) WhatsApp click-to-chat button (SBA primary CTA), (6) Phone call button, (7) Simple lead form (name + phone only). Install Google Tag on each landing page. Use the Landing Page Copy Generator tab to get AI-generated copy.',tips:['One landing page per procedure for better Quality Score','Mobile-first design (80%+ traffic is mobile)','Page load speed under 3 seconds','Include the city/location name for local SEO']},
                            {title:'Step 8: Set Up Form Webhook (Lead Capture)',desc:'Point your landing page form to the SBA CRM webhook URL. Go to Settings > Integrations in SBA CRM to get your unique webhook URL. Add hidden fields for utm_source, utm_medium, utm_campaign to track which ad brought the lead. Form submissions will auto-create leads in CRM with campaign tagging and trigger nurture sequences.',tips:['Test the webhook with a dummy submission first','Include UTM parameters in your Google Ads final URLs','Set up instant WhatsApp notification for new leads']},
                            {title:'Step 9: Create Remarketing Audiences',desc:'Go to Tools & Settings > Shared Library > Audience Manager. Create these audiences: (1) All website visitors (last 30 days), (2) Procedure page visitors (last 14 days), (3) Form page visitors who did not submit (last 7 days), (4) Past converters (for exclusion). These audiences power your remarketing campaigns on both Google Display and YouTube.',link:'https://ads.google.com/aw/audiences',tips:['Minimum audience size for remarketing is 1,000 users','Create separate audiences per procedure page','Use audience insights to understand your visitor demographics']},

// ============ SOCIAL MEDIA SCHEDULING ============
const SocialSchedulingPage = () => {
    const [posts, setPosts] = useState([]);
    const [accounts, setAccounts] = useState([]);
    const [loading, setLoading] = useState(true);
    const [activeTab, setActiveTab] = useState('calendar');
    const [showCompose, setShowCompose] = useState(false);
    const [newPost, setNewPost] = useState({content:'',platforms:[],scheduled_at:'',media_urls:[]});
    const [aiIdeas, setAiIdeas] = useState('');
    const [aiLoading, setAiLoading] = useState(false);

    useEffect(() => {
        setLoading(true);
        Promise.all([
            apiFetch('/social/posts').catch(() => []),
            apiFetch('/social/accounts').catch(() => [])
        ]).then(([p, a]) => {
            setPosts(Array.isArray(p) ? p : []);
            setAccounts(Array.isArray(a) ? a : []);
            setLoading(false);
        });
    }, []);

    const createPost = async () => {
        if (!newPost.content) { alert('Content required'); return; }
        try {
            const res = await apiFetch('/social/posts', {method:'POST', body:newPost});
            setPosts(prev => [res, ...prev]);
            setShowCompose(false);
            setNewPost({content:'',platforms:[],scheduled_at:'',media_urls:[]});
        } catch(e) { alert('Failed to create post: ' + (e.message || 'Check all fields and try again')); }
    };

    const deletePost = async (id) => {
        if (!confirm('Delete this post?')) return;
        try { await apiFetch(`/social/posts/${id}`, {method:'DELETE'}); setPosts(prev => prev.filter(p => p.id !== id)); } catch(e) {}
    };

    const generateIdeas = async (regenerateChanges) => {
        setAiLoading(true);
        try {
            const body = {content_type:'post',platform:'instagram',num_ideas:5};
            if (regenerateChanges) body.regenerate_changes = regenerateChanges;
            const res = await apiFetch('/social/generate-content', {method:'POST', body});
            setAiIdeas(res.ideas || '');
        } catch(e) { alert('AI generation failed: ' + (e.message || 'Check your API key in Settings')); } finally { setAiLoading(false); }
    };

    const togglePlatform = (p) => {
        setNewPost(prev => ({...prev, platforms: prev.platforms.includes(p) ? prev.platforms.filter(x=>x!==p) : [...prev.platforms, p]}));
    };

    const tabs = [{id:'calendar',label:'Calendar'},{id:'compose',label:'Compose'},{id:'ai',label:'AI Ideas'},{id:'accounts',label:'Accounts'}];
    const statusColors = {draft:'badge-gray',scheduled:'badge-blue',published:'badge-green',failed:'badge-red'};

    if (loading) return <div style={{padding:40,textAlign:'center'}}><span className="spinner"></span></div>;

    return (
        <div className="fade-in">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
                <div>
                    <h1 style={{fontSize:24,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>Social Media Scheduling</h1>
                    <p style={{color:'var(--text-muted)',fontSize:14,marginTop:4}}>Schedule, compose, and manage posts across all platforms</p>
                </div>
                <button className="btn btn-gold" onClick={()=>{setActiveTab('compose');setShowCompose(true);}}>+ New Post</button>
            </div>

            <div className="stat-card-row" style={{display:'flex',gap:16,marginBottom:24,flexWrap:'wrap'}}>
                <StatCard label="Accounts" value={accounts.length}/>
                <StatCard label="Scheduled" value={posts.filter(p=>p.status==='scheduled').length} accent="var(--gold)"/>
                <StatCard label="Published" value={posts.filter(p=>p.status==='published').length} accent="var(--success)"/>
                <StatCard label="Drafts" value={posts.filter(p=>p.status==='draft').length}/>
            </div>

            <div style={{display:'flex',gap:4,marginBottom:24,overflowX:'auto',paddingBottom:2}}>
                {tabs.map(t => <button key={t.id} className={`detail-tab ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>{t.label}</button>)}
            </div>

            {activeTab === 'calendar' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>Post Calendar</h3>
                    {posts.length === 0 ? (

};

// ============ SBA AI PAGE ============
const SBAIPage = () => {
    const [messages, setMessages] = useState([]);
    const [input, setInput] = useState('');
    const [loading, setLoading] = useState(false);
    const [mode, setMode] = useState('coach');
    const [suggestions, setSuggestions] = useState(null);
    const messagesEndRef = React.useRef(null);
    const inputRef = React.useRef(null);

    useEffect(() => {
        apiFetch('/sba-ai/suggestions').then(setSuggestions).catch(()=>{});
    }, []);

    useEffect(() => {
        messagesEndRef.current?.scrollIntoView({behavior:'smooth'});
    }, [messages]);

    const sendMessage = async (text) => {
        const msg = text || input.trim();
        if (!msg || loading) return;
        setInput('');
        const userMsg = {role:'user', content:msg};
        const newMsgs = [...messages, userMsg];
        setMessages(newMsgs);
        setLoading(true);
        try {
            const conversation = newMsgs.slice(0,-1).map(m=>({role:m.role,content:m.content}));
            const res = await apiFetch('/sba-ai/chat', {
                method:'POST',
                body: {message:msg, conversation, mode}
            });
            setMessages([...newMsgs, {role:'assistant', content:res.reply, tokens:res.tokens_used}]);
        } catch(e) {
            setMessages([...newMsgs, {role:'assistant', content:'Error: Could not get a response. Please try again.', error:true}]);
        }
        setLoading(false);
        setTimeout(()=>inputRef.current?.focus(), 100);
    };

    const runAudit = async (auditType) => {
        const userMsg = {role:'user', content:`Run a ${auditType} audit for my clinic`};
        setMessages(prev => [...prev, userMsg]);
        setLoading(true);
        try {
            const res = await apiFetch('/sba-ai/audit', {
                method:'POST',
                body: {audit_type:auditType, context:''}
            });
            setMessages(prev => [...prev, {role:'assistant', content:res.audit, tokens:res.tokens_used, isAudit:true}]);
        } catch(e) {
            setMessages(prev => [...prev, {role:'assistant', content:'Error running audit. Please try again.', error:true}]);
        }
        setLoading(false);
    };

    const clearChat = () => { setMessages([]); };

    const modes = [
        {id:'coach', label:'Coach', desc:'Strategic advice'},
        {id:'audit', label:'Audit', desc:'Deep analysis'},
        {id:'strategy', label:'Strategy', desc:'Plans & roadmaps'},
        {id:'quick', label:'Quick', desc:'Fast answers'},
    ];

    const auditTypes = [
        {id:'marketing', label:'Marketing', icon:'M'},
        {id:'operations', label:'Operations', icon:'O'},
        {id:'revenue', label:'Revenue', icon:'R'},
        {id:'content', label:'Content', icon:'C'},
        {id:'technology', label:'Technology', icon:'T'},
        {id:'full', label:'Full 360', icon:'F'},
    ];

    // Simple markdown-like rendering
    const renderContent = (text) => {
        if (!text) return null;
        const lines = text.split('\n');
        const elements = [];
        let inTable = false;
        let tableRows = [];

        const flushTable = () => {
            if (tableRows.length > 0) {
                const headers = tableRows[0];
                const dataRows = tableRows.slice(1);
                elements.push(
                    React.createElement('div', {key:'t'+elements.length, style:{overflowX:'auto',margin:'12px 0'}},
                        React.createElement('table', {style:{width:'100%',borderCollapse:'collapse',fontSize:13}},
                            React.createElement('thead', null,
                                React.createElement('tr', null,
                                    headers.map((h,i) => React.createElement('th', {key:i, style:{padding:'8px 12px',borderBottom:'2px solid var(--gold)',textAlign:'left',fontWeight:600,fontSize:12,color:'var(--gold)'}}, h.trim()))
                                )
                            ),
                            React.createElement('tbody', null,
                                dataRows.map((row,ri) => React.createElement('tr', {key:ri, style:{borderBottom:'1px solid var(--border)'}},
                                    row.map((cell,ci) => React.createElement('td', {key:ci, style:{padding:'6px 12px',fontSize:13}}, cell.trim()))
                                ))
                            )
                        )
                    )
                );
                tableRows = [];
            }
        };

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];

            // Table detection
            if (line.includes('|') && line.trim().startsWith('|')) {
                const cells = line.split('|').filter(c => c.trim() !== '');
                if (cells.length > 0) {
                    // Skip separator rows
                    if (cells.every(c => /^[\s\-:]+$/.test(c))) { continue; }
                    tableRows.push(cells);
                    inTable = true;
                    continue;
                }
            } else if (inTable) {
                flushTable();
                inTable = false;
            }

            // Headers
            if (line.startsWith('### ')) {
                elements.push(React.createElement('h4', {key:i, style:{fontSize:14,fontWeight:700,margin:'16px 0 6px',color:'var(--gold)'}}, line.slice(4)));
            } else if (line.startsWith('## ')) {
                elements.push(React.createElement('h3', {key:i, style:{fontSize:16,fontWeight:700,margin:'20px 0 8px',color:'var(--text-primary)'}}, line.slice(3)));
            } else if (line.startsWith('# ')) {
                elements.push(React.createElement('h2', {key:i, style:{fontSize:18,fontWeight:700,margin:'20px 0 8px',color:'var(--text-primary)'}}, line.slice(2)));
            }
            // Bullet points
            else if (line.match(/^\s*[-*]\s/)) {
                const indent = line.match(/^(\s*)/)[1].length;
                const content = line.replace(/^\s*[-*]\s/, '');
                elements.push(React.createElement('div', {key:i, style:{display:'flex',gap:8,marginLeft:indent*8+4,marginBottom:4}},
                    React.createElement('span', {style:{color:'var(--gold)',flexShrink:0}}, '•'),
                    React.createElement('span', {style:{fontSize:13,lineHeight:1.6}}, renderInline(content))
                ));
            }
            // Numbered lists
            else if (line.match(/^\s*\d+\.\s/)) {
                const num = line.match(/^\s*(\d+)\./)[1];
                const content = line.replace(/^\s*\d+\.\s/, '');
                elements.push(React.createElement('div', {key:i, style:{display:'flex',gap:8,marginLeft:4,marginBottom:4}},
                    React.createElement('span', {style:{color:'var(--gold)',fontWeight:700,flexShrink:0,minWidth:20}}, num+'.'),
                    React.createElement('span', {style:{fontSize:13,lineHeight:1.6}}, renderInline(content))
                ));
            }
            // Empty line
            else if (line.trim() === '') {
                elements.push(React.createElement('div', {key:i, style:{height:8}}));
            }
            // Regular text
            else {
                elements.push(React.createElement('p', {key:i, style:{fontSize:13,lineHeight:1.7,margin:'2px 0'}}, renderInline(line)));
            }
        }
        flushTable();
        return elements;
    };

    const renderInline = (text) => {
        // Bold
        const parts = text.split(/(\*\*[^*]+\*\*)/g);
        return parts.map((p,i) => {
            if (p.startsWith('**') && p.endsWith('**')) {
                return React.createElement('strong', {key:i, style:{fontWeight:700,color:'var(--text-primary)'}}, p.slice(2,-2));
            }
            return p;
        });
    };

    const emptyState = messages.length === 0;

    return (
        <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 64px)',maxHeight:'calc(100vh - 64px)'}}>
            {/* Header */}
            <div style={{padding:'0 0 16px',flexShrink:0}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                    <div>
                        <h1 style={{fontSize:22,fontWeight:700,letterSpacing:'-0.5px'}}>
                            <span style={{color:'var(--gold)'}}>SBA</span> AI
                        </h1>
                        <p style={{color:'var(--text-muted)',fontSize:13,marginTop:2}}>Your business coach, strategist, and auditor</p>
                    </div>
                    {messages.length > 0 && (
                        <button onClick={clearChat} className="btn-ghost" style={{fontSize:12,padding:'6px 12px',borderRadius:8}}>
                            New Chat
                        </button>
                    )}
                </div>
                {/* Mode Selector */}
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {modes.map(m => (
                        <button key={m.id} onClick={()=>setMode(m.id)}
                            style={{
                                padding:'6px 14px',borderRadius:20,fontSize:12,fontWeight:600,border:'1.5px solid',cursor:'pointer',transition:'all 0.2s',
                                background: mode===m.id ? 'var(--gold)' : 'transparent',
                                color: mode===m.id ? '#000' : 'var(--text-muted)',
                                borderColor: mode===m.id ? 'var(--gold)' : 'var(--border)',
                            }}>
                            {m.label}
                            <span style={{fontWeight:400,marginLeft:4,opacity:0.7,fontSize:10}}>{m.desc}</span>
                        </button>
                    ))}
                </div>
            </div>

            {/* Chat Area */}
            <div style={{flex:1,overflowY:'auto',padding:'0 0 16px',display:'flex',flexDirection:'column',gap:16}}>
                {emptyState ? (
                    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:32,padding:'40px 0'}}>
                        {/* Logo/Brand */}
                        <div style={{textAlign:'center'}}>
                            <div style={{width:64,height:64,borderRadius:16,background:'linear-gradient(135deg, var(--gold), #c46a10)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',boxShadow:'0 8px 32px rgba(232,135,37,0.3)'}}>
                                <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="white" strokeWidth="1.5"><path d="M12 2a7 7 0 00-5.6 11.2L12 22l5.6-8.8A7 7 0 0012 2z"/><circle cx="12" cy="10" r="2"/></svg>
                            </div>
                            <h2 style={{fontSize:20,fontWeight:700}}>What can I help you with?</h2>
                            <p style={{color:'var(--text-muted)',fontSize:13,marginTop:4}}>Ask anything about growing your clinic business</p>
                        </div>

                        {/* Quick Audit Buttons */}
                        <div style={{width:'100%',maxWidth:600}}>
                            <p style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8,textAlign:'center'}}>Quick Audits</p>
                            <div style={{display:'grid',gridTemplateColumns:'repeat(3, 1fr)',gap:8}}>
                                {auditTypes.map(a => (
                                    <button key={a.id} onClick={()=>runAudit(a.id)}
                                        style={{padding:'12px',borderRadius:10,border:'1px solid var(--border)',background:'var(--bg-secondary)',cursor:'pointer',textAlign:'center',transition:'all 0.2s'}}
                                        onMouseOver={e=>{e.currentTarget.style.borderColor='var(--gold)';e.currentTarget.style.background='rgba(232,135,37,0.05)'}}
                                        onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--bg-secondary)'}}>
                                        <div style={{fontSize:20,marginBottom:4}}>{a.icon}</div>
                                        <div style={{fontSize:12,fontWeight:600}}>{a.label}</div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Suggestion Prompts */}
                        {suggestions && suggestions[mode] && (
                            <div style={{width:'100%',maxWidth:600}}>
                                <p style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8,textAlign:'center'}}>Try asking</p>
                                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                                    {suggestions[mode].map((s,i) => (
                                        <button key={i} onClick={()=>sendMessage(s)}
                                            style={{padding:'10px 14px',borderRadius:10,border:'1px solid var(--border)',background:'var(--bg-secondary)',cursor:'pointer',textAlign:'left',fontSize:13,color:'var(--text-primary)',transition:'all 0.2s',lineHeight:1.4}}
                                            onMouseOver={e=>{e.currentTarget.style.borderColor='var(--gold)'}}
                                            onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border)'}}>
                                            {s}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                ) : (
                    <>
                        {messages.map((msg, i) => (
                            <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',flexDirection: msg.role==='user'?'row-reverse':'row'}}>
                                {/* Avatar */}
                                <div style={{
                                    width:32,height:32,borderRadius:10,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
                                    background: msg.role==='user' ? 'var(--gold)' : 'linear-gradient(135deg, #1a1a2e, #16213e)',
                                    border: msg.role==='assistant' ? '1px solid var(--border)' : 'none',
                                }}>
                                    {msg.role==='user'
                                        ? <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#000" strokeWidth="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                        : <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="var(--gold)" strokeWidth="1.5"><path d="M12 2a7 7 0 00-5.6 11.2L12 22l5.6-8.8A7 7 0 0012 2z"/></svg>
                                    }
                                </div>
                                {/* Message */}
                                <div style={{
                                    maxWidth:'80%',padding:'12px 16px',borderRadius:14,
                                    background: msg.role==='user' ? 'rgba(232,135,37,0.1)' : 'var(--bg-secondary)',
                                    border: '1px solid ' + (msg.role==='user' ? 'rgba(232,135,37,0.2)' : msg.error ? 'var(--danger)' : 'var(--border)'),
                                }}>
                                    {msg.role==='user'
                                        ? <p style={{fontSize:13,lineHeight:1.6}}>{msg.content}</p>
                                        : <div style={{color:'var(--text-primary)'}}>{renderContent(msg.content)}</div>
                                    }
                                    {msg.tokens && (
                                        <div style={{fontSize:10,color:'var(--text-muted)',marginTop:8,textAlign:'right'}}>
                                            {msg.tokens.input + msg.tokens.output} tokens
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                        {loading && (
                            <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                                <div style={{width:32,height:32,borderRadius:10,background:'linear-gradient(135deg, #1a1a2e, #16213e)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="var(--gold)" strokeWidth="1.5"><path d="M12 2a7 7 0 00-5.6 11.2L12 22l5.6-8.8A7 7 0 0012 2z"/></svg>
                                </div>
                                <div style={{padding:'12px 16px',borderRadius:14,background:'var(--bg-secondary)',border:'1px solid var(--border)'}}>
                                    <div style={{display:'flex',gap:4,alignItems:'center'}}>
                                        <div className="typing-dot" style={{width:6,height:6,borderRadius:'50%',background:'var(--gold)',animation:'pulse 1.4s infinite',animationDelay:'0s'}}/>
                                        <div className="typing-dot" style={{width:6,height:6,borderRadius:'50%',background:'var(--gold)',animation:'pulse 1.4s infinite',animationDelay:'0.2s'}}/>
                                        <div className="typing-dot" style={{width:6,height:6,borderRadius:'50%',background:'var(--gold)',animation:'pulse 1.4s infinite',animationDelay:'0.4s'}}/>
                                    </div>
                                </div>
                            </div>
                        )}
                    </>
                )}
                <div ref={messagesEndRef}/>
            </div>

            {/* Input Area */}
            <div style={{flexShrink:0,padding:'12px 0 0',borderTop:'1px solid var(--border)'}}>
                <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
                    <textarea
                        ref={inputRef}
                        value={input}
                        onChange={e=>{setInput(e.target.value); e.target.style.height='auto'; e.target.style.height=Math.min(e.target.scrollHeight,120)+'px';}}
                        onKeyDown={e=>{if(e.key==='Enter' && !e.shiftKey){e.preventDefault();sendMessage();}}}
                        placeholder={mode==='audit'?'Describe what you want audited...':mode==='strategy'?'What strategy do you need?':mode==='quick'?'Ask a quick question...':'Ask your business coach anything...'}
                        style={{flex:1,padding:'10px 14px',borderRadius:12,border:'1px solid var(--border)',background:'var(--bg-secondary)',color:'var(--text-primary)',fontSize:13,resize:'none',height:42,maxHeight:120,fontFamily:'inherit',outline:'none',lineHeight:1.5}}
                        disabled={loading}
                    />
                    <button onClick={()=>sendMessage()} disabled={loading || !input.trim()}
                        style={{width:42,height:42,borderRadius:12,border:'none',background: input.trim() ? 'var(--gold)' : 'var(--bg-secondary)',cursor:input.trim()?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.2s'}}>
                        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke={input.trim()?'#000':'var(--text-muted)'} strokeWidth="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
                <p style={{fontSize:10,color:'var(--text-muted)',textAlign:'center',marginTop:6}}>SBA AI uses your clinic context for personalized advice. Powered by Claude.</p>
            </div>
        </div>
    );
};

    const [coachLoading, setCoachLoading] = useState(false);
    const [newBacklink, setNewBacklink] = useState({source_url:'',target_url:'',anchor_text:'',domain_authority:0,notes:''});

    useEffect(() => {
        setLoading(true);
        Promise.all([
            apiFetch('/seo/gmb/config').catch(() => null),
            apiFetch('/seo/backlinks').catch(() => ({backlinks:[]}))
        ]).then(([cfg, bl]) => {
            if (cfg && !cfg.detail) setGmbConfig(cfg);
            setBacklinks(Array.isArray(bl?.backlinks) ? bl.backlinks : []);
            setLoading(false);
        });
    }, []);

    const runAudit = async (regenerateChanges) => {
        if (!auditUrl) { alert('Enter website URL'); return; }
        setAuditLoading(true);
        try {
            const body = {website_url:auditUrl};
            if (regenerateChanges) body.regenerate_changes = regenerateChanges;
            const res = await apiFetch('/seo/audit', {method:'POST', body});
            setAuditResult(res.audit || '');
        } catch(e) { alert('SEO audit failed: ' + (e.message || 'Check your API key in Settings')); } finally { setAuditLoading(false); }
    };

    const optimizeGMB = async (regenerateChanges) => {
        setGmbLoading(true);
        try {
            const body = {};
            if (regenerateChanges) body.regenerate_changes = regenerateChanges;
            const res = await apiFetch('/seo/gmb/optimize', {method:'POST', body});
            setGmbPlan(res.optimization_plan || '');
        } catch(e) { alert('GMB optimization failed: ' + (e.message || 'Check your API key in Settings')); } finally { setGmbLoading(false); }
    };

    const generateGMBPosts = async (regenerateChanges) => {
        setGmbPostsLoading(true);
        try {
            const body = {};
            if (regenerateChanges) body.regenerate_changes = regenerateChanges;
            const res = await apiFetch('/seo/gmb/generate-posts', {method:'POST', body});
            const posts = res.posts;
            if (typeof posts === 'string') { try { setGmbPosts(JSON.parse(posts)); } catch(e) { setGmbPosts(posts); } }
            else { setGmbPosts(posts || null); }
        } catch(e) { alert('GMB post generation failed: ' + (e.message || 'Check your API key in Settings')); } finally { setGmbPostsLoading(false); }
    };

    const getBlIdeas = async (regenerateChanges) => {
        setBlLoading(true);
        try {
            const body = {};
            if (regenerateChanges) body.regenerate_changes = regenerateChanges;
            const res = await apiFetch('/seo/backlink-ideas', {method:'POST', body});
            setBlIdeas(res.ideas || '');
        } catch(e) { alert('Backlink analysis failed: ' + (e.message || 'Check your API key in Settings')); } finally { setBlLoading(false); }
    };

    const addBacklink = async () => {
        if (!newBacklink.source_url) return;
        try {
            await apiFetch('/seo/backlinks', {method:'POST', body:newBacklink});
            setBacklinks(prev => [...prev, {...newBacklink, id:String(prev.length+1), added_at:new Date().toISOString()}]);
            setNewBacklink({source_url:'',target_url:'',anchor_text:'',domain_authority:0,notes:''});
        } catch(e) {}
    };

    const doKeywordResearch = async (regenerateChanges) => {
        setKwLoading(true);
        try {
            const body = {procedures:[],location:''};
            if (regenerateChanges) body.regenerate_changes = regenerateChanges;
            const res = await apiFetch('/seo/keyword-research', {method:'POST', body});
            setKeywords(res.keywords || '');
        } catch(e) { alert('Keyword research failed: ' + (e.message || 'Check your API key in Settings')); } finally { setKwLoading(false); }
    };

    const sendCoachMsg = async () => {
        if (!coachMsg.trim()) return;
        const userMsg = coachMsg;
        setCoachHistory(prev => [...prev, {role:'user',text:userMsg}]);
        setCoachMsg('');
        setCoachLoading(true);
        try {
            const res = await apiFetch('/seo/coach', {method:'POST', body:{message:userMsg}});
            setCoachHistory(prev => [...prev, {role:'assistant',text:res.response || 'No response'}]);
        } catch(e) {
            setCoachHistory(prev => [...prev, {role:'assistant',text:'Error getting response. Check API configuration.'}]);
        } finally { setCoachLoading(false); }
    };

    const tabs = [{id:'overview',label:'Dashboard'},{id:'audit',label:'SEO Audit'},{id:'gmb',label:'GMB Optimization'},{id:'keywords',label:'Keywords'},{id:'backlinks',label:'Backlinks'},{id:'coach',label:'SEO Coach'}];

    if (loading) return <div style={{padding:40,textAlign:'center'}}><span className="spinner"></span></div>;

    return (
        <div className="fade-in">
            <h1 style={{fontSize:24,fontWeight:900,fontFamily:"'Playfair Display',serif",marginBottom:8}}>SEO & GMB Hub</h1>
            <p style={{color:'var(--text-muted)',fontSize:14,marginBottom:24}}>SEO audits, Google Business Profile optimization, keyword research, backlinks, and AI SEO coaching</p>

            <div style={{display:'flex',gap:4,marginBottom:24,overflowX:'auto',paddingBottom:2}}>
                {tabs.map(t => <button key={t.id} className={`detail-tab ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>{t.label}</button>)}
            </div>

            {activeTab === 'overview' && (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}} className="resp-grid-2">
                    <div className="glass" style={{padding:20,borderRadius:12,cursor:'pointer'}} onClick={()=>setActiveTab('audit')}>
                        <h3 style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--gold)'}}>SEO Audit</h3>
                        <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.5}}>Run an AI-powered technical and on-page SEO audit of your clinic website.</p>
                    </div>
                    <div className="glass" style={{padding:20,borderRadius:12,cursor:'pointer'}} onClick={()=>setActiveTab('gmb')}>
                        <h3 style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--gold)'}}>GMB Optimization</h3>
                        <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.5}}>Optimize your Google Business Profile with AI-generated posts, Q&A, and review templates.</p>
                    </div>
                    <div className="glass" style={{padding:20,borderRadius:12,cursor:'pointer'}} onClick={()=>setActiveTab('keywords')}>
                        <h3 style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--gold)'}}>Keyword Research</h3>
                        <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.5}}>AI keyword research for your procedures, location, and patient search intent.</p>
                    </div>
                    <div className="glass" style={{padding:20,borderRadius:12,cursor:'pointer'}} onClick={()=>setActiveTab('backlinks')}>
                        <h3 style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--gold)'}}>Backlink Builder</h3>
                        <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.5}}>Track backlinks, get AI-powered link building strategies and directory submissions.</p>
                    </div>
                    <div className="glass" style={{padding:20,borderRadius:12,cursor:'pointer',gridColumn:'1/-1'}} onClick={()=>setActiveTab('coach')}>
                        <h3 style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--gold)'}}>AI SEO Coach</h3>
                        <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.5}}>Chat with an AI SEO expert specialized in medical and aesthetic clinic websites. Get instant answers on technical SEO, local SEO, content strategy, schema markup, and more.</p>
                    </div>
                </div>
            )}

            {activeTab === 'audit' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>AI SEO Audit</h3>
                    <div style={{display:'flex',gap:8,marginBottom:16}}>
                        <input className="input" value={auditUrl} onChange={e=>setAuditUrl(e.target.value)} placeholder="Enter your website URL (e.g. https://yourclinic.com)" style={{flex:1}}/>
                        <button className="btn btn-gold" onClick={runAudit} disabled={auditLoading}>
                            {auditLoading ? <span className="spinner"></span> : 'Run Audit'}
                        </button>
                    </div>
                    {auditResult && (
                        <div style={{padding:16,background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:10,marginTop:12}}>
                            <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{auditResult}</pre>
                            <RegenerateWithChanges loading={auditLoading} onRegenerate={(changes)=>runAudit(changes)}/>
                        </div>
                    )}
                    <GenerationHistory endpoint="seo" filterAction="seo_audit" onRestore={(o)=>setAuditResult(o.audit||'')}/>
                </div>
            )}

            {activeTab === 'gmb' && (
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                            <h3 style={{fontSize:16,fontWeight:600}}>GMB Profile Optimization</h3>
                            <button className="btn btn-gold btn-sm" onClick={optimizeGMB} disabled={gmbLoading}>
                                {gmbLoading ? <span className="spinner"></span> : 'Get Optimization Plan'}
                            </button>
                        </div>
                        {gmbPlan ? (
                            <div style={{padding:16,background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:10}}>
                                <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{gmbPlan}</pre>
                                <RegenerateWithChanges loading={gmbLoading} onRegenerate={(changes)=>optimizeGMB(changes)}/>
                            </div>
                        ) : (
                            <p style={{color:'var(--text-muted)',fontSize:13}}>Click to get a comprehensive AI optimization plan for your Google Business Profile.</p>
                        )}
                    </div>
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                            <h3 style={{fontSize:16,fontWeight:600}}>Generate GMB Posts</h3>
                            <button className="btn btn-gold btn-sm" onClick={generateGMBPosts} disabled={gmbPostsLoading}>
                                {gmbPostsLoading ? <span className="spinner"></span> : 'Generate 4 Posts'}
                            </button>
                        </div>
                        {gmbPosts ? (
                            Array.isArray(gmbPosts) ? (
                                <div style={{display:'flex',flexDirection:'column',gap:14}}>
                                    {gmbPosts.map((post,idx) => (
                                        <div key={idx} style={{padding:16,background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',borderRadius:10}}>
                                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:10}}>
                                                <h4 style={{fontSize:14,fontWeight:700,color:'var(--gold)'}}>{post.title || `Post ${idx+1}`}</h4>
                                                {post.cta_type && <span className="badge badge-gold" style={{fontSize:10}}>{post.cta_type}</span>}
                                            </div>
                                            <div style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',marginBottom:10}}>{post.content}</div>
                                            {post.suggested_image_description && (
                                                <div style={{fontSize:11,color:'var(--text-muted)',padding:8,background:'rgba(212,175,55,0.06)',borderRadius:6,borderLeft:'3px solid var(--gold)'}}>
                                                    <strong>Image idea:</strong> {post.suggested_image_description}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    <RegenerateWithChanges loading={gmbPostsLoading} onRegenerate={(changes)=>generateGMBPosts(changes)}/>
                                </div>
                            ) : (
                                <div style={{padding:16,background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:10}}>
                                    <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{typeof gmbPosts === 'string' ? gmbPosts : JSON.stringify(gmbPosts, null, 2)}</pre>
                                    <RegenerateWithChanges loading={gmbPostsLoading} onRegenerate={(changes)=>generateGMBPosts(changes)}/>
                                </div>
                            )
                        ) : (
                            <p style={{color:'var(--text-muted)',fontSize:13}}>Generate ready-to-publish Google Business Profile posts with AI.</p>
                        )}
                    </div>
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <h3 style={{fontSize:16,fontWeight:600,marginBottom:16,color:'var(--gold)'}}>GMB Setup Guide</h3>
                        <div style={{display:'flex',flexDirection:'column',gap:12}}>
                            <div style={{padding:14,border:'1px solid var(--border)',borderRadius:10}}>
                                <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>1. Claim or Create Your Google Business Profile</div>
                                <p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.5,marginBottom:6}}>Go to Google Business Profile Manager and claim your listing. If it does not exist, create a new one with your clinic details.</p>
                                <a href="https://business.google.com/" target="_blank" rel="noopener" style={{fontSize:11,color:'var(--gold)',textDecoration:'underline'}}>Google Business Profile Manager</a>
                            </div>
                            <div style={{padding:14,border:'1px solid var(--border)',borderRadius:10}}>
                                <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>2. Complete All Profile Sections</div>
                                <p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.5}}>Fill in: business name, category, address, phone, website, hours, services, description, photos. Complete profiles rank higher in local search.</p>
                            </div>
                            <div style={{padding:14,border:'1px solid var(--border)',borderRadius:10}}>
                                <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>3. Set Up Google Business Profile API (Optional)</div>
                                <p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.5,marginBottom:6}}>For automated posting, enable the Google Business Profile API in Google Cloud Console.</p>
                                <a href="https://developers.google.com/my-business/content/overview" target="_blank" rel="noopener" style={{fontSize:11,color:'var(--gold)',textDecoration:'underline'}}>GMB API Documentation</a>
                            </div>
                        </div>
                    </div>
                    <GenerationHistory endpoint="seo" filterAction="gmb" onRestore={(o)=>{if(o.optimization_plan)setGmbPlan(o.optimization_plan);if(o.posts)setGmbPosts(o.posts);}}/>
                </div>
            )}

            {activeTab === 'keywords' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                        <h3 style={{fontSize:16,fontWeight:600}}>AI Keyword Research</h3>
                        <button className="btn btn-gold btn-sm" onClick={doKeywordResearch} disabled={kwLoading}>
                            {kwLoading ? <span className="spinner"></span> : 'Research Keywords'}
                        </button>
                    </div>
                    {keywords ? (
                        <div style={{padding:16,background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:10}}>
                            <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{keywords}</pre>
                            <RegenerateWithChanges loading={kwLoading} onRegenerate={(changes)=>doKeywordResearch(changes)}/>
                        </div>
                    ) : (
                        <p style={{textAlign:'center',padding:30,color:'var(--text-muted)',fontSize:13}}>Click "Research Keywords" to get AI-powered keyword research for your clinic's procedures and location.</p>
                    )}
                    <GenerationHistory endpoint="seo" filterAction="keyword_research" onRestore={(o)=>setKeywords(o.keywords||'')}/>
                </div>
            )}

            {activeTab === 'backlinks' && (
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                            <h3 style={{fontSize:16,fontWeight:600}}>Backlink Tracker</h3>
                            <button className="btn btn-gold btn-sm" onClick={getBlIdeas} disabled={blLoading}>
                                {blLoading ? <span className="spinner"></span> : 'Get Link Building Ideas'}
                            </button>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:8,marginBottom:16}} className="resp-grid-2">
                            <input className="input" placeholder="Source URL" value={newBacklink.source_url} onChange={e=>setNewBacklink({...newBacklink,source_url:e.target.value})}/>
                            <input className="input" placeholder="Target URL" value={newBacklink.target_url} onChange={e=>setNewBacklink({...newBacklink,target_url:e.target.value})}/>
                            <input className="input" placeholder="Anchor Text" value={newBacklink.anchor_text} onChange={e=>setNewBacklink({...newBacklink,anchor_text:e.target.value})}/>
                            <button className="btn btn-gold btn-sm" onClick={addBacklink}>Add</button>
                        </div>
                        {backlinks.length === 0 ? (
                            <p style={{textAlign:'center',padding:20,color:'var(--text-muted)',fontSize:13}}>No backlinks tracked yet. Add backlinks manually or get AI link building ideas.</p>
                        ) : (
                            <div style={{overflowX:'auto'}}>
                                <table style={{width:'100%',borderCollapse:'collapse'}}>
                                    <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                                        {['Source','Target','Anchor','DA','Date'].map(h => <th key={h} style={{padding:'8px 12px',textAlign:'left',fontSize:11,fontWeight:600,color:'var(--text-muted)'}}>{h}</th>)}
                                    </tr></thead>
                                    <tbody>{backlinks.map((bl,i) => (
                                        <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                                            <td style={{padding:'8px 12px',fontSize:12,color:'var(--gold)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}}>{bl.source_url}</td>
                                            <td style={{padding:'8px 12px',fontSize:12,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}}>{bl.target_url}</td>
                                            <td style={{padding:'8px 12px',fontSize:12}}>{bl.anchor_text}</td>
                                            <td style={{padding:'8px 12px',fontSize:12,fontWeight:600}}>{bl.domain_authority}</td>
                                            <td style={{padding:'8px 12px',fontSize:11,color:'var(--text-muted)'}}>{bl.added_at ? new Date(bl.added_at).toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata'}) : '-'}</td>
                                        </tr>
                                    ))}</tbody>
                                </table>
                            </div>
                        )}
                    </div>
                    {blIdeas && (
                        <div className="glass" style={{padding:24,borderRadius:12}}>
                            <h3 style={{fontSize:16,fontWeight:600,marginBottom:12}}>AI Link Building Ideas</h3>
                            <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{blIdeas}</pre>
                            <RegenerateWithChanges loading={blLoading} onRegenerate={(changes)=>getBlIdeas(changes)}/>
                        </div>
                    )}
                    <GenerationHistory endpoint="seo" filterAction="backlink_ideas" onRestore={(o)=>setBlIdeas(o.ideas||'')}/>
                </div>
            )}

            {activeTab === 'coach' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <h3 style={{fontSize:16,fontWeight:600,marginBottom:16,color:'var(--gold)'}}>AI SEO Coach</h3>
                    <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16}}>Ask anything about SEO for your clinic. Technical SEO, local SEO, content strategy, schema markup, generative AI SEO, and more.</p>
                    <div style={{minHeight:300,maxHeight:500,overflowY:'auto',marginBottom:16,padding:12,background:'rgba(0,0,0,0.15)',borderRadius:10}}>
                        {coachHistory.length === 0 && (
                            <div style={{textAlign:'center',padding:40,color:'var(--text-muted)',fontSize:13}}>
                                <p>Ask me anything about SEO. For example:</p>
                                <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:12}}>
                                    {['How do I add schema markup for my clinic?','What keywords should I target for hair transplant in Mumbai?','How do I get cited in ChatGPT and Perplexity?','Write me a meta description for my botox service page'].map(q => (
                                        <button key={q} className="btn btn-ghost btn-sm" style={{fontSize:12,justifyContent:'flex-start'}} onClick={()=>{setCoachMsg(q);}}>{q}</button>
                                    ))}
                                </div>
                            </div>
                        )}
                        {coachHistory.map((msg,i) => (
                            <div key={i} style={{marginBottom:12,padding:12,borderRadius:10,background:msg.role==='user'?'rgba(232,135,37,0.08)':'rgba(232,135,37,0.03)',borderLeft:msg.role==='assistant'?'3px solid var(--gold)':'none'}}>
                                <div style={{fontSize:11,fontWeight:600,color:msg.role==='user'?'var(--text-muted)':'var(--gold)',marginBottom:4,textTransform:'uppercase'}}>{msg.role==='user'?'You':'SEO Coach'}</div>
                                <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{msg.text}</pre>
                            </div>
                        ))}
                        {coachLoading && <div style={{padding:12,textAlign:'center'}}><span className="spinner"></span></div>}
                    </div>
                    <div style={{display:'flex',gap:8}}>
                        <input className="input" value={coachMsg} onChange={e=>setCoachMsg(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendCoachMsg();}}} placeholder="Ask about SEO, GMB, keywords, backlinks, schema markup..." style={{flex:1}}/>
                        <button className="btn btn-gold" onClick={sendCoachMsg} disabled={coachLoading||!coachMsg.trim()}>Send</button>
                    </div>
                </div>
            )}
        </div>
    );
};


// ============ HR MANAGEMENT ============
const HRPage = () => {
    const [activeTab, setActiveTab] = useState('team');
    const [team, setTeam] = useState([]);
    const [loading, setLoading] = useState(true);
    const [showAdd, setShowAdd] = useState(false);
    const [newMember, setNewMember] = useState({name:'',role:'',department:'',email:'',phone:'',salary:0,verticals:[],reporting_to:''});
    const [aiResult, setAiResult] = useState(null);
    const [aiLoading, setAiLoading] = useState(false);
    const [attendance, setAttendance] = useState([]);
    const [leaves, setLeaves] = useState([]);
    const [payroll, setPayroll] = useState([]);

    useEffect(() => {
        Promise.all([
            apiFetch('/hr/team').catch(()=>({team:[]})),
            apiFetch('/hr/attendance').catch(()=>({attendance:[]})),
            apiFetch('/hr/leaves').catch(()=>({leaves:[]})),
            apiFetch('/hr/payroll').catch(()=>({payroll:[]}))
        ]).then(([t,a,l,p]) => {
            setTeam(t.team||[]);
            setAttendance(a.attendance||[]);
            setLeaves(l.leaves||[]);
            setPayroll(p.payroll||[]);
            setLoading(false);
        });
    }, []);

    const addMember = async () => {
        if (!newMember.name) return;
        const res = await apiFetch('/hr/team', {method:'POST', body:newMember});
        if (res.member) setTeam(prev=>[...prev,res.member]);
        setShowAdd(false); setNewMember({name:'',role:'',department:'',email:'',phone:'',salary:0,verticals:[],reporting_to:''});
    };

    const removeMember = async (id) => {
        if (!confirm('Remove this team member?')) return;
        await apiFetch(`/hr/team/${id}`, {method:'DELETE'});
        setTeam(prev=>prev.filter(m=>m.id!==id));
    };

    const generateAI = async (type, data) => {
        setAiLoading(true); setAiResult(null);
        try {
            const res = await apiFetch(`/hr/${type}`, {method:'POST', body:data});
            setAiResult(res);
        } catch(e) { alert('HR AI generation failed: ' + (e.message || 'Check your API key in Settings')); }
        setAiLoading(false);
    };

    const renderObj = (data) => {
        if (!data) return null;
        if (typeof data === 'string') return <pre style={{fontSize:12,color:'var(--text-secondary)',whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{data}</pre>;

};

// ============ MIS DAILY SYNC ============
const MISPage = () => {
    const [reports, setReports] = useState([]);
    const [loading, setLoading] = useState(true);
    const [showSubmit, setShowSubmit] = useState(false);
    const [analysis, setAnalysis] = useState(null);
    const [analyzing, setAnalyzing] = useState(false);
    const [newReport, setNewReport] = useState({member_name:'',department:'',tasks_completed:'',tasks_pending:'',blockers:'',channels_worked:'',clients_worked:'',hours_worked:8,notes:''});

    useEffect(() => { apiFetch('/hr/mis/reports').then(r=>setReports(r.reports||[])).catch(()=>{}).finally(()=>setLoading(false)); }, []);

    const submitReport = async () => {
        if (!newReport.member_name) return;
        const body = {...newReport, tasks_completed: newReport.tasks_completed.split(',').map(s=>s.trim()).filter(Boolean), tasks_pending: newReport.tasks_pending.split(',').map(s=>s.trim()).filter(Boolean), channels_worked: newReport.channels_worked.split(',').map(s=>s.trim()).filter(Boolean), clients_worked: newReport.clients_worked.split(',').map(s=>s.trim()).filter(Boolean)};
        const res = await apiFetch('/hr/mis/reports', {method:'POST', body});
        if (res.report) setReports(prev=>[...prev,res.report]);
        setShowSubmit(false);
    };

    const analyzeReports = async () => {
        setAnalyzing(true);
        try { const res = await apiFetch('/hr/mis/analyze', {method:'POST', body:{}}); setAnalysis(res.analysis); } catch(e) { alert('MIS analysis failed: ' + (e.message || 'Check your API key in Settings')); }
        setAnalyzing(false);
    };

    if (loading) return <div style={{padding:40,textAlign:'center'}}><span className="spinner"></span></div>;

    return (
        <div className="fade-in">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                <div><h1 style={{fontSize:24,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>MIS Daily Sync</h1><p style={{color:'var(--text-muted)',fontSize:13,marginTop:4}}>Daily reports, team sync, and AI-powered performance analysis</p></div>
                <div style={{display:'flex',gap:8}}><button className="btn btn-ghost" onClick={analyzeReports} disabled={analyzing}>{analyzing?'Analyzing...':'AI Analysis'}</button><button className="btn btn-gold" onClick={()=>setShowSubmit(true)}>+ Submit Report</button></div>
            </div>

            <div className="stat-card-row" style={{display:'flex',gap:16,marginBottom:20,flexWrap:'wrap'}}>
                <StatCard label="Reports Today" value={reports.filter(r=>r.date===new Date().toISOString().split('T')[0]).length}/><StatCard label="Total Reports" value={reports.length}/><StatCard label="Team Members Reporting" value={[...new Set(reports.map(r=>r.member_name))].length} accent="var(--gold)"/>
            </div>

            {showSubmit && (
                <div className="glass" style={{padding:20,borderRadius:12,marginBottom:16}}>
                    <h3 style={{fontSize:14,fontWeight:600,marginBottom:12}}>Submit Daily Report</h3>
                    <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:12}}>
                        {[['Team Member','member_name','text','e.g. Rahul Sharma'],['Department','department','text','Marketing'],['Tasks Completed (comma-separated)','tasks_completed','text','Launched campaign, wrote scripts'],['Tasks Pending','tasks_pending','text','Review report, client call'],['Blockers','blockers','text','Any issues faced'],['Channels Worked (comma-separated)','channels_worked','text','Meta Ads, Google Ads'],['Clients Worked','clients_worked','text','Clinic A, Clinic B'],['Hours Worked','hours_worked','number','8']].map(([l,f,t,p])=>(
                            <div key={f} style={{flex:1,minWidth:200}}><label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:3}}>{l}</label><input className="input" type={t} value={newReport[f]||''} onChange={e=>setNewReport({...newReport,[f]:t==='number'?parseInt(e.target.value)||0:e.target.value})} placeholder={p} style={{fontSize:12}}/></div>
                        ))}
                    </div>
                    <div style={{display:'flex',gap:8}}><button className="btn btn-gold" onClick={submitReport}>Submit</button><button className="btn btn-ghost" onClick={()=>setShowSubmit(false)}>Cancel</button></div>
                </div>
            )}

            {analysis && (
                <div className="glass" style={{padding:20,borderRadius:12,marginBottom:16,borderLeft:'3px solid var(--gold)'}}>
                    <h3 style={{fontSize:14,fontWeight:600,marginBottom:12,color:'var(--gold)'}}>AI Performance Analysis</h3>
                    {typeof analysis === 'string' ? <pre style={{fontSize:12,color:'var(--text-secondary)',whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{analysis}</pre> : Object.entries(analysis).map(([k,v]) => <div key={k} style={{marginBottom:12}}><h4 style={{fontSize:12,fontWeight:700,color:'var(--gold)',marginBottom:4,textTransform:'uppercase'}}>{k.replace(/_/g,' ')}</h4>{typeof v === 'string' || typeof v === 'number' ? <p style={{fontSize:13,color:'var(--text-secondary)'}}>{v}</p> : <pre style={{fontSize:12,color:'var(--text-secondary)',whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{JSON.stringify(v,null,2)}</pre>}</div>)}
                </div>
            )}

            <div className="glass" style={{borderRadius:12,overflow:'hidden'}}>
                <h3 style={{fontSize:15,fontWeight:600,padding:'16px 20px',borderBottom:'1px solid var(--border)'}}>Recent Reports</h3>
                {reports.length===0 ? <p style={{textAlign:'center',padding:30,color:'var(--text-muted)',fontSize:13}}>No reports submitted yet.</p> : (
                    <div style={{display:'flex',flexDirection:'column'}}>
                        {reports.slice().reverse().slice(0,20).map((r,i) => (
                            <div key={i} style={{padding:16,borderBottom:'1px solid var(--border)'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                                    <div><span style={{fontWeight:600,fontSize:14}}>{r.member_name}</span><span style={{fontSize:11,color:'var(--text-muted)',marginLeft:8}}>{r.department}</span></div>
                                    <div style={{display:'flex',gap:8,alignItems:'center'}}><span style={{fontSize:11,color:'var(--text-muted)'}}>{r.date}</span><span className="badge badge-gold" style={{fontSize:10}}>{r.hours_worked}h</span></div>
                                </div>
                                {r.tasks_completed && r.tasks_completed.length > 0 && <div style={{fontSize:12,color:'var(--success)',marginBottom:4}}>Done: {Array.isArray(r.tasks_completed)?r.tasks_completed.join(', '):r.tasks_completed}</div>}
                                {r.tasks_pending && r.tasks_pending.length > 0 && <div style={{fontSize:12,color:'var(--warning)',marginBottom:4}}>Pending: {Array.isArray(r.tasks_pending)?r.tasks_pending.join(', '):r.tasks_pending}</div>}
                                {r.blockers && <div style={{fontSize:12,color:'var(--danger)'}}>Blockers: {r.blockers}</div>}
                                {r.channels_worked && r.channels_worked.length > 0 && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Channels: {Array.isArray(r.channels_worked)?r.channels_worked.join(', '):r.channels_worked}</div>}
                            </div>
                        ))}
                    </div>
                )}
            </div>
        </div>
    );
};
