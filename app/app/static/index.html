            case 'ai-employee': return <AIEmployeePage/>;
            case 'nurture': return <NurturePage/>;
            case 'marketing-hub': return <MarketingHubPage/>;
            case 'meta-ads': return <MetaAdsPage/>;
            case 'google-ads': return <GoogleAdsPage/>;
            case 'social-schedule': return <SocialSchedulingPage/>;
            case 'hiring': return <HiringPage/>;
            case 'operations': return <OperationsPage/>;
            case 'legal-finance': return <LegalFinancePage/>;
            case 'sba-ai': return <SBAIPage/>;
            case 'coaching': return <CoachingPage/>;
            case 'reports': return <ReportsPage/>;
            case 'academy': return <LearningPage/>;
            case 'seo': return <SEOPage/>;
            case 'settings': return <SettingsPage user={user}/>;
            default: return <DashboardPage/>;
        }
    };

    const navTo = (id) => { setPage(id); setSelectedCall(null); setSidebarOpen(false); };

    // Find which group the current page belongs to (for auto-expanding)
    const activeGroup = navGroups.find(g => g.items.some(i => i.id === page));

    return (
        <div style={{display:'flex',minHeight:'100vh',background:'var(--bg-primary)'}}>
            {/* Mobile Header */}
            <div className="mobile-header">
                <button className="hamburger" onClick={()=>setSidebarOpen(!sidebarOpen)}>
                    {sidebarOpen
                        ? <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        : <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                    }
                </button>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <img src="/static/sba-logo.png?v=2" alt="SBA" style={{height:40,objectFit:"contain"}}/>
                </div>
                <div style={{width:28,height:28}}></div>
            </div>
            {/* Mobile Overlay */}
            <div className={`mobile-overlay ${sidebarOpen?'show':''}`} onClick={()=>setSidebarOpen(false)}/>
            {/* Sidebar */}
            <aside className={`glass-solid desktop-sidebar ${sidebarOpen?'open':''}`} style={{width:240,padding:'16px 10px',display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:60,overflowY:'auto'}}>
                <div style={{padding:'4px 8px 24px'}}><Logo/></div>
                <nav style={{display:'flex',flexDirection:'column',flex:1}}>
                    {navGroups.map((group, gi) => {
                        // Filter items based on user's allowed_tabs (dashboard + settings always visible)
                        const visibleItems = user && user.allowed_tabs
                            ? group.items.filter(i => ['dashboard','settings'].includes(i.id) || user.allowed_tabs.includes(i.id))
                            : group.items;
                        if (visibleItems.length === 0) return null;
                        const isCollapsed = group.label && collapsedGroups[group.label];
                        const hasActive = visibleItems.some(i => i.id === page && !selectedCall);
                        return (
                            <div key={gi}>
                                {group.label && (
                                    <div className="nav-group-label" onClick={()=>toggleGroup(group.label)} style={hasActive?{color:'var(--gold-light)'}:{}}>
                                        <span>{group.label}</span>
                                        <span className={`chevron ${isCollapsed?'collapsed':''}`}>&#9660;</span>
                                    </div>
                                )}
                                <div className={`nav-group-items ${isCollapsed && !hasActive?'collapsed':''}`} style={{maxHeight: isCollapsed && !hasActive ? 0 : visibleItems.length * 42 + 8, display:'flex',flexDirection:'column',gap:2}}>
                                    {visibleItems.map(item => (
                                        <a key={item.id} className={`sidebar-link ${page===item.id && !selectedCall ? 'active':''}`} onClick={()=>navTo(item.id)}>
                                            {item.icon}<span>{item.label}</span>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </nav>
                <div style={{padding:'12px 8px',borderTop:'1px solid var(--border)',marginTop:8}}>
                    {user && <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{user.full_name}</div>}
                    {user && <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:10}}>{user.role}</div>}
                    <a className="sidebar-link" onClick={logout} style={{color:'var(--danger)',fontSize:12}}>{Icons.logout}<span>Sign Out</span></a>
                    <div style={{fontSize:8,color:'var(--text-muted)',textAlign:'center',marginTop:10,letterSpacing:'0.1em',textTransform:'uppercase'}}>Powered by SBA</div>
                </div>
            </aside>
            {/* Main */}
            <main className="main-content" style={{flex:1,marginLeft:240,padding:'32px 40px',maxWidth:1200}}>
                <ErrorBoundary key={page + (selectedCall||'')}>
                    {renderPage()}
                </ErrorBoundary>
            </main>
            {/* Bottom Tab Bar (mobile) */}
            <div className="bottom-tab-bar">
                <div className="bottom-tab-bar-inner">
                    {bottomTabs.map(tab => (
                        <button key={tab.id} className={`bottom-tab ${tab.id==='_more' ? '' : page===tab.id && !selectedCall ? 'active' : ''}`}
                            onClick={()=>{
                                if(tab.id==='_more') { setSidebarOpen(true); }
                                else { navTo(tab.id); }
                            }}>
                            {tab.icon}
                            <span>{tab.label}</span>
                        </button>
                    ))}
                </div>
            </div>
        </div>
    );
};

ReactDOM.render(<ToastProvider><App/></ToastProvider>, document.getElementById('root'));
</script>
</body>
</html>
