                                            <span style={{color:'var(--gold)',marginTop:2}}>{Icons.check}</span>
                                            <span>{typeof item === 'string' ? item : item.action || JSON.stringify(item)}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {call.ai_objections_detected && call.ai_objections_detected.length > 0 && (
                            <div className="glass" style={{padding:24,borderRadius:12}}>
                                <h3 style={{fontSize:14,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>Objections Detected</h3>
                                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                                    {call.ai_objections_detected.map((obj,i) => (
                                        <div key={i} className="learning-card">
                                            <div style={{fontSize:13,color:'var(--text-secondary)'}}>{typeof obj === 'string' ? obj : obj.objection || JSON.stringify(obj)}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Quick Coach Prompts on Overview */}
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                            <span style={{color:'var(--gold)'}}>{Icons.lightbulb}</span>
                            <h3 style={{fontSize:14,fontWeight:600}}>Quick Coaching Insights</h3>
                        </div>
                        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                            {learningPrompts.slice(0,3).map((p,i) => (
                                <button key={i} className="coach-prompt-btn" onClick={()=>{setActiveTab('coach');setTimeout(()=>askCoach(p.label),100);}}>{p.label}</button>
                            ))}
                        </div>
                    </div>
                </div>
            )}

            {/* SCORECARD TAB */}
            {activeTab === 'scorecard' && (
                <div className="fade-in">
                    {call.scores && call.scores.length > 0 ? (
                        <div className="glass" style={{padding:24,borderRadius:12,marginBottom:20}}>
                            <h3 style={{fontSize:14,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:20}}>Performance Scorecard</h3>
                            <div style={{display:'flex',flexDirection:'column',gap:14}}>
                                {scoreDimensions.map(dim => {
                                    const s = call.scores[0]; const val = s[dim+'_score'];
                                    if (!val && val !== 0) return null;
                                    const pct = Math.max(0, Math.min(100, val));
                                    const color = pct >= 80 ? 'var(--success)' : pct >= 60 ? 'var(--gold)' : pct >= 40 ? 'var(--warning)' : 'var(--danger)';
                                    return (
                                        <div key={dim} style={{padding:'14px 18px',borderRadius:10,background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)'}}>
                                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                                                <div>
                                                    <span style={{fontSize:14,fontWeight:600,textTransform:'capitalize'}}>{dim.replace(/_/g,' ')}</span>
                                                    <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{scoreDescriptions[dim]}</div>
                                                </div>
                                                <span style={{fontSize:20,fontWeight:700,color}}>{Math.round(val)}</span>
                                            </div>
                                            <div style={{height:6,borderRadius:3,background:'rgba(255,255,255,0.06)',overflow:'hidden'}}>
                                                <div style={{height:'100%',width:`${pct}%`,borderRadius:3,background:color,transition:'width 0.6s ease'}}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    ) : (
                        <div className="glass" style={{padding:60,borderRadius:12,textAlign:'center'}}>
                            <p style={{color:'var(--text-muted)',fontSize:15}}>No scorecard available. Click Re-analyze to generate scores.</p>
                        </div>
                    )}
                </div>
            )}

            {/* TRANSCRIPT TAB */}
            {activeTab === 'transcript' && (
                <div className="fade-in">
                    {call.transcription ? (
                        <div className="glass" style={{padding:24,borderRadius:12}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                                <h3 style={{fontSize:14,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Full Transcription</h3>
                                <span style={{fontSize:12,color:'var(--text-muted)'}}>{call.transcription.split(/\s+/).length} words</span>
                            </div>
                            <div style={{maxHeight:600,overflow:'auto',fontSize:13,lineHeight:1.8,color:'var(--text-secondary)',whiteSpace:'pre-wrap',padding:'16px',borderRadius:8,background:'rgba(0,0,0,0.2)'}}>{call.transcription}</div>
                        </div>
                    ) : (
                        <div className="glass" style={{padding:60,borderRadius:12,textAlign:'center'}}>
                            <p style={{color:'var(--text-muted)',fontSize:15}}>No transcription available for this call.</p>
                        </div>
                    )}
                </div>
            )}

            {/* AI COACH TAB */}
            {activeTab === 'coach' && (
                <div className="fade-in">
                    {/* Learning Prompts */}
                    <div className="glass" style={{padding:24,borderRadius:12,marginBottom:20}}>
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
                            <span style={{color:'var(--gold)'}}>{Icons.lightbulb}</span>
                            <h3 style={{fontSize:14,fontWeight:600}}>Learning Prompts</h3>
                            <span style={{fontSize:12,color:'var(--text-muted)'}}>Click any prompt to ask the AI Coach</span>
                        </div>
                        <div className="resp-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                            {learningPrompts.map((p,i) => (
                                <button key={i} className="learning-card" onClick={()=>askCoach(p.label)} style={{display:'flex',alignItems:'center',gap:10,textAlign:'left',cursor:'pointer',background:'none',border:'1px solid var(--border)',color:'var(--text-secondary)',fontSize:13}}>
                                    <span style={{color:'var(--gold)',flexShrink:0}}>{p.icon}</span>
                                    <span>{p.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Coach Chat */}
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
                            <div style={{width:32,height:32,borderRadius:8,background:'linear-gradient(135deg,#E88725,#E8EAED)',display:'flex',alignItems:'center',justifyContent:'center',color:'#000'}}>{Icons.chat}</div>
                            <div>
                                <div style={{fontWeight:600,fontSize:14}}>AI Sales Coach</div>
                                <div style={{fontSize:11,color:'var(--text-muted)'}}>Ask anything about this call</div>
                            </div>
                        </div>

                        {/* Chat Messages */}
                        <div style={{maxHeight:400,overflow:'auto',marginBottom:16,display:'flex',flexDirection:'column',gap:12}}>
                            {coachMessages.length === 0 && (
                                <div style={{textAlign:'center',padding:'30px 0',color:'var(--text-muted)',fontSize:13}}>
                                    Ask a question or click a learning prompt above to start coaching.
                                </div>
                            )}
                            {coachMessages.map((msg,i) => (
                                <div key={i} style={{alignSelf: msg.role==='user' ? 'flex-end' : 'flex-start', maxWidth:'85%'}}>
                                    {msg.role === 'user' ? (
                                        <div style={{background:'rgba(232,135,37,0.15)',border:'1px solid rgba(232,135,37,0.2)',borderRadius:12,padding:'10px 16px',fontSize:13,color:'var(--text-primary)'}}>{msg.text}</div>
                                    ) : (
                                        <div className="coach-chat-bubble">{msg.text}</div>
                                    )}
                                </div>
                            ))}
                            {coachLoading && (
                                <div style={{alignSelf:'flex-start'}}>
                                    <div className="coach-chat-bubble" style={{display:'flex',gap:4,padding:'12px 20px'}}>
                                        <span className="typing-dot"></span><span className="typing-dot"></span><span className="typing-dot"></span>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef}/>
                        </div>

                        {/* Chat Input */}
                        <div style={{display:'flex',gap:8}}>
                            <input className="input" style={{flex:1}} placeholder="Ask the AI Coach about this call..." value={coachQuestion}
                                onChange={e=>setCoachQuestion(e.target.value)}
                                onKeyDown={e=>{if(e.key==='Enter'&&!coachLoading)askCoach(coachQuestion);}}
                                disabled={coachLoading}
                            />
                            <button className="btn btn-gold btn-sm" onClick={()=>askCoach(coachQuestion)} disabled={coachLoading || !coachQuestion.trim()}>
                                {Icons.send}
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* NOTES TAB */}
            {activeTab === 'notes' && (
                <div className="fade-in">
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <h3 style={{fontSize:14,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>Notes</h3>
                        {call.notes && call.notes.length > 0 ? call.notes.map(n=>(
                            <div key={n.id} style={{padding:'12px 16px',borderRadius:8,background:'rgba(255,255,255,0.02)',marginBottom:8,fontSize:13,border:'1px solid var(--border)'}}>
                                <div style={{color:'var(--text-secondary)',lineHeight:1.6}}>{n.content}</div>
                                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:6}}>{new Date(n.created_at).toLocaleString('en-IN',{timeZone:'Asia/Kolkata'})}</div>
                            </div>
                        )) : <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:16}}>No notes yet.</p>}
                        <div style={{display:'flex',gap:8,marginTop:12}}>
                            <input className="input" placeholder="Add a note..." value={note} onChange={e=>setNote(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addNote()} style={{flex:1}}/>
                            <button className="btn btn-gold btn-sm" onClick={addNote}>{Icons.plus}</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

// ============ PIPELINE (DRAG & DROP) ============
const PipelinePage = () => {
    const [deals, setDeals] = useState([]);
    const [showAdd, setShowAdd] = useState(false);
    const [form, setForm] = useState({contact_name:'',title:'',treatment_interest:'',deal_value:0,source:'phone',contact_phone:'',contact_email:''});
    const [draggedDeal, setDraggedDeal] = useState(null);
    const [dragOverStage, setDragOverStage] = useState(null);
    const [selectedDeal, setSelectedDeal] = useState(null);
    const [pipeSearch, setPipeSearch] = useState('');

    const stages = ['new_inquiry','contacted','consultation_booked','consultation_done','proposal_sent','won','lost'];
    const stageLabels = {'new_inquiry':'New Inquiry','contacted':'Contacted','consultation_booked':'Consult Booked','consultation_done':'Consult Done','proposal_sent':'Proposal Sent','won':'Won','lost':'Lost'};
    const stageColors = {'new_inquiry':'var(--info)','contacted':'#8B5CF6','consultation_booked':'var(--gold)','consultation_done':'#F59E0B','proposal_sent':'#EC4899','won':'var(--success)','lost':'var(--danger)'};

    useEffect(()=>{ apiFetch('/pipeline').then(setDeals).catch(()=>{}); },[]);

    const addDeal = async () => {
        try { await apiFetch('/pipeline',{method:'POST',body:form}); setShowAdd(false); setForm({contact_name:'',title:'',treatment_interest:'',deal_value:0,source:'phone',contact_phone:'',contact_email:''}); apiFetch('/pipeline').then(setDeals); } catch(e){}
    };

    const moveStage = async (id, stage) => {
        // Optimistic update
        setDeals(prev => prev.map(d => d.id === id ? {...d, stage} : d));
        try {
            await apiFetch(`/pipeline/${id}`,{method:'PATCH',body:{stage}});
        } catch(e) {
            apiFetch('/pipeline').then(setDeals); // revert on failure
        }
    };

    const handleDragStart = (e, deal) => {
        setDraggedDeal(deal);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', deal.id);
        // Make the drag image slightly transparent
        setTimeout(() => { e.target.classList.add('dragging'); }, 0);
    };

    const handleDragEnd = (e) => {
        e.target.classList.remove('dragging');
        setDraggedDeal(null);
        setDragOverStage(null);
    };

    const handleDragOver = (e, stage) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (dragOverStage !== stage) setDragOverStage(stage);
    };

    const handleDragLeave = (e, stage) => {
        // Only clear if actually leaving the drop zone
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX; const y = e.clientY;
        if (x < rect.left || x > rect.right || y < rect.top || y > rect.bottom) {
            if (dragOverStage === stage) setDragOverStage(null);
        }
    };

    const handleDrop = (e, targetStage) => {
        e.preventDefault();
        setDragOverStage(null);
        if (draggedDeal && draggedDeal.stage !== targetStage) {
            moveStage(draggedDeal.id, targetStage);
        }
        setDraggedDeal(null);
    };

    // Compute pipeline value per stage
    const stageValue = (stage) => deals.filter(d=>d.stage===stage).reduce((sum,d)=>sum+(d.deal_value||0),0);
    const totalValue = deals.reduce((sum,d)=>sum+(d.deal_value||0),0);

    // Pipeline stats
    const wonDeals = deals.filter(d=>d.status==='won'||d.stage==='won');
    const lostDeals = deals.filter(d=>d.status==='lost'||d.stage==='lost');
    const openDeals = deals.filter(d=>d.stage!=='won'&&d.stage!=='lost');
    const wonValue = wonDeals.reduce((s,d)=>s+(d.deal_value||0),0);
    const closedCount = wonDeals.length + lostDeals.length;
    const conversionRate = closedCount > 0 ? Math.round(wonDeals.length/closedCount*100) : 0;
    const avgDealValue = wonDeals.length > 0 ? Math.round(wonValue/wonDeals.length) : 0;

    if (selectedDeal) {
        return (
            <div className="fade-in">
                <button className="btn btn-ghost btn-sm" onClick={()=>setSelectedDeal(null)} style={{marginBottom:20}}>{Icons.back}<span>Back to Pipeline</span></button>
                <div className="glass" style={{borderRadius:12,padding:24}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
                        <div>
                            <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{selectedDeal.title}</h2>
                            <p style={{color:'var(--text-muted)',fontSize:14}}>{selectedDeal.contact_name}</p>
                        </div>
                        <div style={{textAlign:'right'}}>
                            <div style={{fontSize:20,fontWeight:700,color:'var(--gold)'}}>{'\u20B9'}{(selectedDeal.deal_value||0).toLocaleString('en-IN')}</div>
                            <span className="badge" style={{background:stageColors[selectedDeal.stage],color:'#fff',fontSize:11,marginTop:4}}>{stageLabels[selectedDeal.stage]}</span>
                        </div>
                    </div>
                    {selectedDeal.treatment_interest && <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:8}}>Treatment: {selectedDeal.treatment_interest}</div>}
                    {selectedDeal.source && <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:16}}>Source: {selectedDeal.source}</div>}
                    {/* Stage quick-move buttons */}
                    <div style={{marginBottom:20}}>
                        <div style={{fontSize:12,color:'var(--text-muted)',fontWeight:600,marginBottom:8}}>Move to Stage:</div>
                        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                            {stages.filter(s=>s!==selectedDeal.stage).map(s => (
                                <button key={s} className="btn btn-ghost btn-sm" style={{fontSize:11,borderColor:stageColors[s],color:stageColors[s]}} onClick={()=>{moveStage(selectedDeal.id,s);setSelectedDeal({...selectedDeal,stage:s});}}>
                                    {stageLabels[s]}
                                </button>
                            ))}
                        </div>
                    </div>
                    {selectedDeal.contact_phone && <>
                        <ContactActionBar lead={{id:selectedDeal.id,phone:selectedDeal.contact_phone,name:selectedDeal.title}} onAction={(type)=>{}} />
                        <NotesSection leadId={selectedDeal.id} />
                        <RemindersSection leadId={selectedDeal.id} />
                    </>}
                </div>
            </div>
        );
    }

    return (
        <div className="fade-in">
            <div className="resp-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                <div>
                    <h1 style={{fontSize:24,fontWeight:700}}>Pipeline</h1>
                    <div style={{display:'flex',gap:16,marginTop:4}}>
                        <span style={{color:'var(--text-muted)',fontSize:14}}>{deals.length} deals</span>
                        <span style={{color:'var(--gold)',fontSize:14,fontWeight:600}}>Pipeline: {'\u20B9'}{totalValue.toLocaleString('en-IN')}</span>
                    </div>
                </div>
                <button className="btn btn-gold" onClick={()=>setShowAdd(!showAdd)}>{Icons.plus}<span>New Deal</span></button>
            </div>

            {/* Search */}
            <div style={{marginBottom:16,position:'relative'}}>
                <input className="input" placeholder="Search deals by name, contact, or treatment..." value={pipeSearch} onChange={e=>setPipeSearch(e.target.value)} style={{paddingLeft:36,maxWidth:400}}/>
                <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)',fontSize:14}}>{Icons.search}</span>
                {pipeSearch && <span onClick={()=>setPipeSearch('')} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)',cursor:'pointer',fontSize:16}}>x</span>}
            </div>

            {/* Pipeline Summary Stats */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}} className="resp-grid-4">
                <div className="glass" style={{padding:'12px 16px',borderRadius:10,textAlign:'center'}}>
                    <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.5px'}}>Open Deals</div>
                    <div style={{fontSize:20,fontWeight:700,marginTop:2,color:'var(--info)'}}>{openDeals.length}</div>
                </div>
                <div className="glass" style={{padding:'12px 16px',borderRadius:10,textAlign:'center'}}>
                    <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.5px'}}>Won Revenue</div>
                    <div style={{fontSize:20,fontWeight:700,marginTop:2,color:'var(--success)'}}>{'\u20B9'}{wonValue.toLocaleString('en-IN')}</div>
                </div>
                <div className="glass" style={{padding:'12px 16px',borderRadius:10,textAlign:'center'}}>
                    <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.5px'}}>Conversion</div>
                    <div style={{fontSize:20,fontWeight:700,marginTop:2,color:conversionRate>=50?'var(--success)':'var(--gold)'}}>{conversionRate}%</div>
                </div>
                <div className="glass" style={{padding:'12px 16px',borderRadius:10,textAlign:'center'}}>
                    <div style={{fontSize:11,color:'var(--text-muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.5px'}}>Avg Deal</div>
                    <div style={{fontSize:20,fontWeight:700,marginTop:2}}>{'\u20B9'}{avgDealValue.toLocaleString('en-IN')}</div>
                </div>
            </div>

            {/* Funnel Progress Bar */}
            {deals.length > 0 && (
                <div className="glass" style={{padding:'12px 16px',borderRadius:10,marginBottom:16}}>
                    <div style={{display:'flex',gap:2,height:6,borderRadius:3,overflow:'hidden'}}>
                        {stages.map(stage => {
                            const count = deals.filter(d=>d.stage===stage).length;
                            const pct = deals.length > 0 ? (count/deals.length*100) : 0;
                            return pct > 0 ? <div key={stage} style={{width:`${pct}%`,background:stageColors[stage],borderRadius:3,transition:'width 0.3s'}} title={`${stageLabels[stage]}: ${count}`}></div> : null;
                        })}
                    </div>
                    <div style={{display:'flex',gap:12,marginTop:8,flexWrap:'wrap'}}>
                        {stages.map(stage => {
                            const count = deals.filter(d=>d.stage===stage).length;
                            if (count === 0) return null;
                            return <span key={stage} style={{fontSize:11,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:4}}>
                                <span style={{width:6,height:6,borderRadius:'50%',background:stageColors[stage],display:'inline-block'}}></span>
                                {stageLabels[stage]} ({count})
                            </span>;
                        })}
                    </div>
                </div>
            )}

            {/* Drag hint */}
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
                <span style={{opacity:0.5}}>{Icons.drag}</span>
                Drag and drop deal cards between columns to change stages
            </div>

            {showAdd && (
                <div className="glass" style={{padding:24,borderRadius:12,marginBottom:20}}>
                    <div className="resp-grid-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Contact Name *</label><input className="input" value={form.contact_name} onChange={e=>setForm({...form,contact_name:e.target.value})} required/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Deal Title *</label><input className="input" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} required/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Treatment</label><input className="input" placeholder="e.g. Hair Transplant" value={form.treatment_interest} onChange={e=>setForm({...form,treatment_interest:e.target.value})}/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Deal Value</label><input className="input" type="number" value={form.deal_value} onChange={e=>setForm({...form,deal_value:parseFloat(e.target.value)||0})}/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Phone</label><input className="input" value={form.contact_phone} onChange={e=>setForm({...form,contact_phone:e.target.value})}/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Source</label>
                            <select className="input" value={form.source} onChange={e=>setForm({...form,source:e.target.value})}><option value="phone">Phone</option><option value="walk_in">Walk-in</option><option value="website">Website</option><option value="referral">Referral</option><option value="social_media">Social Media</option><option value="ad">Ad</option></select>
                        </div>
                    </div>
                    <div style={{display:'flex',gap:8}}><button className="btn btn-gold btn-sm" onClick={addDeal}>Create Deal</button><button className="btn btn-ghost btn-sm" onClick={()=>setShowAdd(false)}>Cancel</button></div>
                </div>
            )}
            <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:16}} className="scrollbar-hide pipeline-scroll">
                {stages.map(stage => {
                    const ps = pipeSearch.toLowerCase();
                    const stageDeals = deals.filter(d=>d.stage===stage).filter(d=> !ps || (d.title||'').toLowerCase().includes(ps) || (d.contact_name||'').toLowerCase().includes(ps) || (d.treatment_interest||'').toLowerCase().includes(ps));
                    const sv = stageValue(stage);
                    const isOver = dragOverStage === stage && draggedDeal?.stage !== stage;
                    return (
                        <div key={stage} className="stage-col" style={{flexShrink:0}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'0 4px'}}>
                                <div style={{width:8,height:8,borderRadius:'50%',background:stageColors[stage]}}></div>
                                <span style={{fontSize:13,fontWeight:600,color:'var(--text-secondary)'}}>{stageLabels[stage]}</span>
                                <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:'auto'}}>{stageDeals.length}</span>
                            </div>
                            {sv > 0 && <div style={{fontSize:11,color:stageColors[stage],fontWeight:600,marginBottom:8,padding:'0 4px'}}>{'\u20B9'}{sv.toLocaleString('en-IN')}</div>}
                            <div
                                className={`stage-drop-zone ${isOver ? 'drag-over' : ''}`}
                                onDragOver={(e) => handleDragOver(e, stage)}
                                onDragLeave={(e) => handleDragLeave(e, stage)}
                                onDrop={(e) => handleDrop(e, stage)}
                                style={{display:'flex',flexDirection:'column',gap:8,padding:4}}
                            >
                                {stageDeals.map(deal => (
                                    <div key={deal.id}
                                        className="glass pipeline-card"
                                        draggable="true"
                                        onDragStart={(e) => handleDragStart(e, deal)}
                                        onDragEnd={handleDragEnd}
                                        onClick={()=>setSelectedDeal(deal)}
                                        style={{padding:16,borderRadius:10,borderLeft:`3px solid ${stageColors[stage]}`,cursor:'pointer'}}
                                    >
                                        <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
                                            <span style={{color:'var(--text-muted)',marginTop:2,cursor:'grab',opacity:0.4}}>{Icons.drag}</span>
                                            <div style={{flex:1,minWidth:0}}>
                                                <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{deal.title}</div>
                                                <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{deal.contact_name}</div>
                                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                                    <span style={{fontWeight:700,fontSize:14,color:'var(--gold)'}}>{'\u20B9'}{(deal.deal_value||0).toLocaleString('en-IN')}</span>
                                                    {deal.treatment_interest && <span className="badge badge-gold" style={{fontSize:10}}>{deal.treatment_interest}</span>}
                                                </div>
                                                {deal.source && <div style={{fontSize:10,color:'var(--text-muted)',marginTop:6}}>via {deal.source}</div>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {stageDeals.length === 0 && !isOver && (
                                    <div style={{padding:'20px',textAlign:'center',color:'var(--text-muted)',fontSize:12,opacity:0.5}}>
                                        Drop deals here
                                    </div>
                                )}
                                {isOver && (
                                    <div style={{padding:'16px',textAlign:'center',color:'var(--gold)',fontSize:12,borderRadius:8,border:'1px dashed rgba(232,135,37,0.3)',background:'rgba(232,135,37,0.04)'}}>
                                        Move to {stageLabels[stage]}
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                })}
            </div>
        </div>
    );
};

// ============ COACHING ============
const CoachingPage = () => {
    const [insights, setInsights] = useState([]);
    const [perf, setPerf] = useState(null);
    const [leaderboard, setLeaderboard] = useState([]);
    const [lbVisible, setLbVisible] = useState(true);
    const [lbMessage, setLbMessage] = useState('');
    const [weeklyReport, setWeeklyReport] = useState(null);
    const [growthPlan, setGrowthPlan] = useState(null);
    const [activeTab, setActiveTab] = useState('overview');
    const [growthLoading, setGrowthLoading] = useState(false);
    const [reportLoading, setReportLoading] = useState(false);
    const [comparison, setComparison] = useState(null);
    const [compareIds, setCompareIds] = useState([]);
    const [compareLoading, setCompareLoading] = useState(false);

    useEffect(()=>{
        apiFetch('/coaching/insights').then(d => setInsights(Array.isArray(d) ? d : [])).catch(()=>{});
        apiFetch('/coaching/performance').then(d => setPerf(d && typeof d === 'object' && !d.detail ? d : null)).catch(()=>{});
        apiFetch('/coaching/leaderboard').then(data => {
            if (data && data.leaderboard) { setLeaderboard(Array.isArray(data.leaderboard) ? data.leaderboard : []); setLbVisible(data.visible !== false); setLbMessage(data.message || ''); }
            else if (Array.isArray(data)) { setLeaderboard(data); }
        }).catch(()=>{});
        apiFetch('/reports/weekly').then(d => setWeeklyReport(d && typeof d === 'object' && !d.detail ? d : null)).catch(()=>{});
    },[]);

    const runCompare = async () => {
        if (compareIds.length < 2) return;
        setCompareLoading(true);
        try {
            const res = await apiFetch(`/coaching/compare?user_ids=${compareIds.join(',')}`);
            setComparison(res.comparison || res);
        } catch(e) { alert('Coaching comparison failed: ' + (e.message || 'Server error. Please try again.')); } finally { setCompareLoading(false); }
    };

    const toggleCompareId = (id) => {
        setCompareIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : prev.length >= 5 ? prev : [...prev, id]);
    };

    const generateGrowth = async (regenerateChanges) => {
        setGrowthLoading(true);
        try {
            const body = {};
            if (regenerateChanges) body.regenerate_changes = regenerateChanges;
            const res = await apiFetch('/coaching/growth-plan', {method:'POST', body});
            setGrowthPlan(res);
        } catch(e) { alert('Growth plan generation failed: ' + (e.message || 'Check your API key in Settings')); } finally { setGrowthLoading(false); }
    };

    const generateReport = async (regenerateChanges) => {
        setReportLoading(true);
        try {
            const body = {};
            if (regenerateChanges) body.regenerate_changes = regenerateChanges;
            const res = await apiFetch('/reports/weekly/generate', {method:'POST', body});
            setWeeklyReport(res);
        } catch(e) { alert('Report generation failed: ' + (e.message || 'Check your API key in Settings')); } finally { setReportLoading(false); }
    };

    const typeIcon = (t) => t==='praise'?Icons.star:t==='warning'?'!':t==='milestone'?Icons.check:t==='tip'?'?':'i';
    const typeColor = (t) => t==='praise'?'badge-green':t==='warning'?'badge-red':t==='milestone'?'badge-gold':t==='tip'?'badge-blue':'badge-gray';

    const tabs = [
        {id:'overview',label:'Performance'},
        {id:'insights',label:'Coaching Tips'},
        {id:'leaderboard',label:'Leaderboard'},
        {id:'compare',label:'Compare Agents'},
        {id:'report',label:'Weekly Report'},
        {id:'growth',label:'Growth Plan'},
    ];

    return (
        <div className="fade-in">
            <div style={{marginBottom:28}}>
                <h1 style={{fontSize:24,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>AI Coaching Hub</h1>
                <p style={{color:'var(--text-muted)',fontSize:14,marginTop:4}}>Performance insights, team rankings, and growth plans</p>
            </div>

            {perf && (() => {
                const bestArea = perf.strongest_areas && perf.strongest_areas.length > 0
                    ? (typeof perf.strongest_areas[0] === 'object' ? perf.strongest_areas[0].area : perf.strongest_areas[0])
                    : 'N/A';
                const focusArea = perf.weakest_areas && perf.weakest_areas.length > 0
                    ? (typeof perf.weakest_areas[0] === 'object' ? perf.weakest_areas[0].area : perf.weakest_areas[0])
                    : 'N/A';
                const scoreChange = perf.score_change || 0;
                const fmtArea = (s) => String(s).replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
                return (
                    <div className="stat-card-row" style={{display:'flex',gap:16,marginBottom:28,flexWrap:'wrap'}}>
                        <StatCard label="My Avg Score" value={perf.avg_score?.toFixed(0)||'0'} accent="var(--gold)"/>
                        <StatCard label="Calls (30d)" value={perf.total_calls||0}/>
                        <StatCard label="7d vs 30d" value={`${scoreChange >= 0 ? '+' : ''}${scoreChange}`} accent={scoreChange >= 0 ? 'var(--success)' : 'var(--danger)'}/>
                        <StatCard label="Best Area" value={fmtArea(bestArea)} accent="var(--success)"/>
                        <StatCard label="Focus Area" value={fmtArea(focusArea)} accent="var(--warning)"/>
                    </div>
                );
            })()}

            <div style={{display:'flex',gap:4,marginBottom:24,overflowX:'auto',paddingBottom:2}} className="scrollbar-hide">
                {tabs.map(tab => (
                    <button key={tab.id} className={`detail-tab ${activeTab===tab.id?'active':''}`} onClick={()=>setActiveTab(tab.id)}>{tab.label}</button>
                ))}
            </div>

            {activeTab === 'overview' && perf && (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}} className="resp-grid-2">
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Score Trend (30 Days)</h3>
                        {perf.trend && perf.trend.length > 0 ? (
                            <div>
                                <div style={{display:'flex',alignItems:'end',gap:4,height:120}}>
                                    {perf.trend.map((t,i) => {
                                        const sc = typeof t === 'object' ? (t.score||0) : t;
                                        const h = Math.max(10, (sc/100)*120);
                                        const c = sc >= 80 ? 'var(--success)' : sc >= 60 ? 'var(--gold)' : sc >= 40 ? 'var(--warning)' : 'var(--danger)';
                                        return <div key={i} style={{flex:1,height:h,background:c,borderRadius:4,opacity:0.8,minWidth:6}} title={`Score: ${sc}${typeof t === 'object' && t.date ? ' | '+t.date : ''}`}/>;
                                    })}
                                </div>
                                <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
                                    <span style={{fontSize:10,color:'var(--text-muted)'}}>Oldest</span>
                                    <span style={{fontSize:10,color:'var(--text-muted)'}}>Latest</span>
                                </div>
                            </div>

                    </div>
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Skill Breakdown</h3>
                        {perf.scores_by_dimension && Object.keys(perf.scores_by_dimension).length > 0 ? (
                            <div style={{display:'flex',flexDirection:'column',gap:10}}>
                                {Object.entries(perf.scores_by_dimension).sort((a,b)=>b[1]-a[1]).map(([dim,val]) => (
                                    <div key={dim}>
                                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                                            <span style={{fontSize:12,color:'var(--text-secondary)',textTransform:'capitalize'}}>{dim.replace(/_score$/,'').replace(/_/g,' ')}</span>
                                            <span style={{fontSize:12,fontWeight:600,color: val >= 70 ? 'var(--success)' : val >= 50 ? 'var(--gold)' : 'var(--danger)'}}>{val}</span>
                                        </div>
                                        <div style={{height:6,borderRadius:3,background:'rgba(255,255,255,0.06)'}}>
                                            <div style={{height:6,borderRadius:3,width:`${val}%`,background: val >= 70 ? 'var(--success)' : val >= 50 ? 'var(--gold)' : 'var(--danger)',transition:'width 0.6s'}}/>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : perf.strongest_areas && perf.strongest_areas.length > 0 ? (
                            <div style={{display:'flex',flexDirection:'column',gap:8}}>
                                {(perf.strongest_areas||[]).slice(0,3).map((a,i) => {

                                    const score = typeof a === 'object' ? a.score : null;

                                    <span className={`badge ${typeColor(ins.insight_type)}`}>{ins.insight_type}</span>
                                    <div style={{flex:1}}>
                                        <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{ins.title}</div>

                                        {ins.category && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:6}}>Category: {ins.category}</div>}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                )
            )}

                        <div style={{padding:40,textAlign:'center'}}>
                            <p style={{color:'var(--text-muted)',fontSize:14}}>{lbMessage || 'Leaderboard is currently hidden by your clinic admin.'}</p>

                            <table style={{width:'100%',borderCollapse:'collapse'}}>

                                    <th style={{padding:'12px 16px',textAlign:'left',fontSize:12,fontWeight:600,color:'var(--text-muted)'}}>Agent</th>
                                    <th style={{padding:'12px 16px',textAlign:'center',fontSize:12,fontWeight:600,color:'var(--text-muted)'}}>Avg Score</th>
                                    <th style={{padding:'12px 16px',textAlign:'center',fontSize:12,fontWeight:600,color:'var(--text-muted)'}}>Calls</th>
                                    <th style={{padding:'12px 16px',textAlign:'center',fontSize:12,fontWeight:600,color:'var(--text-muted)'}}>Best</th>

                                <tbody>
                                    {leaderboard.map((r,i) => (
                                        <tr key={r.user_id} className="table-row" style={{borderBottom:'1px solid var(--border)'}}>
                                            <td style={{padding:'12px 16px'}}>

                                            <td style={{padding:'12px 16px',fontWeight:600,fontSize:14}}>{r.name}</td>
                                            <td style={{padding:'12px 16px',textAlign:'center'}}><ScoreRing score={r.avg_score} size={40} strokeWidth={3}/></td>

                            <p style={{color:'var(--text-muted)',fontSize:13}}>No agents available. Team members need to complete analyzed calls first.</p>

                                        <div style={{fontSize:16,fontWeight:700}}>{agent.name}</div>
                                        <div style={{fontSize:12,color:'var(--text-muted)'}}>{agent.role} | {agent.total_calls} calls</div>

                                            </div>
                                        </div>
                                    )}
                                </div>
                            ))}

                    )}
                </div>

                                {reportLoading ? <span className="spinner"></span> : Icons.refresh}
                                <span>{reportLoading ? 'Generating...' : 'Generate Report'}</span>
                            </button>
                        </div>
                        {weeklyReport ? (() => {
                            const ais = weeklyReport.ai_summary || {};
                            const isObj = typeof ais === 'object' && ais !== null;

                            const trend = isObj ? (ais.overall_trend || '') : '';
                            const highlights = isObj ? (ais.team_highlights || []) : [];
                            const leak = isObj ? (ais.conversion_leak_analysis || null) : null;
                            const agentInsights = isObj ? (ais.individual_agent_insights || []) : [];
                            const recs = weeklyReport.ai_recommendations || (isObj ? (ais.top_3_recommendations || []) : []);
                            const revImpact = weeklyReport.revenue_impact || (isObj ? (ais.revenue_impact || {}) : {});
                            const sb = weeklyReport.score_breakdown || {};
                            const hasSB = Object.keys(sb).length > 0;
                            const perfColors = {excellent:'var(--success)',good:'#60a5fa',needs_coaching:'var(--gold)',concerning:'var(--danger)'};
                            return (
                                <div>
                                    <div className="stat-card-row" style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
                                        <StatCard label="Total Calls" value={weeklyReport.total_calls||0}/>
                                        <StatCard label="Avg Score" value={(weeklyReport.avg_score||0).toFixed(1)} accent="var(--gold)"/>
                                        <StatCard label="Conversion" value={`${(weeklyReport.conversion_rate||0).toFixed(1)}%`} accent="var(--success)"/>
                                        {weeklyReport.best_agent_name && weeklyReport.best_agent_name !== 'N/A' && <StatCard label="Top Performer" value={weeklyReport.best_agent_name} accent="var(--gold)"/>}
                                    </div>

                                    {execSummary && (
                                        <div style={{background:'rgba(232,135,37,0.04)',border:'1px solid rgba(232,135,37,0.15)',borderRadius:12,padding:20,marginBottom:16}}>

                                                <div style={{fontSize:13,fontWeight:600,color:'var(--gold)'}}>AI Executive Summary</div>

                                            </div>
                                            <div style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7}}>{execSummary}</div>

                                            <div style={{display:'flex',flexDirection:'column',gap:12}}>

                                                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                                                            <span style={{fontWeight:600,fontSize:13}}>{a.agent_name}</span>
                                                            <span className="badge" style={{fontSize:10,background:perfColors[a.performance_level]||'var(--gold)',color:'#000'}}>{(a.performance_level||'').replace(/_/g,' ')}</span>
                                                        </div>

                                                        {a.key_weakness && <div style={{fontSize:12,color:'var(--danger)',marginBottom:3}}>Focus area: {a.key_weakness}</div>}

                                            <div style={{fontSize:13,fontWeight:600,color:'var(--gold)',marginBottom:14}}>Top Recommendations</div>
                                            <div style={{display:'flex',flexDirection:'column',gap:14}}>
                                                {recs.map((rec,i) => (
                                                    <div key={i} style={{padding:14,background:'rgba(0,0,0,0.15)',borderRadius:10,borderLeft:'3px solid var(--gold)'}}>
                                                        <div style={{fontWeight:600,fontSize:13,marginBottom:4,color:'var(--gold)'}}>#{typeof rec === 'object' ? (rec.rank||i+1) : i+1}. {typeof rec === 'string' ? rec : rec.recommendation || ''}</div>
                                                        {typeof rec === 'object' && rec.rationale && <div style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.5,marginBottom:4}}>{rec.rationale}</div>}
                                                        {typeof rec === 'object' && rec.expected_impact && <div style={{fontSize:12,color:'var(--success)',marginBottom:3}}>Impact: {rec.expected_impact}</div>}
                                                        {typeof rec === 'object' && rec.implementation && <div style={{fontSize:12,color:'var(--text-muted)'}}>How: {rec.implementation}</div>}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {Object.keys(revImpact).length > 0 && (
                                        <div style={{background:'rgba(232,135,37,0.04)',border:'1px solid rgba(232,135,37,0.15)',borderRadius:12,padding:20}}>
                                            <div style={{fontSize:13,fontWeight:600,color:'var(--gold)',marginBottom:10}}>Revenue Impact</div>
                                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                                                {revImpact.estimated_weekly_impact && <div style={{padding:12,background:'rgba(0,0,0,0.15)',borderRadius:8}}><div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>Current Weekly</div><div style={{fontSize:14,fontWeight:700,color:'var(--gold)'}}>{revImpact.estimated_weekly_impact}</div></div>}
                                                {revImpact.improvement_opportunity && <div style={{padding:12,background:'rgba(0,0,0,0.15)',borderRadius:8}}><div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>Improvement Opportunity</div><div style={{fontSize:14,fontWeight:700,color:'var(--success)'}}>{revImpact.improvement_opportunity}</div></div>}
                                                {revImpact.conversion_rate_change && <div style={{padding:12,background:'rgba(0,0,0,0.15)',borderRadius:8}}><div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>Conversion Change</div><div style={{fontSize:14,fontWeight:700}}>{revImpact.conversion_rate_change}</div></div>}
                                                {revImpact.high_value_treatments && <div style={{padding:12,background:'rgba(0,0,0,0.15)',borderRadius:8}}><div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>High Value Treatments</div><div style={{fontSize:13,color:'var(--text-secondary)'}}>{revImpact.high_value_treatments}</div></div>}

                                        </div>

                                <p style={{fontSize:14}}>No weekly report generated yet. Click "Generate Report" to create one with AI insights.</p>

            {activeTab === 'growth' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                        <h3 style={{fontSize:16,fontWeight:700}}>AI Growth Plan</h3>
                        <button className="btn btn-gold btn-sm" onClick={generateGrowth} disabled={growthLoading}>

                                    <div style={{fontWeight:600,fontSize:14,marginBottom:6,color:'var(--gold)'}}>{area.area}</div>

                                </div>

                            {growthPlan.encouragement && (
                                <div style={{marginTop:16,padding:16,background:'rgba(34,197,94,0.06)',border:'1px solid rgba(34,197,94,0.15)',borderRadius:10}}>
                                    <div style={{fontSize:13,color:'var(--success)',lineHeight:1.6}}>{growthPlan.encouragement}</div>
                                </div>
                            )}
                            <RegenerateWithChanges loading={growthLoading} onRegenerate={(changes)=>generateGrowth(changes)}/>

                    ) : (
                        <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>
                            <p style={{fontSize:14}}>Generate a personalized AI growth plan based on your recent call performance.</p>

                    )}
                    <GenerationHistory endpoint="coaching" filterAction="growth_plan" onRestore={(o)=>setGrowthPlan(o)}/>

            )}
        </div>

};

// ============ CONTACTS ============
const ContactsPage = () => {
    const [contacts, setContacts] = useState([]);
    const [search, setSearch] = useState('');
    const [selectedContact, setSelectedContact] = useState(null);
    const [sentimentFilter, setSentimentFilter] = useState('all');
    const [sortBy, setSortBy] = useState('name_asc');
    const [loading, setLoading] = useState(true);
    useEffect(()=>{
        apiFetch('/contacts').then(data => {
            const arr = Array.isArray(data?.contacts) ? data.contacts : Array.isArray(data) ? data : [];
            setContacts(arr);
            setLoading(false);
        }).catch(()=>setLoading(false));
    },[]);

    const filtered = contacts.filter(c => {
        if (search && !(c.name||'').toLowerCase().includes(search.toLowerCase()) && !(c.phone||'').includes(search) && !(c.email||'').toLowerCase().includes(search.toLowerCase())) return false;
        if (sentimentFilter !== 'all' && (c.latest_sentiment||'unknown') !== sentimentFilter) return false;
        return true;
    }).sort((a,b) => {
        if (sortBy === 'name_asc') return (a.name||'').localeCompare(b.name||'');
        if (sortBy === 'name_desc') return (b.name||'').localeCompare(a.name||'');
        if (sortBy === 'calls') return (b.total_calls||0) - (a.total_calls||0);
        if (sortBy === 'value') return (b.deal_value||0) - (a.deal_value||0);
        if (sortBy === 'deals') return (b.total_deals||0) - (a.total_deals||0);
        return 0;
    });

    // Stats
    const totalValue = contacts.reduce((s,c) => s + (c.deal_value||0), 0);
    const totalCalls = contacts.reduce((s,c) => s + (c.total_calls||0), 0);
    const totalDeals = contacts.reduce((s,c) => s + (c.total_deals||0), 0);
    const posCount = contacts.filter(c => c.latest_sentiment === 'positive').length;
    const posPct = contacts.length > 0 ? Math.round(posCount / contacts.length * 100) : 0;

    if (selectedContact) {
        const sc = selectedContact;
        return (
            <div className="fade-in">
                <button className="btn btn-ghost btn-sm" onClick={()=>setSelectedContact(null)} style={{marginBottom:20,display:'flex',alignItems:'center',gap:6}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Back to Contacts
                </button>
                <div className="glass" style={{borderRadius:16,padding:28}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:12}}>
                        <div>
                            <h2 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{sc.name||'Unknown'}</h2>
                            <p style={{color:'var(--text-muted)',fontSize:14}}>{[sc.phone,sc.email].filter(Boolean).join(' | ')}</p>
                        </div>
                        {sc.latest_sentiment && <span className={`badge ${sc.latest_sentiment==='positive'?'badge-green':sc.latest_sentiment==='negative'?'badge-red':'badge-gray'}`} style={{fontSize:12}}>{sc.latest_sentiment}</span>}
                    </div>
                    <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
                        <div style={{padding:'10px 16px',background:'rgba(232,135,37,0.06)',borderRadius:10,textAlign:'center',minWidth:90}}>
                            <div style={{fontSize:20,fontWeight:700,color:'var(--gold)'}}>{sc.total_calls||0}</div>
                            <div style={{fontSize:11,color:'var(--text-muted)'}}>Calls</div>
                        </div>
                        <div style={{padding:'10px 16px',background:'rgba(34,197,94,0.06)',borderRadius:10,textAlign:'center',minWidth:90}}>
                            <div style={{fontSize:20,fontWeight:700,color:'var(--success)'}}>{sc.total_deals||0}</div>
                            <div style={{fontSize:11,color:'var(--text-muted)'}}>Deals</div>
                        </div>
                        {sc.deal_value > 0 && <div style={{padding:'10px 16px',background:'rgba(232,135,37,0.06)',borderRadius:10,textAlign:'center',minWidth:90}}>
                            <div style={{fontSize:20,fontWeight:700,color:'var(--gold)'}}>&#8377;{sc.deal_value.toLocaleString('en-IN')}</div>
                            <div style={{fontSize:11,color:'var(--text-muted)'}}>Value</div>
                        </div>}
                        {sc.treatments_interested && <div style={{padding:'10px 16px',background:'rgba(96,165,250,0.06)',borderRadius:10,textAlign:'center',minWidth:90}}>
                            <div style={{fontSize:14,fontWeight:600,color:'#60a5fa'}}>{sc.treatments_interested}</div>
                            <div style={{fontSize:11,color:'var(--text-muted)'}}>Treatment</div>
                        </div>}
                    </div>
                    <ContactActionBar lead={sc} onAction={(type, lead) => {}} />
                    <NotesSection leadId={sc.id} />
                    <RemindersSection leadId={sc.id} />
                </div>
            </div>
        );
    }

    if (loading) return <div style={{textAlign:'center',padding:60}}><span className="spinner"></span><p style={{color:'var(--text-muted)',fontSize:13,marginTop:12}}>Loading contacts...</p></div>;

    return (
        <div className="fade-in">
            <div className="resp-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
                <div><h1 style={{fontSize:24,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>Contacts</h1><p style={{color:'var(--text-muted)',fontSize:14,marginTop:4}}>{contacts.length} total contacts</p></div>
                <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                    <div style={{position:'relative',flex:'1 1 180px'}}><span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)'}}>{Icons.search}</span><input className="input" style={{paddingLeft:36,width:'100%'}} placeholder="Search contacts..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
                    <a href="/api/contacts/csv" target="_blank" className="btn btn-ghost btn-sm">{Icons.download}<span>Export CSV</span></a>
                </div>
            </div>

            {/* Stats Bar */}
            {contacts.length > 0 && (
                <div className="stat-card-row" style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
                    <StatCard label="Total Contacts" value={contacts.length}/>
                    <StatCard label="Total Calls" value={totalCalls}/>
                    <StatCard label="Total Deals" value={totalDeals}/>
                    <StatCard label="Pipeline Value" value={`\u20B9${totalValue.toLocaleString('en-IN')}`} accent="var(--gold)"/>
                    <StatCard label="Positive %" value={`${posPct}%`} accent="var(--success)"/>
                </div>
            )}

            {/* Filters */}
            {contacts.length > 0 && (
                <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
                    <span style={{fontSize:12,color:'var(--text-muted)',marginRight:4}}>Sentiment:</span>
                    {['all','positive','neutral','negative'].map(s => (
                        <button key={s} className={`btn btn-xs ${sentimentFilter===s?'btn-gold':'btn-ghost'}`} onClick={()=>setSentimentFilter(s)} style={{textTransform:'capitalize'}}>{s}</button>
                    ))}
                    <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:12,marginRight:4}}>Sort:</span>
                    <select className="input" style={{width:'auto',padding:'4px 10px',fontSize:12}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                        <option value="name_asc">Name A-Z</option>
                        <option value="name_desc">Name Z-A</option>
                        <option value="calls">Most Calls</option>
                        <option value="deals">Most Deals</option>
                        <option value="value">Highest Value</option>
                    </select>
                    {(sentimentFilter !== 'all' || search) && <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:8}}>Showing {filtered.length} of {contacts.length}</span>}
                </div>
            )}

            {filtered.length === 0 ? (
                <div className="glass" style={{padding:60,borderRadius:12,textAlign:'center'}}>
                    <p style={{color:'var(--text-muted)',fontSize:15}}>{contacts.length === 0 ? 'No contacts yet. Contacts are created from calls and deals.' : 'No contacts match your filters.'}</p>
                    {(sentimentFilter !== 'all' || search) && <button className="btn btn-ghost btn-sm" style={{marginTop:12}} onClick={()=>{setSentimentFilter('all');setSearch('');}}>Clear Filters</button>}
                </div>
            ) : (
                <div className="glass" style={{borderRadius:12,overflow:'hidden'}}>
                    <div style={{overflowX:'auto'}}>
                        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                            <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                                {['Name','Phone','Email','Calls','Deals','Treatments','Sentiment','Value','Action'].map(h=>(
                                    <th key={h} style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase',letterSpacing:'0.06em'}}>{h}</th>
                                ))}
                            </tr></thead>
                            <tbody>
                                {filtered.map(c=>(
                                    <tr key={c.id} className="table-row" style={{borderBottom:'1px solid rgba(255,255,255,0.03)',cursor:'pointer'}} onClick={()=>setSelectedContact(c)}>
                                        <td style={{padding:'12px 16px',fontWeight:600}}>{c.name||'Unknown'}</td>
                                        <td style={{padding:'12px 16px',color:'var(--text-secondary)'}}>{c.phone||'-'}</td>
                                        <td style={{padding:'12px 16px',color:'var(--text-secondary)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.email||'-'}</td>
                                        <td style={{padding:'12px 16px'}}>{c.total_calls||0}</td>
                                        <td style={{padding:'12px 16px'}}>{c.total_deals||0}</td>
                                        <td style={{padding:'12px 16px'}}>{c.treatments_interested ? <span className="badge badge-gold">{c.treatments_interested}</span> : '-'}</td>
                                        <td style={{padding:'12px 16px'}}>{c.latest_sentiment ? <span className={`badge ${c.latest_sentiment==='positive'?'badge-green':c.latest_sentiment==='negative'?'badge-red':'badge-gray'}`}>{c.latest_sentiment}</span> : '-'}</td>
                                        <td style={{padding:'12px 16px',fontWeight:600,color:'var(--gold)'}}>{c.deal_value ? `\u20B9${c.deal_value.toLocaleString('en-IN')}` : '-'}</td>
                                        <td style={{padding:'12px 16px'}}><button className="btn btn-gold btn-xs" onClick={e=>{e.stopPropagation();setSelectedContact(c);}}>View</button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            )}
        </div>
    );
};

// ============ LEARNING ACADEMY ============
const LearningPage = () => {
    const [modules, setModules] = useState([]);
    const [selectedModule, setSelectedModule] = useState(null);
    const [progress, setProgress] = useState(null);
    const [activeSection, setActiveSection] = useState('learn');
    const [quizMode, setQuizMode] = useState(false);
    const [quizAnswers, setQuizAnswers] = useState({});
    const [quizResult, setQuizResult] = useState(null);
    const [loading, setLoading] = useState(true);
    const [categoryFilter, setCategoryFilter] = useState('all');

    useEffect(() => {
        Promise.all([
            apiFetch('/learning/modules'),
            apiFetch('/learning/progress')
        ]).then(([modData, progData]) => {
            setModules(modData.modules || []);
            setProgress(progData);
            setLoading(false);
        }).catch(() => setLoading(false));
    }, []);

    const openModule = (modId) => {
        apiFetch(`/learning/modules/${modId}`).then(data => {
            setSelectedModule(data);
            setActiveSection('learn');
            setQuizMode(false);
            setQuizResult(null);
            setQuizAnswers({});
        });
    };

    const submitQuiz = () => {
        apiFetch(`/learning/modules/${selectedModule.id}/quiz/submit`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({answers: quizAnswers})
        }).then(result => {
            setQuizResult(result);
            // Refresh modules
            apiFetch('/learning/modules').then(d => setModules(d.modules || []));
            apiFetch('/learning/progress').then(setProgress);
        });
    };

    if (loading) return <div style={{textAlign:'center',padding:60,color:'var(--text-muted)'}}>Loading Academy...</div>;

    // Module Detail View
    if (selectedModule) {
        const mod = selectedModule;
        const quiz = mod.quiz || [];
        const scenarios = mod.mock_scenarios || [];

        return (
            <div style={{animation:'fadeIn 0.3s ease'}}>
                <button className="btn btn-ghost btn-sm" onClick={() => setSelectedModule(null)} style={{marginBottom:20}}>Back to Academy</button>

                <div className="glass" style={{borderRadius:16,padding:28,marginBottom:24}}>
                    <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:16}}>
                        <div style={{width:48,height:48,borderRadius:12,background:mod.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:mod.color}}>{mod.order}</div>
                        <div>
                            <h2 style={{fontSize:22,fontWeight:700}}>{mod.title}</h2>
                            <p style={{fontSize:14,color:'var(--text-secondary)',marginTop:2}}>{mod.subtitle}</p>
                        </div>
                    </div>
                    <div style={{display:'flex',gap:8,marginBottom:16}}>
                        <span className="badge badge-gold">{mod.duration_minutes} min</span>
                        <span className={`badge ${mod.progress?.quiz_passed ? 'badge-green' : 'badge-gray'}`}>Quiz: {mod.progress?.quiz_score != null ? mod.progress.quiz_score + '%' : 'Not taken'}</span>
                        <span className={`badge ${mod.progress?.mock_score >= 70 ? 'badge-green' : 'badge-gray'}`}>Mock: {mod.progress?.mock_score != null ? mod.progress.mock_score + '%' : 'Not done'}</span>
                    </div>

                    {/* Section tabs */}
                    <div style={{display:'flex',gap:4,borderBottom:'1px solid var(--border)',paddingBottom:8}}>

                            <button key={tab.id} className={`btn btn-xs ${activeSection===tab.id?'btn-gold':'btn-ghost'}`} onClick={()=>{setActiveSection(tab.id);setQuizMode(tab.id==='quiz');setQuizResult(null);}}>{tab.label}</button>

                </div>

                {/* LEARN SECTION */}
                {activeSection === 'learn' && (
                    <div>
                        <div className="glass" style={{borderRadius:12,padding:24,marginBottom:16}}>

                            {mod.learning_objectives.map((obj, i) => (
                                <div key={i} style={{display:'flex',gap:10,marginBottom:8,fontSize:14,color:'var(--text-secondary)'}}>
                                    <span style={{color:'var(--success)',fontWeight:700}}>Done</span> {obj}
                                </div>
                            ))}
                        </div>

                        {(mod.key_concepts || []).map((concept, i) => (
                            <div key={i} className="glass" style={{borderRadius:12,padding:24,marginBottom:12}}>
                                <h4 style={{fontSize:15,fontWeight:700,marginBottom:8}}>{concept.title}</h4>
                                <p style={{fontSize:14,color:'var(--text-secondary)',lineHeight:1.7}}>{concept.content}</p>
                            </div>
                        ))}

                        <div className="glass" style={{borderRadius:12,padding:24,marginBottom:12,borderColor:'rgba(239,68,68,0.2)'}}>
                            <h4 style={{fontSize:15,fontWeight:700,marginBottom:8,color:'var(--danger)'}}>Common Mistakes to Avoid</h4>
                            {(mod.common_mistakes || []).map((m, i) => (
                                <div key={i} style={{display:'flex',gap:10,marginBottom:6,fontSize:14,color:'var(--text-secondary)'}}>
                                    <span style={{color:'var(--danger)'}}>Missed</span> {m}

                            ))}
                        </div>
                    </div>
                )}

                {/* QUIZ SECTION */}
                {activeSection === 'quiz' && (
                    <div>
                        {quizResult ? (
                            <div className="glass" style={{borderRadius:12,padding:24}}>
                                <div style={{textAlign:'center',marginBottom:24}}>
                                    <div style={{fontSize:48,fontWeight:800,color:quizResult.passed?'var(--success)':'var(--danger)'}}>{quizResult.percentage}%</div>
                                    <div style={{fontSize:16,fontWeight:600,color:quizResult.passed?'var(--success)':'var(--danger)',marginBottom:4}}>{quizResult.passed ? 'PASSED' : 'NOT YET'}</div>
                                    <div style={{fontSize:13,color:'var(--text-muted)'}}>{quizResult.correct}/{quizResult.total} correct (75% needed to pass)</div>
                                </div>
                                {quizResult.results.map((r, i) => (
                                    <div key={i} className="glass" style={{borderRadius:8,padding:16,marginBottom:8,borderColor:r.is_correct?'rgba(34,197,94,0.3)':'rgba(239,68,68,0.3)'}}>
                                        <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>{r.question}</div>
                                        <div style={{fontSize:13,color:r.is_correct?'var(--success)':'var(--danger)',marginBottom:4}}>{r.is_correct ? 'Correct' : 'Incorrect'}</div>
                                        <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.5}}>{r.explanation}</div>
                                    </div>
                                ))}
                                <button className="btn btn-gold" style={{marginTop:16}} onClick={()=>{setQuizResult(null);setQuizAnswers({});}}>Retry Quiz</button>
                            </div>
                        ) : (
                            <div>
                                {quiz.map((q, qi) => (
                                    <div key={qi} className="glass" style={{borderRadius:12,padding:20,marginBottom:12}}>
                                        <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>{qi+1}. {q.question}</div>
                                        {q.options.map((opt, oi) => (
                                            <div key={oi} onClick={()=>setQuizAnswers({...quizAnswers,[String(qi)]:oi})}
                                                 style={{padding:'10px 14px',borderRadius:8,marginBottom:6,fontSize:13,cursor:'pointer',
                                                     background: quizAnswers[String(qi)]===oi ? 'rgba(232,135,37,0.15)' : 'rgba(255,255,255,0.03)',
                                                     border: `1px solid ${quizAnswers[String(qi)]===oi ? 'var(--gold)' : 'var(--border)'}`,
                                                     color: quizAnswers[String(qi)]===oi ? 'var(--gold)' : 'var(--text-secondary)'}}>
                                                {opt}
                                            </div>
                                        ))}
                                    </div>
                                ))}

                {/* PRACTICE SECTION */}
                {activeSection === 'practice' && (
                    <div>

                                <p style={{fontSize:14,color:'var(--text-secondary)',marginBottom:16,lineHeight:1.6}}>{ex.instruction}</p>

                                    <div style={{fontSize:13,color:'var(--text-secondary)',marginTop:8,padding:12,background:'rgba(232,135,37,0.05)',borderRadius:8,lineHeight:1.6}}>{ex.sample_answer}</div>
                                </details>
                            </div>
                        ))}
                    </div>
                )}

                {/* MOCK CALLS SECTION */}
                {activeSection === 'mock' && (
                    <div>
                        {scenarios.length === 0 ? (

                                <h4 style={{fontSize:15,fontWeight:700,marginBottom:8}}>{s.title}</h4>

                                <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:12}}><strong>Context:</strong> {s.opening_context}</div>
                                <div style={{fontSize:13,color:'var(--gold)',fontWeight:600,marginBottom:8}}>Evaluation Criteria:</div>

                                    <div key={ci} style={{fontSize:12,color:'var(--text-muted)',marginBottom:4}}>• {c}</div>
