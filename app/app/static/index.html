                        <button className="btn btn-gold" onClick={scheduleNew}>Schedule</button>
                    </div>
                </div>
            </div>}
        </div>
    );
};

            apiFetch('/operations/dashboard').catch(()=>null),
            apiFetch('/operations/inventory').catch(()=>[]),
            apiFetch('/operations/patients').catch(()=>[]),
            apiFetch('/operations/procedures').catch(()=>[])
        ]).then(([d, inv, pat, proc]) => { setDashboard(d); const invArr = Array.isArray(inv?.items) ? inv.items : Array.isArray(inv) ? inv : []; setInventory(invArr); const patArr = Array.isArray(pat?.patients) ? pat.patients : Array.isArray(pat) ? pat : []; setPatients(patArr); const procArr = Array.isArray(proc?.procedures) ? proc.procedures : Array.isArray(proc) ? proc : []; setProcedures(procArr); setLoading(false); });
    };

        try { await apiFetch('/operations/inventory', { method:'POST', body:newItem }); setShowAddItem(false); setNewItem({name:'',category:'',current_stock:0,min_stock:0,unit_cost:0,supplier:''}); loadData(); } catch(e) { alert(e.message); }
    };

    const addPatientRecord = async () => {
        try { await apiFetch('/operations/patients', { method:'POST', body:newPatient }); setShowAddPatient(false); setNewPatient({name:'',phone:'',email:'',date_of_birth:'',medical_history:''}); loadData(); } catch(e) { alert(e.message); }

    };

        setAiLoading(type);
        try {
            const resp = await apiFetch(`/operations/ai/${type}`, { method:'POST' });
            setAiResult({type, data: resp});
        } catch(e) { alert(e.message); }
        setAiLoading(null);

    return (

                    <div key={s.label} className="glass" style={{padding:14,borderRadius:10}}>

                        <div style={{fontSize:22,fontWeight:700,color:'var(--gold)'}}>{s.value}</div>
                    </div>
                ))}

            <div style={{display:'flex',gap:8,marginBottom:16}}>
                {['billing','inventory','patients','ai-insights'].map(t => (
                    <button key={t} onClick={()=>setTab(t)} className={tab===t?'btn btn-gold':'btn btn-ghost'} style={{fontSize:13,textTransform:'capitalize'}}>{t.replace('-',' ')}</button>

            <div className="glass" style={{borderRadius:12,padding:20}}>

};

// ============ MARKETING HUB PAGE ============
const MarketingHubPage = () => {
    const [tab, setTab] = useState('performance');
    const [dashboard, setDashboard] = useState(null);
    const [adData, setAdData] = useState([]);
    const [content, setContent] = useState([]);
    const [reports, setReports] = useState([]);
    const [loading, setLoading] = useState(true);
    const [filterPlatform, setFilterPlatform] = useState('all');
    const [aiInsights, setAiInsights] = useState(null);
    const [insightsLoading, setInsightsLoading] = useState(false);
    const [genContentLoading, setGenContentLoading] = useState(false);
    const [genReportLoading, setGenReportLoading] = useState(false);
    const [showGenContent, setShowGenContent] = useState(false);
    const [contentPrompt, setContentPrompt] = useState({content_type:'video_script', procedure:'', target_audience:'', platform:'instagram', tone:'professional'});

    const loadData = () => {
        setLoading(true);
        Promise.all([
            apiFetch('/marketing/dashboard').catch(()=>null),
            apiFetch('/marketing/ad-performance').catch(()=>[]),
            apiFetch('/marketing/content').catch(()=>[]),
            apiFetch('/marketing/reports').catch(()=>[])
        ]).then(([d, ads, cont, reps]) => {
            setDashboard(d);
            const adArr = Array.isArray(ads?.performances) ? ads.performances : Array.isArray(ads) ? ads : [];
            setAdData(adArr);
            const contArr = Array.isArray(cont?.content_pieces) ? cont.content_pieces : Array.isArray(cont) ? cont : [];
            setContent(contArr);
            const repArr = Array.isArray(reps?.reports) ? reps.reports : Array.isArray(reps) ? reps : [];
            setReports(repArr);
            setLoading(false);
        });
    };
    useEffect(loadData, []);

    const getInsights = async () => {
        setInsightsLoading(true);
        try {
            const resp = await apiFetch('/marketing/ad-performance/insights');
            setAiInsights(resp);
        } catch(e) { alert(e.message); }
        setInsightsLoading(false);
    };

    const generateContent = async () => {
        setGenContentLoading(true);
        try {
            await apiFetch('/marketing/content/generate', { method:'POST', body:contentPrompt });
            setShowGenContent(false);
            loadData();
        } catch(e) { alert(e.message); }
        setGenContentLoading(false);
    };

    const generateReport = async () => {
        setGenReportLoading(true);
        try {
            await apiFetch('/marketing/reports/generate', { method:'POST', body:{ report_type:'weekly', platform:'combined' }});
            loadData();
        } catch(e) { alert(e.message); }
        setGenReportLoading(false);
    };

    const scoreContent = async (id) => {
        try {
            await apiFetch(`/marketing/content/${id}/score`, { method:'POST' });
            loadData();
        } catch(e) { alert(e.message); }
    };

    const ds = dashboard || {};
    const filtered = filterPlatform === 'all' ? adData : adData.filter(a => (a.platform||'').toLowerCase() === filterPlatform.toLowerCase());
    const contentTypeColor = (t) => t==='video_script'||t==='Video Script'?'badge-blue':t==='image_ad'||t==='Image Ad'?'badge-gold':'badge-green';

    return (
        <div className="fade-in">
            <h1 className="page-title" style={{fontSize:24,fontWeight:700,marginBottom:20}}>Marketing Hub</h1>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>
                {[{label:'Total Ad Spend',value:'$'+(ds.total_spend||0).toLocaleString()},{label:'Total Conversions',value:ds.total_conversions||0},{label:'Avg CPC',value:'$'+(ds.avg_cpc||0).toFixed(2)},{label:'Avg ROAS',value:(ds.avg_roas||0).toFixed(1)+'x'}].map(s => (
                    <div key={s.label} className="glass" style={{padding:16,borderRadius:10}}>
                        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{s.label}</div>
                        <div style={{fontSize:24,fontWeight:700,color:'var(--gold)'}}>{s.value}</div>
                    </div>
                ))}
            </div>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
                {['performance','content','reports'].map(t => (
                    <button key={t} onClick={()=>setTab(t)} className={tab===t?'btn btn-gold':'btn btn-ghost'} style={{fontSize:13,textTransform:'capitalize'}}>{t}</button>
                ))}
            </div>
            <div className="glass" style={{borderRadius:12,padding:20}}>
                {loading ? <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>Loading...</div> : <>
                {tab==='performance' && (
                    <>
                        <div style={{display:'flex',gap:8,marginBottom:16}}>
                            {['all','meta','google'].map(p => (
                                <button key={p} onClick={()=>setFilterPlatform(p)} className={filterPlatform===p?'btn btn-gold':'btn btn-ghost'} style={{fontSize:12,textTransform:'capitalize'}}>{p}</button>
                            ))}
                            <button className="btn btn-ghost" onClick={getInsights} disabled={insightsLoading} style={{fontSize:12,marginLeft:'auto'}}>{insightsLoading?'Analyzing...':'Get AI Insights'}</button>
                        </div>
                        {filtered.length===0 ? <div style={{textAlign:'center',padding:40,color:'var(--text-muted)',fontSize:13}}>No ad performance data yet. Add campaign data to get started.</div> :
                        <table style={{width:'100%',fontSize:11}}>
                            <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Campaign</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Platform</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Impressions</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Clicks</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>CTR</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Spend</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Conversions</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Cost/Conv</th>
                            </tr></thead>
                            <tbody>
                                {filtered.map(a => (
                                    <tr key={a.id} style={{borderBottom:'1px solid var(--border)'}}>
                                        <td style={{padding:10,fontWeight:600}}>{a.campaign_name||a.campaign||''}</td>
                                        <td style={{padding:10}}><span className="badge badge-gray" style={{fontSize:10}}>{a.platform||''}</span></td>

                                        <td style={{padding:10,color:'var(--text-secondary)'}}>{a.clicks||0}</td>
                                        <td style={{padding:10,color:'var(--success)',fontWeight:600}}>{a.ctr ? a.ctr.toFixed(1)+'%' : ((a.clicks/(a.impressions||1))*100).toFixed(1)+'%'}</td>
                                        <td style={{padding:10,fontWeight:600,color:'var(--gold)'}}>${a.spend||0}</td>
                                        <td style={{padding:10,color:'var(--info)',fontWeight:600}}>{a.conversions||0}</td>
                                        <td style={{padding:10,color:'var(--text-secondary)'}}>${a.conversions ? ((a.spend||0)/(a.conversions)).toFixed(2) : 'N/A'}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>}
                        {aiInsights && <div style={{marginTop:20,padding:16,background:'rgba(255,255,255,0.02)',borderRadius:8}}>
                            <div style={{fontSize:12,fontWeight:600,marginBottom:8,color:'var(--gold)'}}>AI Optimization Insights</div>
                            <div style={{fontSize:12,color:'var(--text-primary)',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{typeof aiInsights === 'object' ? (aiInsights.insights || aiInsights.analysis || JSON.stringify(aiInsights, null, 2)) : aiInsights}</div>
                        </div>}
                    </>
                )}
                {tab==='content' && (
                    <>
                        <button className="btn btn-gold" onClick={()=>setShowGenContent(true)} style={{marginBottom:16,fontSize:12}}>+ Generate Content</button>

                                <div key={c.id} style={{padding:16,border:'1px solid var(--border)',borderRadius:10,display:'flex',flexDirection:'column',gap:10}}>

                        <label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Platform</label>
                        <select className="input" value={contentPrompt.platform} onChange={e=>setContentPrompt({...contentPrompt,platform:e.target.value})} style={{fontSize:13,width:'100%'}}>
                            {['instagram','facebook','youtube','linkedin','tiktok'].map(p=><option key={p} value={p}>{p.charAt(0).toUpperCase()+p.slice(1)}</option>)}
                        </select>
                    </div>
                    <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><button className="btn btn-ghost" onClick={()=>setShowGenContent(false)}>Cancel</button><button className="btn btn-gold" onClick={generateContent} disabled={genContentLoading}>{genContentLoading?'Generating...':'Generate'}</button></div>
                </div>
            </div>}
        </div>
    );
};

// ============ LEGAL & FINANCE PAGE ============
const LegalFinancePage = () => {
    const [tab, setTab] = useState('finance');
    const [filterType, setFilterType] = useState('all');
    const [financeDash, setFinanceDash] = useState(null);
    const [records, setRecords] = useState([]);
    const [invoices, setInvoices] = useState([]);
    const [documents, setDocuments] = useState([]);
    const [loading, setLoading] = useState(true);
    const [showAddRecord, setShowAddRecord] = useState(false);
    const [showAddDoc, setShowAddDoc] = useState(false);
    const [showAddInvoice, setShowAddInvoice] = useState(false);
    const [newRecord, setNewRecord] = useState({description:'',category:'',amount:0,record_type:'expense',payment_method:''});
    const [newDoc, setNewDoc] = useState({title:'',document_type:'contract',status:'draft',valid_until:'',content:''});
    const [newInvoice, setNewInvoice] = useState({patient_name:'',patient_email:'',items:[{description:'',amount:0}],due_date:'',notes:''});

    const loadData = () => {
        setLoading(true);
        Promise.all([
            apiFetch('/finance/dashboard').catch(()=>null),
            apiFetch('/finance/records').catch(()=>[]),
            apiFetch('/finance/invoices').catch(()=>[]),
            apiFetch('/legal/documents').catch(()=>[])
        ]).then(([fd, recs, invs, docs]) => {
            setFinanceDash(fd);
            setRecords(Array.isArray(recs?.records) ? recs.records : Array.isArray(recs) ? recs : []);
            setInvoices(Array.isArray(invs?.invoices) ? invs.invoices : Array.isArray(invs) ? invs : []);
            setDocuments(Array.isArray(docs?.documents) ? docs.documents : Array.isArray(docs) ? docs : []);
            setLoading(false);
        });
    };
    useEffect(loadData, []);

    const addRecord = async () => {
        try { await apiFetch('/finance/records', { method:'POST', body:newRecord }); setShowAddRecord(false); setNewRecord({description:'',category:'',amount:0,record_type:'expense',payment_method:''}); loadData(); } catch(e) { alert(e.message); }
    };

    const addDocument = async () => {
        try { await apiFetch('/legal/documents', { method:'POST', body:newDoc }); setShowAddDoc(false); setNewDoc({title:'',document_type:'contract',status:'draft',valid_until:'',content:''}); loadData(); } catch(e) { alert(e.message); }
    };

    const createInvoice = async () => {
        try { await apiFetch('/finance/invoices', { method:'POST', body:newInvoice }); setShowAddInvoice(false); setNewInvoice({patient_name:'',patient_email:'',items:[{description:'',amount:0}],due_date:'',notes:''}); loadData(); } catch(e) { alert(e.message); }
    };

    const markPaid = async (id) => {
        try { await apiFetch(`/finance/invoices/${id}/mark-paid`, { method:'PUT' }); loadData(); } catch(e) { alert(e.message); }
    };

    const fd = financeDash || {};
    const filtered = filterType==='all' ? records : records.filter(r => r.record_type === filterType);
    const typeColor = (t) => t==='contract'?'badge-blue':t==='nda'?'badge-gold':t==='policy'?'badge-gray':'badge-green';

    return (
        <div className="fade-in">
            <h1 className="page-title" style={{fontSize:24,fontWeight:700,marginBottom:20}}>Legal & Finance</h1>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
                {['finance','invoices','legal'].map(t => (
                    <button key={t} onClick={()=>setTab(t)} className={tab===t?'btn btn-gold':'btn btn-ghost'} style={{fontSize:13,textTransform:'capitalize'}}>{t}</button>
                ))}
            </div>
            <div className="glass" style={{borderRadius:12,padding:20}}>
                {loading ? <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>Loading...</div> : <>
                {tab==='finance' && (
                    <>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}}>
                            {[{label:'Total Revenue',value:'$'+(fd.total_revenue||0).toLocaleString()},{label:'Total Expenses',value:'$'+(fd.total_expenses||0).toLocaleString()},{label:'Net Profit',value:'$'+(fd.net_profit||(fd.total_revenue||0)-(fd.total_expenses||0)).toLocaleString()},{label:'Outstanding',value:'$'+(fd.outstanding_amount||0).toLocaleString()}].map(s => (
                                <div key={s.label} style={{padding:12,background:'rgba(255,255,255,0.02)',borderRadius:8}}>
                                    <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:6}}>{s.label}</div>
                                    <div style={{fontSize:18,fontWeight:700,color:'var(--gold)'}}>{s.value}</div>
                                </div>
                            ))}
                        </div>
                        <div style={{display:'flex',gap:8,marginBottom:16}}>
                            {['all','income','expense'].map(f => (
                                <button key={f} onClick={()=>setFilterType(f)} className={filterType===f?'btn btn-gold':'btn btn-ghost'} style={{fontSize:12,textTransform:'capitalize'}}>{f}</button>
                            ))}
                        </div>
                        <button className="btn btn-gold" onClick={()=>setShowAddRecord(true)} style={{marginBottom:12,fontSize:12}}>+ Add Record</button>
                        {filtered.length===0 ? <div style={{textAlign:'center',padding:20,color:'var(--text-muted)',fontSize:13}}>No financial records yet</div> :
                        <table style={{width:'100%',fontSize:12}}>
                            <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Date</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Description</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Category</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Amount</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Method</th>
                            </tr></thead>
                            <tbody>
                                {filtered.map(r => (
                                    <tr key={r.id} style={{borderBottom:'1px solid var(--border)'}}>
                                        <td style={{padding:10,color:'var(--text-muted)',fontSize:11}}>{r.created_at ? new Date(r.created_at).toLocaleDateString() : r.date||''}</td>
                                        <td style={{padding:10,fontWeight:600}}>{r.description}</td>
                                        <td style={{padding:10}}><span className="badge badge-gray" style={{fontSize:10}}>{r.category||''}</span></td>
                                        <td style={{padding:10,fontWeight:700,color:r.record_type==='income'?'var(--success)':'var(--danger)'}}>{r.record_type==='income'?'+':'-'}${Math.abs(r.amount||0)}</td>
                                        <td style={{padding:10,color:'var(--text-secondary)',fontSize:11}}>{r.payment_method||''}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>}
                    </>
                )}
                {tab==='invoices' && (
                    <>
                        <button className="btn btn-gold" onClick={()=>setShowAddInvoice(true)} style={{marginBottom:12,fontSize:12}}>+ Create Invoice</button>
                        {invoices.length===0 ? <div style={{textAlign:'center',padding:20,color:'var(--text-muted)',fontSize:13}}>No invoices yet</div> :
                        <table style={{width:'100%',fontSize:12}}>
                            <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Invoice #</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Patient</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Amount</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Status</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Due Date</th>
                                <th style={{textAlign:'left',padding:10,fontWeight:600,color:'var(--text-secondary)'}}>Actions</th>
                            </tr></thead>
                            <tbody>
                                {invoices.map(inv => (
                                    <tr key={inv.id} style={{borderBottom:'1px solid var(--border)'}}>
                                        <td style={{padding:10,fontWeight:600}}>{inv.invoice_number||'INV-'+inv.id}</td>
                                        <td style={{padding:10}}>{inv.patient_name||''}</td>
                                        <td style={{padding:10,fontWeight:600,color:'var(--gold)'}}>${inv.total_amount||inv.amount||0}</td>
                                        <td style={{padding:10}}><span className={inv.status==='paid'?'badge badge-green':inv.status==='overdue'?'badge badge-red':'badge badge-yellow'} style={{fontSize:10}}>{inv.status}</span></td>
                                        <td style={{padding:10,color:'var(--text-muted)',fontSize:11}}>{inv.due_date ? new Date(inv.due_date).toLocaleDateString() : ''}</td>
                                        <td style={{padding:10}}>{inv.status!=='paid' && <button className="btn btn-ghost" onClick={()=>markPaid(inv.id)} style={{fontSize:11}}>Mark Paid</button>}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>}
                    </>
                )}
                {tab==='legal' && (
                    <>
                        <button className="btn btn-gold" onClick={()=>setShowAddDoc(true)} style={{marginBottom:16,fontSize:12}}>+ Add Document</button>
                        {documents.length===0 ? <div style={{textAlign:'center',padding:20,color:'var(--text-muted)',fontSize:13}}>No legal documents yet</div> :
                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:12}}>
                            {documents.map(d => (
                                <div key={d.id} style={{padding:16,border:'1px solid var(--border)',borderRadius:10}}>
                                    <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>{d.title}</div>
                                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                                        <span className={`badge ${typeColor(d.document_type||d.type)}`} style={{fontSize:10}}>{d.document_type||d.type||''}</span>
                                        <span className={d.status==='active'?'badge badge-green':d.status==='expired'?'badge badge-red':'badge badge-yellow'} style={{fontSize:10}}>{d.status}</span>
                                    </div>
                                    <div style={{fontSize:11,color:'var(--text-muted)'}}>Valid until: {d.valid_until ? new Date(d.valid_until).toLocaleDateString() : d.valid_until||'Ongoing'}</div>
                                </div>
                            ))}
                        </div>}
                    </>
                )}
                </>}
            </div>
            {showAddRecord && <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={()=>setShowAddRecord(false)}>
                <div className="glass" style={{padding:24,borderRadius:12,width:400}} onClick={e=>e.stopPropagation()}>
                    <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Add Financial Record</h3>
                    <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Type</label><select className="input" value={newRecord.record_type} onChange={e=>setNewRecord({...newRecord,record_type:e.target.value})} style={{fontSize:13,width:'100%'}}><option value="income">Income</option><option value="expense">Expense</option></select></div>
                    {['description','category','payment_method'].map(f=><div key={f} style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>{f.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</label><input className="input" value={newRecord[f]} onChange={e=>setNewRecord({...newRecord,[f]:e.target.value})} style={{fontSize:13,width:'100%'}}/></div>)}
                    <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Amount</label><input className="input" type="number" value={newRecord.amount} onChange={e=>setNewRecord({...newRecord,amount:parseFloat(e.target.value)||0})} style={{fontSize:13,width:'100%'}}/></div>
                    <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><button className="btn btn-ghost" onClick={()=>setShowAddRecord(false)}>Cancel</button><button className="btn btn-gold" onClick={addRecord}>Add</button></div>

            </div>}
            {showAddDoc && <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={()=>setShowAddDoc(false)}>
                <div className="glass" style={{padding:24,borderRadius:12,width:400}} onClick={e=>e.stopPropagation()}>
                    <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Add Legal Document</h3>
                    <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Title</label><input className="input" value={newDoc.title} onChange={e=>setNewDoc({...newDoc,title:e.target.value})} style={{fontSize:13,width:'100%'}}/></div>
                    <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Type</label><select className="input" value={newDoc.document_type} onChange={e=>setNewDoc({...newDoc,document_type:e.target.value})} style={{fontSize:13,width:'100%'}}>{['contract','nda','policy','agreement','license'].map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}</select></div>
                    <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Status</label><select className="input" value={newDoc.status} onChange={e=>setNewDoc({...newDoc,status:e.target.value})} style={{fontSize:13,width:'100%'}}>{['draft','active','expired','terminated'].map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}</select></div>

            </div>}
            {showAddInvoice && <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={()=>setShowAddInvoice(false)}>
                <div className="glass" style={{padding:24,borderRadius:12,width:420}} onClick={e=>e.stopPropagation()}>
                    <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Create Invoice</h3>
                    {['patient_name','patient_email'].map(f=><div key={f} style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>{f.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</label><input className="input" value={newInvoice[f]} onChange={e=>setNewInvoice({...newInvoice,[f]:e.target.value})} style={{fontSize:13,width:'100%'}}/></div>)}
                    <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Item Description</label><input className="input" value={newInvoice.items[0].description} onChange={e=>setNewInvoice({...newInvoice,items:[{...newInvoice.items[0],description:e.target.value}]})} style={{fontSize:13,width:'100%'}}/></div>
                    <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Amount</label><input className="input" type="number" value={newInvoice.items[0].amount} onChange={e=>setNewInvoice({...newInvoice,items:[{...newInvoice.items[0],amount:parseFloat(e.target.value)||0}]})} style={{fontSize:13,width:'100%'}}/></div>
                    <div style={{marginBottom:12}}><label style={{fontSize:12,color:'var(--text-secondary)',display:'block',marginBottom:4}}>Due Date</label><input className="input" type="date" value={newInvoice.due_date} onChange={e=>setNewInvoice({...newInvoice,due_date:e.target.value})} style={{fontSize:13,width:'100%'}}/></div>

                </div>
            </div>}
        </div>
    );
};

// ============ META ADS MANAGEMENT ============
const MetaAdsPage = () => {
    const [config, setConfig] = useState(null);

            apiFetch('/meta/config').catch(() => null),
            apiFetch('/leads?source=meta').catch(() => ({leads:[]}))

            if (cfg && !cfg.detail) setConfig(cfg);
            const ldArr = Array.isArray(ld?.leads) ? ld.leads : Array.isArray(ld) ? ld : [];
            setLeads(ldArr);
            setLoading(false);
        });

                <StatCard label="Connection" value={config?.is_active ? 'Active' : 'Not Connected'} accent={config?.is_active ? 'var(--success)' : 'var(--danger)'}/>

                        <div className="glass" style={{padding:24,borderRadius:12}}>
                            <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>Connected Account</h3>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                                <div style={{padding:16,border:'1px solid var(--border)',borderRadius:10}}>
                                    <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:4}}>Page Name</div>
                                    <div style={{fontSize:15,fontWeight:600}}>{config.page_name || 'N/A'}</div>
                                </div>
                                <div style={{padding:16,border:'1px solid var(--border)',borderRadius:10}}>
                                    <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:4}}>Page ID</div>
                                    <div style={{fontSize:15,fontWeight:600,fontFamily:'monospace'}}>{config.page_id || 'N/A'}</div>
                                </div>
                                <div style={{padding:16,border:'1px solid var(--border)',borderRadius:10}}>
                                    <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:4}}>Webhook URL</div>
                                    <code style={{fontSize:12,color:'var(--gold)'}}>https://callcoachsba.com/api/meta/webhook</code>
                                </div>
                                <div style={{padding:16,border:'1px solid var(--border)',borderRadius:10}}>
                                    <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:4}}>Auto-Import</div>

                            </div>
                        </div>

                        <div style={{overflowX:'auto'}}>
                            <table style={{width:'100%',borderCollapse:'collapse'}}>

// ============ SOCIAL MEDIA SCHEDULING ============
const SocialSchedulingPage = () => {
    const [posts, setPosts] = useState([]);
    const [accounts, setAccounts] = useState([]);
    const [loading, setLoading] = useState(true);
    const [activeTab, setActiveTab] = useState('calendar');
    const [showCompose, setShowCompose] = useState(false);
    const [newPost, setNewPost] = useState({content:'',platforms:[],scheduled_at:'',media_urls:[]});
    const [aiIdeas, setAiIdeas] = useState('');
    const [aiLoading, setAiLoading] = useState(false);

    useEffect(() => {
        setLoading(true);
        Promise.all([
            apiFetch('/social/posts').catch(() => []),
            apiFetch('/social/accounts').catch(() => [])
        ]).then(([p, a]) => {
            setPosts(Array.isArray(p) ? p : []);
            setAccounts(Array.isArray(a) ? a : []);
            setLoading(false);
        });
    }, []);

    const createPost = async () => {
        if (!newPost.content) { alert('Content required'); return; }
        try {
            const res = await apiFetch('/social/posts', {method:'POST', body:newPost});
            setPosts(prev => [res, ...prev]);
            setShowCompose(false);
            setNewPost({content:'',platforms:[],scheduled_at:'',media_urls:[]});
        } catch(e) { alert('Error creating post'); }
    };

    const deletePost = async (id) => {
        if (!confirm('Delete this post?')) return;
        try { await apiFetch(`/social/posts/${id}`, {method:'DELETE'}); setPosts(prev => prev.filter(p => p.id !== id)); } catch(e) {}
    };

    const generateIdeas = async () => {
        setAiLoading(true);
        try {
            const res = await apiFetch('/social/generate-content', {method:'POST', body:{content_type:'post',platform:'instagram',num_ideas:5}});
            setAiIdeas(res.ideas || '');
        } catch(e) {} finally { setAiLoading(false); }
    };

    const togglePlatform = (p) => {
        setNewPost(prev => ({...prev, platforms: prev.platforms.includes(p) ? prev.platforms.filter(x=>x!==p) : [...prev.platforms, p]}));
    };

    const tabs = [{id:'calendar',label:'Calendar'},{id:'compose',label:'Compose'},{id:'ai',label:'AI Ideas'},{id:'accounts',label:'Accounts'}];
    const statusColors = {draft:'badge-gray',scheduled:'badge-blue',published:'badge-green',failed:'badge-red'};

    if (loading) return <div style={{padding:40,textAlign:'center'}}><span className="spinner"></span></div>;

    return (
        <div className="fade-in">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
                <div>
                    <h1 style={{fontSize:24,fontWeight:900,fontFamily:"'Playfair Display',serif"}}>Social Media Scheduling</h1>
                    <p style={{color:'var(--text-muted)',fontSize:14,marginTop:4}}>Schedule, compose, and manage posts across all platforms</p>
                </div>
                <button className="btn btn-gold" onClick={()=>{setActiveTab('compose');setShowCompose(true);}}>+ New Post</button>
            </div>

            <div className="stat-card-row" style={{display:'flex',gap:16,marginBottom:24,flexWrap:'wrap'}}>
                <StatCard label="Accounts" value={accounts.length}/>
                <StatCard label="Scheduled" value={posts.filter(p=>p.status==='scheduled').length} accent="var(--gold)"/>
                <StatCard label="Published" value={posts.filter(p=>p.status==='published').length} accent="var(--success)"/>
                <StatCard label="Drafts" value={posts.filter(p=>p.status==='draft').length}/>
            </div>

            <div style={{display:'flex',gap:4,marginBottom:24,overflowX:'auto',paddingBottom:2}}>
                {tabs.map(t => <button key={t.id} className={`detail-tab ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>{t.label}</button>)}
            </div>

            {activeTab === 'calendar' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>Post Calendar</h3>
                    {posts.length === 0 ? (
                        <p style={{textAlign:'center',padding:30,color:'var(--text-muted)',fontSize:13}}>No posts yet. Create your first post to start scheduling.</p>
                    ) : (
                        <div style={{display:'flex',flexDirection:'column',gap:12}}>
                            {posts.map(p => (
                                <div key={p.id} style={{padding:16,border:'1px solid var(--border)',borderRadius:10,display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                                    <div style={{flex:1}}>
                                        <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
                                            <span className={`badge ${statusColors[p.status]||'badge-gray'}`} style={{fontSize:10}}>{p.status}</span>
                                            {(p.platforms||[]).map(pl => <span key={pl} className="badge badge-gold" style={{fontSize:10,textTransform:'capitalize'}}>{pl}</span>)}
                                        </div>
                                        <div style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.6,marginBottom:6}}>{(p.content||'').slice(0,150)}{(p.content||'').length>150?'...':''}</div>
                                        {p.scheduled_at && <div style={{fontSize:11,color:'var(--text-muted)'}}>Scheduled: {new Date(p.scheduled_at).toLocaleString()}</div>}
                                    </div>
                                    {p.status !== 'published' && <button className="btn btn-danger btn-sm" style={{marginLeft:12}} onClick={()=>deletePost(p.id)}>Delete</button>}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            )}

            {activeTab === 'compose' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>Compose Post</h3>
                    <div style={{marginBottom:14}}>
                        <label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:6}}>Content</label>
                        <textarea className="input" value={newPost.content} onChange={e=>setNewPost({...newPost,content:e.target.value})} rows={5} style={{width:'100%',resize:'vertical'}} placeholder="Write your post content..."/>
                    </div>
                    <div style={{marginBottom:14}}>
                        <label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:6}}>Platforms</label>
                        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                            {['instagram','facebook','youtube','linkedin','twitter','tiktok'].map(pl => (
                                <button key={pl} className={`btn btn-xs ${newPost.platforms.includes(pl)?'btn-gold':'btn-ghost'}`} onClick={()=>togglePlatform(pl)} style={{textTransform:'capitalize'}}>{pl}</button>
                            ))}
                        </div>
                    </div>
                    <div style={{marginBottom:14}}>
                        <label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:6}}>Schedule Date/Time (optional)</label>
                        <input className="input" type="datetime-local" value={newPost.scheduled_at} onChange={e=>setNewPost({...newPost,scheduled_at:e.target.value})} style={{maxWidth:300}}/>
                    </div>
                    <div style={{display:'flex',gap:8}}>
                        <button className="btn btn-gold" onClick={createPost}>
                            {newPost.scheduled_at ? 'Schedule Post' : 'Save as Draft'}
                        </button>
                    </div>
                </div>
            )}

            {activeTab === 'ai' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                        <h3 style={{fontSize:16,fontWeight:600}}>AI Content Ideas</h3>
                        <button className="btn btn-gold btn-sm" onClick={generateIdeas} disabled={aiLoading}>
                            {aiLoading ? <span className="spinner"></span> : null}
                            <span>{aiLoading ? 'Generating...' : 'Generate Ideas'}</span>
                        </button>
                    </div>
                    {aiIdeas ? (
                        <div style={{padding:16,background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:10}}>
                            <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{aiIdeas}</pre>
                        </div>
                    ) : (
                        <p style={{textAlign:'center',padding:30,color:'var(--text-muted)',fontSize:13}}>Generate AI-powered content ideas based on your clinic data and patient insights.</p>
                    )}
                </div>
            )}

            {activeTab === 'accounts' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>Connected Accounts</h3>
                    {accounts.length === 0 ? (
                        <div style={{textAlign:'center',padding:30}}>
                            <p style={{color:'var(--text-muted)',fontSize:13,marginBottom:12}}>No accounts connected. Go to Settings to connect your social media accounts.</p>
                            <button className="btn btn-gold btn-sm" onClick={()=>window.dispatchEvent(new CustomEvent('navigate',{detail:'settings'}))}>Go to Settings</button>
                        </div>
                    ) : (
                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12}}>
                            {accounts.map(a => (
                                <div key={a.id} style={{padding:14,border:'1px solid var(--border)',borderRadius:10}}>
                                    <div style={{fontWeight:600,fontSize:14,textTransform:'capitalize',marginBottom:4}}>{a.platform}</div>
                                    <div style={{fontSize:12,color:'var(--text-secondary)'}}>@{a.account_name||'connected'}</div>
                                    <span className="badge badge-green" style={{fontSize:10,marginTop:6,display:'inline-block'}}>Active</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            )}
        </div>
    );
};

    const [blLoading, setBlLoading] = useState(false);
    const [keywords, setKeywords] = useState('');
    const [kwLoading, setKwLoading] = useState(false);
    const [coachMsg, setCoachMsg] = useState('');
    const [coachHistory, setCoachHistory] = useState([]);
    const [coachLoading, setCoachLoading] = useState(false);
    const [newBacklink, setNewBacklink] = useState({source_url:'',target_url:'',anchor_text:'',domain_authority:0,notes:''});

    useEffect(() => {
        setLoading(true);
        Promise.all([
            apiFetch('/seo/gmb/config').catch(() => null),
            apiFetch('/seo/backlinks').catch(() => ({backlinks:[]}))
        ]).then(([cfg, bl]) => {
            if (cfg && !cfg.detail) setGmbConfig(cfg);
            setBacklinks(Array.isArray(bl?.backlinks) ? bl.backlinks : []);
            setLoading(false);
        });
    }, []);

    const runAudit = async () => {
        if (!auditUrl) { alert('Enter website URL'); return; }
        setAuditLoading(true);
        try {
            const res = await apiFetch('/seo/audit', {method:'POST', body:{website_url:auditUrl}});
            setAuditResult(res.audit || '');
        } catch(e) {} finally { setAuditLoading(false); }
    };

    const optimizeGMB = async () => {
        setGmbLoading(true);
        try {
            const res = await apiFetch('/seo/gmb/optimize', {method:'POST'});
            setGmbPlan(res.optimization_plan || '');
        } catch(e) {} finally { setGmbLoading(false); }
    };

    const generateGMBPosts = async () => {
        setGmbPostsLoading(true);
        try {
            const res = await apiFetch('/seo/gmb/generate-posts', {method:'POST'});
            setGmbPosts(res.posts || '');
        } catch(e) {} finally { setGmbPostsLoading(false); }
    };

    const getBlIdeas = async () => {
        setBlLoading(true);
        try {
            const res = await apiFetch('/seo/backlink-ideas', {method:'POST'});
            setBlIdeas(res.ideas || '');
        } catch(e) {} finally { setBlLoading(false); }
    };

    const addBacklink = async () => {
        if (!newBacklink.source_url) return;
        try {
            await apiFetch('/seo/backlinks', {method:'POST', body:newBacklink});
            setBacklinks(prev => [...prev, {...newBacklink, id:String(prev.length+1), added_at:new Date().toISOString()}]);
            setNewBacklink({source_url:'',target_url:'',anchor_text:'',domain_authority:0,notes:''});
        } catch(e) {}
    };

    const doKeywordResearch = async () => {
        setKwLoading(true);
        try {
            const res = await apiFetch('/seo/keyword-research', {method:'POST', body:{procedures:[],location:''}});
            setKeywords(res.keywords || '');
        } catch(e) {} finally { setKwLoading(false); }
    };

    const sendCoachMsg = async () => {
        if (!coachMsg.trim()) return;
        const userMsg = coachMsg;
        setCoachHistory(prev => [...prev, {role:'user',text:userMsg}]);
        setCoachMsg('');
        setCoachLoading(true);
        try {
            const res = await apiFetch('/seo/coach', {method:'POST', body:{message:userMsg}});
            setCoachHistory(prev => [...prev, {role:'assistant',text:res.response || 'No response'}]);
        } catch(e) {
            setCoachHistory(prev => [...prev, {role:'assistant',text:'Error getting response. Check API configuration.'}]);
        } finally { setCoachLoading(false); }
    };

    const tabs = [{id:'overview',label:'Dashboard'},{id:'audit',label:'SEO Audit'},{id:'gmb',label:'GMB Optimization'},{id:'keywords',label:'Keywords'},{id:'backlinks',label:'Backlinks'},{id:'coach',label:'SEO Coach'}];

    if (loading) return <div style={{padding:40,textAlign:'center'}}><span className="spinner"></span></div>;

    return (
        <div className="fade-in">
            <h1 style={{fontSize:24,fontWeight:900,fontFamily:"'Playfair Display',serif",marginBottom:8}}>SEO & GMB Hub</h1>
            <p style={{color:'var(--text-muted)',fontSize:14,marginBottom:24}}>SEO audits, Google Business Profile optimization, keyword research, backlinks, and AI SEO coaching</p>

            <div style={{display:'flex',gap:4,marginBottom:24,overflowX:'auto',paddingBottom:2}}>
                {tabs.map(t => <button key={t.id} className={`detail-tab ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>{t.label}</button>)}
            </div>

            {activeTab === 'overview' && (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}} className="resp-grid-2">
                    <div className="glass" style={{padding:20,borderRadius:12,cursor:'pointer'}} onClick={()=>setActiveTab('audit')}>
                        <h3 style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--gold)'}}>SEO Audit</h3>
                        <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.5}}>Run an AI-powered technical and on-page SEO audit of your clinic website.</p>
                    </div>
                    <div className="glass" style={{padding:20,borderRadius:12,cursor:'pointer'}} onClick={()=>setActiveTab('gmb')}>
                        <h3 style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--gold)'}}>GMB Optimization</h3>
                        <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.5}}>Optimize your Google Business Profile with AI-generated posts, Q&A, and review templates.</p>
                    </div>
                    <div className="glass" style={{padding:20,borderRadius:12,cursor:'pointer'}} onClick={()=>setActiveTab('keywords')}>
                        <h3 style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--gold)'}}>Keyword Research</h3>
                        <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.5}}>AI keyword research for your procedures, location, and patient search intent.</p>
                    </div>
                    <div className="glass" style={{padding:20,borderRadius:12,cursor:'pointer'}} onClick={()=>setActiveTab('backlinks')}>
                        <h3 style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--gold)'}}>Backlink Builder</h3>
                        <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.5}}>Track backlinks, get AI-powered link building strategies and directory submissions.</p>
                    </div>
                    <div className="glass" style={{padding:20,borderRadius:12,cursor:'pointer',gridColumn:'1/-1'}} onClick={()=>setActiveTab('coach')}>
                        <h3 style={{fontSize:15,fontWeight:600,marginBottom:8,color:'var(--gold)'}}>AI SEO Coach</h3>
                        <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.5}}>Chat with an AI SEO expert specialized in medical and aesthetic clinic websites. Get instant answers on technical SEO, local SEO, content strategy, schema markup, and more.</p>
                    </div>
                </div>
            )}

            {activeTab === 'audit' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>AI SEO Audit</h3>
                    <div style={{display:'flex',gap:8,marginBottom:16}}>
                        <input className="input" value={auditUrl} onChange={e=>setAuditUrl(e.target.value)} placeholder="Enter your website URL (e.g. https://yourclinic.com)" style={{flex:1}}/>
                        <button className="btn btn-gold" onClick={runAudit} disabled={auditLoading}>
                            {auditLoading ? <span className="spinner"></span> : 'Run Audit'}
                        </button>
                    </div>
                    {auditResult && (
                        <div style={{padding:16,background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:10,marginTop:12}}>
                            <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{auditResult}</pre>
                        </div>
                    )}
                </div>
            )}

            {activeTab === 'gmb' && (
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                            <h3 style={{fontSize:16,fontWeight:600}}>GMB Profile Optimization</h3>
                            <button className="btn btn-gold btn-sm" onClick={optimizeGMB} disabled={gmbLoading}>
                                {gmbLoading ? <span className="spinner"></span> : 'Get Optimization Plan'}
                            </button>
                        </div>
                        {gmbPlan ? (
                            <div style={{padding:16,background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:10}}>
                                <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{gmbPlan}</pre>
                            </div>
                        ) : (
                            <p style={{color:'var(--text-muted)',fontSize:13}}>Click to get a comprehensive AI optimization plan for your Google Business Profile.</p>
                        )}
                    </div>
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                            <h3 style={{fontSize:16,fontWeight:600}}>Generate GMB Posts</h3>
                            <button className="btn btn-gold btn-sm" onClick={generateGMBPosts} disabled={gmbPostsLoading}>
                                {gmbPostsLoading ? <span className="spinner"></span> : 'Generate 4 Posts'}
                            </button>
                        </div>
                        {gmbPosts ? (
                            <div style={{padding:16,background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:10}}>
                                <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{gmbPosts}</pre>
                            </div>
                        ) : (
                            <p style={{color:'var(--text-muted)',fontSize:13}}>Generate ready-to-publish Google Business Profile posts with AI.</p>
                        )}
                    </div>
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <h3 style={{fontSize:16,fontWeight:600,marginBottom:16,color:'var(--gold)'}}>GMB Setup Guide</h3>
                        <div style={{display:'flex',flexDirection:'column',gap:12}}>
                            <div style={{padding:14,border:'1px solid var(--border)',borderRadius:10}}>
                                <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>1. Claim or Create Your Google Business Profile</div>
                                <p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.5,marginBottom:6}}>Go to Google Business Profile Manager and claim your listing. If it does not exist, create a new one with your clinic details.</p>
                                <a href="https://business.google.com/" target="_blank" rel="noopener" style={{fontSize:11,color:'var(--gold)',textDecoration:'underline'}}>Google Business Profile Manager</a>
                            </div>
                            <div style={{padding:14,border:'1px solid var(--border)',borderRadius:10}}>
                                <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>2. Complete All Profile Sections</div>
                                <p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.5}}>Fill in: business name, category, address, phone, website, hours, services, description, photos. Complete profiles rank higher in local search.</p>
                            </div>
                            <div style={{padding:14,border:'1px solid var(--border)',borderRadius:10}}>
                                <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>3. Set Up Google Business Profile API (Optional)</div>
                                <p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.5,marginBottom:6}}>For automated posting, enable the Google Business Profile API in Google Cloud Console.</p>
                                <a href="https://developers.google.com/my-business/content/overview" target="_blank" rel="noopener" style={{fontSize:11,color:'var(--gold)',textDecoration:'underline'}}>GMB API Documentation</a>
                            </div>
                        </div>
                    </div>
                </div>
            )}

            {activeTab === 'keywords' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                        <h3 style={{fontSize:16,fontWeight:600}}>AI Keyword Research</h3>
                        <button className="btn btn-gold btn-sm" onClick={doKeywordResearch} disabled={kwLoading}>
                            {kwLoading ? <span className="spinner"></span> : 'Research Keywords'}
                        </button>
                    </div>
                    {keywords ? (
                        <div style={{padding:16,background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:10}}>
                            <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{keywords}</pre>
                        </div>
                    ) : (
                        <p style={{textAlign:'center',padding:30,color:'var(--text-muted)',fontSize:13}}>Click "Research Keywords" to get AI-powered keyword research for your clinic's procedures and location.</p>
                    )}
                </div>
            )}

            {activeTab === 'backlinks' && (
                <div style={{display:'flex',flexDirection:'column',gap:16}}>
                    <div className="glass" style={{padding:24,borderRadius:12}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                            <h3 style={{fontSize:16,fontWeight:600}}>Backlink Tracker</h3>
                            <button className="btn btn-gold btn-sm" onClick={getBlIdeas} disabled={blLoading}>
                                {blLoading ? <span className="spinner"></span> : 'Get Link Building Ideas'}
                            </button>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:8,marginBottom:16}} className="resp-grid-2">
                            <input className="input" placeholder="Source URL" value={newBacklink.source_url} onChange={e=>setNewBacklink({...newBacklink,source_url:e.target.value})}/>
                            <input className="input" placeholder="Target URL" value={newBacklink.target_url} onChange={e=>setNewBacklink({...newBacklink,target_url:e.target.value})}/>
                            <input className="input" placeholder="Anchor Text" value={newBacklink.anchor_text} onChange={e=>setNewBacklink({...newBacklink,anchor_text:e.target.value})}/>
                            <button className="btn btn-gold btn-sm" onClick={addBacklink}>Add</button>
                        </div>
                        {backlinks.length === 0 ? (
                            <p style={{textAlign:'center',padding:20,color:'var(--text-muted)',fontSize:13}}>No backlinks tracked yet. Add backlinks manually or get AI link building ideas.</p>
                        ) : (
                            <div style={{overflowX:'auto'}}>
                                <table style={{width:'100%',borderCollapse:'collapse'}}>
                                    <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                                        {['Source','Target','Anchor','DA','Date'].map(h => <th key={h} style={{padding:'8px 12px',textAlign:'left',fontSize:11,fontWeight:600,color:'var(--text-muted)'}}>{h}</th>)}
                                    </tr></thead>
                                    <tbody>{backlinks.map((bl,i) => (
                                        <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                                            <td style={{padding:'8px 12px',fontSize:12,color:'var(--gold)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}}>{bl.source_url}</td>
                                            <td style={{padding:'8px 12px',fontSize:12,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}}>{bl.target_url}</td>
                                            <td style={{padding:'8px 12px',fontSize:12}}>{bl.anchor_text}</td>
                                            <td style={{padding:'8px 12px',fontSize:12,fontWeight:600}}>{bl.domain_authority}</td>
                                            <td style={{padding:'8px 12px',fontSize:11,color:'var(--text-muted)'}}>{bl.added_at ? new Date(bl.added_at).toLocaleDateString() : '-'}</td>
                                        </tr>
                                    ))}</tbody>
                                </table>
                            </div>
                        )}
                    </div>
                    {blIdeas && (
                        <div className="glass" style={{padding:24,borderRadius:12}}>
                            <h3 style={{fontSize:16,fontWeight:600,marginBottom:12}}>AI Link Building Ideas</h3>
                            <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{blIdeas}</pre>
                        </div>
                    )}
                </div>
            )}

            {activeTab === 'coach' && (
                <div className="glass" style={{padding:24,borderRadius:12}}>
                    <h3 style={{fontSize:16,fontWeight:600,marginBottom:16,color:'var(--gold)'}}>AI SEO Coach</h3>
                    <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16}}>Ask anything about SEO for your clinic. Technical SEO, local SEO, content strategy, schema markup, generative AI SEO, and more.</p>
                    <div style={{minHeight:300,maxHeight:500,overflowY:'auto',marginBottom:16,padding:12,background:'rgba(0,0,0,0.15)',borderRadius:10}}>
                        {coachHistory.length === 0 && (
                            <div style={{textAlign:'center',padding:40,color:'var(--text-muted)',fontSize:13}}>
                                <p>Ask me anything about SEO. For example:</p>
                                <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:12}}>
                                    {['How do I add schema markup for my clinic?','What keywords should I target for hair transplant in Mumbai?','How do I get cited in ChatGPT and Perplexity?','Write me a meta description for my botox service page'].map(q => (
                                        <button key={q} className="btn btn-ghost btn-sm" style={{fontSize:12,justifyContent:'flex-start'}} onClick={()=>{setCoachMsg(q);}}>{q}</button>
                                    ))}
                                </div>
                            </div>
                        )}
                        {coachHistory.map((msg,i) => (
                            <div key={i} style={{marginBottom:12,padding:12,borderRadius:10,background:msg.role==='user'?'rgba(192,196,203,0.08)':'rgba(192,196,203,0.03)',borderLeft:msg.role==='assistant'?'3px solid var(--gold)':'none'}}>
                                <div style={{fontSize:11,fontWeight:600,color:msg.role==='user'?'var(--text-muted)':'var(--gold)',marginBottom:4,textTransform:'uppercase'}}>{msg.role==='user'?'You':'SEO Coach'}</div>
                                <pre style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,whiteSpace:'pre-wrap',fontFamily:'inherit'}}>{msg.text}</pre>
                            </div>
                        ))}
                        {coachLoading && <div style={{padding:12,textAlign:'center'}}><span className="spinner"></span></div>}
                    </div>
                    <div style={{display:'flex',gap:8}}>
                        <input className="input" value={coachMsg} onChange={e=>setCoachMsg(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendCoachMsg();}}} placeholder="Ask about SEO, GMB, keywords, backlinks, schema markup..." style={{flex:1}}/>
                        <button className="btn btn-gold" onClick={sendCoachMsg} disabled={coachLoading||!coachMsg.trim()}>Send</button>
                    </div>
                </div>
            )}
        </div>
    );
};

// ============ MAIN APP ============
const App = () => {
    const [authed, setAuthed] = useState(!!getToken());
    const [page, setPage] = useState('dashboard');
    const [selectedCall, setSelectedCall] = useState(null);
    const [user, setUser] = useState(null);
    const [sidebarOpen, setSidebarOpen] = useState(false);

    useEffect(() => {
        if (authed) apiFetch('/auth/me').then(setUser).catch(()=>{clearToken();setAuthed(false);});
    }, [authed]);

    const logout = () => { clearToken(); setAuthed(false); setUser(null); };

    if (!authed) return <LoginPage onLogin={()=>setAuthed(true)}/>;

    const navItems = [
        {id:'dashboard',label:'Dashboard',icon:Icons.dashboard},
        {id:'calls',label:'Calls',icon:Icons.calls},
        {id:'pipeline',label:'Pipeline',icon:Icons.pipeline},
        {id:'leads',label:'Leads',icon:Icons.leads},
        {id:'contacts',label:'Contacts',icon:Icons.contacts},
        {id:'unified-inbox',label:'Conversations',icon:Icons.unified},
        {id:'inbox',label:'WhatsApp',icon:Icons.whatsapp},
        {id:'ai-employee',label:'AI Employee',icon:Icons.robot},
        {id:'nurture',label:'Nurture',icon:Icons.nurture},
        {id:'marketing-hub',label:'Marketing',icon:Icons.marketing},
        {id:'meta-ads',label:'Meta Ads',icon:Icons.target},
        {id:'google-ads',label:'Google Ads',icon:Icons.target},
        {id:'social-schedule',label:'Social Scheduling',icon:Icons.calendar},
        {id:'hiring',label:'Hiring',icon:Icons.hiring},
        {id:'operations',label:'Operations',icon:Icons.operations},
        {id:'legal-finance',label:'Legal & Finance',icon:Icons.legal},
        {id:'coaching',label:'Coaching',icon:Icons.coaching},
        {id:'reports',label:'Reports',icon:Icons.target},
        {id:'academy',label:'Academy',icon:Icons.academy},
        {id:'seo',label:'SEO & GMB',icon:Icons.search},
        {id:'settings',label:'Settings',icon:Icons.settings},
    ];

    const renderPage = () => {
        if (selectedCall) return <CallDetailPage callId={selectedCall} onBack={()=>setSelectedCall(null)}/>;
        switch(page) {
            case 'dashboard': return <DashboardPage/>;
            case 'calls': return <CallsPage onSelect={id=>{setSelectedCall(id);}} onRecord={()=>setPage('record')}/>;
            case 'record': return <RecordCallPage onBack={()=>setPage('calls')} onDone={(id)=>{setSelectedCall(id);setPage('calls');}}/>;
            case 'pipeline': return <PipelinePage/>;
            case 'leads': return <LeadsPage/>;
            case 'contacts': return <ContactsPage/>;
            case 'unified-inbox': return <UnifiedInboxPage/>;
            case 'inbox': return <WhatsAppInboxPage/>;
            case 'ai-employee': return <AIEmployeePage/>;
            case 'nurture': return <NurturePage/>;
            case 'marketing-hub': return <MarketingHubPage/>;
            case 'meta-ads': return <MetaAdsPage/>;
            case 'google-ads': return <GoogleAdsPage/>;
            case 'social-schedule': return <SocialSchedulingPage/>;
            case 'hiring': return <HiringPage/>;
            case 'operations': return <OperationsPage/>;
            case 'legal-finance': return <LegalFinancePage/>;
            case 'coaching': return <CoachingPage/>;
            case 'reports': return <ReportsPage/>;
            case 'academy': return <LearningPage/>;
            case 'seo': return <SEOPage/>;
            case 'settings': return <SettingsPage/>;
            default: return <DashboardPage/>;
        }
    };

    const navTo = (id) => { setPage(id); setSelectedCall(null); setSidebarOpen(false); };

    return (
        <div style={{display:'flex',minHeight:'100vh',background:'var(--bg-primary)'}}>
            {/* Mobile Header */}
            <div className="mobile-header">
                <button className="hamburger" onClick={()=>setSidebarOpen(!sidebarOpen)}>
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <span style={{fontSize:15,fontWeight:900,fontFamily:"'Playfair Display',serif"}} className="text-gradient">CallCoach</span>
                <div style={{width:24}}/>
            </div>
            {/* Mobile Overlay */}
            <div className={`mobile-overlay ${sidebarOpen?'show':''}`} onClick={()=>setSidebarOpen(false)}/>
            {/* Sidebar */}
            <aside className={`glass-solid desktop-sidebar ${sidebarOpen?'open':''}`} style={{width:240,padding:'20px 12px',display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:60}}>
                <div style={{padding:'0 8px',marginBottom:32}}><Logo/></div>
                <nav style={{display:'flex',flexDirection:'column',gap:4,flex:1}}>
                    {navItems.map(item => (
                        <a key={item.id} className={`sidebar-link ${page===item.id && !selectedCall ? 'active':''}`} onClick={()=>navTo(item.id)}>
                            {item.icon}<span>{item.label}</span>
                        </a>
                    ))}
                </nav>
                <div style={{padding:'16px 8px',borderTop:'1px solid var(--border)'}}>
                    {user && <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{user.full_name}</div>}
                    {user && <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:12}}>{user.role}</div>}
                    <a className="sidebar-link" onClick={logout} style={{color:'var(--danger)'}}>{Icons.logout}<span>Sign Out</span></a>
                    <div style={{fontSize:9,color:'var(--text-muted)',textAlign:'center',marginTop:12,letterSpacing:'0.08em',textTransform:'uppercase'}}>Powered by SBA</div>
                </div>
            </aside>
            {/* Main */}
            <main className="main-content" style={{flex:1,marginLeft:240,padding:'32px 40px',maxWidth:1200}}>
                <ErrorBoundary key={page + (selectedCall||'')}>
                    {renderPage()}
                </ErrorBoundary>
            </main>
        </div>
    );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
