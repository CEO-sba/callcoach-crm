<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallCoach CRM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #06080F;
            --bg-secondary: #0D1117;
            --bg-card: rgba(15, 20, 30, 0.7);
            --bg-card-hover: rgba(20, 28, 42, 0.8);
            --border: rgba(212, 175, 55, 0.12);
            --border-hover: rgba(212, 175, 55, 0.3);
            --gold: #D4AF37;
            --gold-light: #F0D060;
            --gold-dark: #B8960C;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --success: #22C55E;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.4); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Glass morphism */
        .glass { background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .glass:hover { border-color: var(--border-hover); }
        .glass-solid { background: var(--bg-secondary); border: 1px solid var(--border); }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none; font-family: inherit; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #000; }
        .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
        .btn-danger { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #EF4444; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .btn-xs { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

        /* Inputs */
        .input { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .input:focus { border-color: var(--gold); }
        .input::placeholder { color: var(--text-muted); }
        select.input { cursor: pointer; }
        textarea.input { resize: vertical; min-height: 80px; }

        /* Score Ring */
        .score-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
        .score-ring svg { transform: rotate(-90deg); }
        .score-ring .score-text { position: absolute; font-weight: 700; font-family: 'Inter', sans-serif; }

        /* Badge */
        .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-gold { background: rgba(212, 175, 55, 0.15); color: var(--gold); }
        .badge-green { background: rgba(34, 197, 94, 0.15); color: #22C55E; }
        .badge-red { background: rgba(239, 68, 68, 0.15); color: #EF4444; }
        .badge-blue { background: rgba(59, 130, 246, 0.15); color: #3B82F6; }
        .badge-yellow { background: rgba(245, 158, 11, 0.15); color: #F59E0B; }
        .badge-gray { background: rgba(148, 163, 184, 0.1); color: #94A3B8; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes recPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); } 70% { box-shadow: 0 0 0 15px rgba(239,68,68,0); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .recording-pulse { animation: recPulse 1s infinite; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .tip-card { animation: slideIn 0.3s ease-out; }

        /* Stage columns for pipeline */
        .stage-col { min-width: 280px; }

        /* Gradient text */
        .text-gradient { background: linear-gradient(135deg, var(--gold), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        /* Sidebar */
        .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 8px; color: var(--text-secondary); font-weight: 500; font-size: 14px; transition: all 0.2s; cursor: pointer; text-decoration: none; }
        .sidebar-link:hover { color: var(--text-primary); background: rgba(212, 175, 55, 0.06); }
        .sidebar-link.active { color: var(--gold); background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.15); }

        /* Table */
        .table-row { transition: background 0.15s; }
        .table-row:hover { background: rgba(212, 175, 55, 0.04); }

        /* Loading spinner */
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.6s linear infinite; }

        /* Glow effect */
        .glow-gold { box-shadow: 0 0 30px rgba(212, 175, 55, 0.08); }

        /* Audio Player */
        .audio-player { width: 100%; border-radius: 8px; background: rgba(255,255,255,0.03); }
        .audio-player::-webkit-media-controls-panel { background: rgba(15,20,30,0.9); }

        /* AI Coach Chat */
        .coach-chat-bubble { background: rgba(212,175,55,0.06); border: 1px solid rgba(212,175,55,0.15); border-radius: 12px; padding: 16px; font-size: 13px; line-height: 1.7; color: var(--text-secondary); white-space: pre-wrap; animation: fadeIn 0.4s ease-out; }
        .coach-prompt-btn { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .coach-prompt-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.06); }

        /* Drag and Drop Pipeline */
        .pipeline-card { transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s; cursor: grab; user-select: none; }
        .pipeline-card:active { cursor: grabbing; }
        .pipeline-card.dragging { opacity: 0.5; transform: scale(0.95); }
        .stage-drop-zone { min-height: 120px; border-radius: 10px; transition: background 0.2s, border-color 0.2s; border: 2px dashed transparent; }
        .stage-drop-zone.drag-over { background: rgba(212,175,55,0.04); border-color: rgba(212,175,55,0.3); }

        /* Learning card */
        .learning-card { padding: 14px 18px; border-radius: 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); transition: all 0.2s; cursor: default; }
        .learning-card:hover { border-color: rgba(212,175,55,0.2); background: rgba(212,175,55,0.03); }

        /* Typing indicator */
        .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: typingBounce 1.4s infinite; display: inline-block; margin: 0 2px; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

        /* Tab nav */
        .detail-tab { padding: 10px 20px; border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text-muted); background: transparent; border: none; border-bottom: 2px solid transparent; }
        .detail-tab:hover { color: var(--text-secondary); }
        .detail-tab.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(212,175,55,0.06); }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ============ API HELPERS ============
const API = '/api';
const getToken = () => localStorage.getItem('callcoach_token');
const setToken = (t) => localStorage.setItem('callcoach_token', t);
const clearToken = () => localStorage.removeItem('callcoach_token');

const apiFetch = async (path, opts = {}) => {
    const headers = { ...opts.headers };
    const token = getToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;
    if (opts.body && !(opts.body instanceof FormData) && typeof opts.body !== 'string') {
        if (!headers['Content-Type']) headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(opts.body);
    }
    const res = await fetch(`${API}${path}`, { ...opts, headers });
    if (res.status === 401) { clearToken(); window.location.reload(); }
    if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        const detail = e.detail;
        const msg = typeof detail === 'string' ? detail : (Array.isArray(detail) ? detail.map(d => d.msg || String(d)).join(', ') : 'Request failed');
        throw new Error(msg);
    }
    return res.json();
};

// ============ SVG ICONS ============
const Icons = {
    dashboard: <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>,
    calls: <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>,
    pipeline: <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>,
    contacts: <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>,
    coaching: <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>,
    mic: <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>,
    stop: <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>,
    back: <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>,
    download: <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>,
    search: <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>,
    plus: <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>,
    logout: <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>,
    upload: <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>,
    star: <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
    clock: <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>,
    check: <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path d="M20 6L9 17l-5-5"/></svg>,
    play: <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>,
    brain: <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8"><path d="M12 2a7 7 0 00-5.6 11.2L12 22l5.6-8.8A7 7 0 0012 2z"/></svg>,
    chat: <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
    lightbulb: <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 00-3 13.33V18h6v-2.67A7 7 0 0012 2z"/></svg>,
    refresh: <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>,
    send: <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>,
    target: <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
    drag: <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>,
};

// ============ LOGO ============
const Logo = () => (
    <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'8px 0'}}>
        <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg, #D4AF37, #F0D060)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="20" height="20" fill="#000" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        </div>
        <div>
            <div style={{fontSize:18,fontWeight:700,letterSpacing:'-0.02em'}} className="text-gradient">CallCoach</div>
            <div style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.1em'}}>CRM Platform</div>
        </div>
    </div>
);

// ============ SCORE RING ============
const ScoreRing = ({ score, size = 56, strokeWidth = 4 }) => {
    const r = (size - strokeWidth) / 2;
    const circ = 2 * Math.PI * r;
    const offset = circ - (score / 100) * circ;
    const color = score >= 80 ? 'var(--success)' : score >= 60 ? 'var(--gold)' : score >= 40 ? 'var(--warning)' : 'var(--danger)';
    return (
        <div className="score-ring" style={{width:size,height:size}}>
            <svg width={size} height={size}>
                <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={strokeWidth}/>
                <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeWidth} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"/>
            </svg>
            <span className="score-text" style={{fontSize:size*0.26,color}}>{Math.round(score)}</span>
        </div>
    );
};

// ============ STAT CARD ============
const StatCard = ({ label, value, sub, accent }) => (
    <div className="glass fade-in" style={{padding:'20px 24px',borderRadius:12,flex:1,minWidth:180}}>
        <div style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8}}>{label}</div>
        <div style={{fontSize:28,fontWeight:700,color: accent || 'var(--text-primary)',letterSpacing:'-0.02em'}}>{value}</div>
        {sub && <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:4}}>{sub}</div>}
    </div>
);

// ============ LOGIN PAGE ============
const LoginPage = ({ onLogin }) => {
    const [isRegister, setIsRegister] = useState(false);
    const [form, setForm] = useState({ email:'', password:'', full_name:'', clinic_name:'' });
    const [error, setError] = useState('');
    const [loading, setLoading] = useState(false);

    const handleSubmit = async (e) => {
        e.preventDefault(); setError(''); setLoading(true);
        try {
            if (isRegister) {
                await apiFetch('/auth/register-simple', { method:'POST', body:{ email:form.email, password:form.password, full_name:form.full_name, clinic_name:form.clinic_name }});
            }
            const data = await apiFetch('/auth/login', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:`username=${encodeURIComponent(form.email)}&password=${encodeURIComponent(form.password)}` });
            setToken(data.access_token);
            onLogin();
        } catch(err) { setError(err.message); } finally { setLoading(false); }
    };

    return (
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.06) 0%, transparent 60%), var(--bg-primary)'}}>
            <div className="fade-in" style={{width:'100%',maxWidth:420,padding:40}}>
                <div style={{textAlign:'center',marginBottom:40}}>
                    <div style={{width:56,height:56,borderRadius:16,background:'linear-gradient(135deg, #D4AF37, #F0D060)',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
                        <svg width="28" height="28" fill="#000" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                    </div>
                    <h1 style={{fontSize:28,fontWeight:700,letterSpacing:'-0.03em'}} className="text-gradient">CallCoach CRM</h1>
                    <p style={{color:'var(--text-muted)',fontSize:14,marginTop:6}}>AI-powered call intelligence for clinics</p>
                </div>
                <form onSubmit={handleSubmit} className="glass" style={{padding:32,borderRadius:16}}>
                    <h2 style={{fontSize:18,fontWeight:600,marginBottom:24,color:'var(--text-primary)'}}>{isRegister ? 'Create Account' : 'Sign In'}</h2>
                    {isRegister && <>
                        <div style={{marginBottom:16}}><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Full Name</label><input className="input" placeholder="Dr. John Smith" value={form.full_name} onChange={e=>setForm({...form,full_name:e.target.value})} required/></div>
                        <div style={{marginBottom:16}}><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Clinic Name</label><input className="input" placeholder="Premier Aesthetics" value={form.clinic_name} onChange={e=>setForm({...form,clinic_name:e.target.value})} required/></div>
                    </>}
                    <div style={{marginBottom:16}}><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Email</label><input className="input" type="email" placeholder="you@clinic.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} required/></div>
                    <div style={{marginBottom:24}}><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Password</label><input className="input" type="password" placeholder="Min. 6 characters" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} required/></div>

const RecordCallPage = ({ onBack, onDone }) => {
    const [mode, setMode] = useState('choose');
    const [recording, setRecording] = useState(false);
    const [elapsed, setElapsed] = useState(0);
    const [form, setForm] = useState({caller_name:'',caller_phone:'',call_type:'inbound'});
    const [uploading, setUploading] = useState(false);
    const [error, setError] = useState('');
    const [status, setStatus] = useState('');
    const mediaRec = useRef(null);
    const chunks = useRef([]);
    const timer = useRef(null);
    const fileRef = useRef(null);

    const startRecording = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({audio:true});
            mediaRec.current = new MediaRecorder(stream);
            chunks.current = [];
            mediaRec.current.ondataavailable = e => chunks.current.push(e.data);
            mediaRec.current.start(1000);
            setRecording(true); setElapsed(0);
            timer.current = setInterval(()=>setElapsed(p=>p+1),1000);
        } catch(e) { setError('Microphone access denied'); }
    };

    const stopAndUpload = async () => {
        return new Promise(resolve => {
            mediaRec.current.onstop = async () => {
                clearInterval(timer.current); setRecording(false);
                const blob = new Blob(chunks.current, {type:'audio/webm'});
                await uploadAudio(blob);
                resolve();
            };
            mediaRec.current.stop();
            mediaRec.current.stream.getTracks().forEach(t=>t.stop());
        });
    };

    const uploadAudio = async (blob) => {
        setUploading(true); setStatus('Uploading...'); setError('');
        try {
            const fd = new FormData();
            fd.append('audio', blob, `recording_${Date.now()}.webm`);
            fd.append('caller_name', form.caller_name);
            fd.append('caller_phone', form.caller_phone);
            fd.append('call_type', form.call_type);
            const result = await fetch(`${API}/calls/record`, { method:'POST', headers:{'Authorization':`Bearer ${getToken()}`}, body:fd });
            if (!result.ok) throw new Error('Upload failed');
            setStatus('Processing with AI...');
            const data = await result.json();
            let tries = 0;
            const poll = setInterval(async ()=>{
                tries++;
                try {
                    const s = await apiFetch(`/calls/${data.id}`);
                    if (s.transcription_status==='completed' || tries > 60) { clearInterval(poll); setStatus('Done!'); setTimeout(()=>onDone(data.id),1000); }
                    else { setStatus(`Processing... ${s.transcription_status}`); }
                } catch(e) { if(tries>60) clearInterval(poll); }
            }, 3000);
        } catch(e) { setError(e.message); setUploading(false); }
    };

    const handleFileUpload = async (e) => {
        const file = e.target.files?.[0]; if (!file) return;
        await uploadAudio(file);
    };

    const formatTime = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;

    return (
        <div className="fade-in">
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:28}}>
                <button className="btn btn-ghost btn-sm" onClick={onBack}>{Icons.back}<span>Back</span></button>
                <h1 style={{fontSize:24,fontWeight:700}}>Record Call</h1>
            </div>
            <div className="glass" style={{padding:32,borderRadius:16,maxWidth:560}}>
                <div style={{display:'flex',flexDirection:'column',gap:16,marginBottom:24}}>
                    <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Caller Name</label><input className="input" placeholder="Patient name" value={form.caller_name} onChange={e=>setForm({...form,caller_name:e.target.value})}/></div>
                    <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Phone Number</label><input className="input" placeholder="+91 98765 43210" value={form.caller_phone} onChange={e=>setForm({...form,caller_phone:e.target.value})}/></div>
                    <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Call Type</label>
                        <select className="input" value={form.call_type} onChange={e=>setForm({...form,call_type:e.target.value})}>
                            <option value="inbound">Inbound</option><option value="outbound">Outbound</option><option value="follow_up">Follow-up</option>
                        </select>
                    </div>
                </div>
                {!recording && !uploading && (
                    <div style={{display:'flex',gap:12}}>
                        <button className="btn btn-gold" onClick={startRecording}>{Icons.mic}<span>Start Recording</span></button>
                        <button className="btn btn-ghost" onClick={()=>fileRef.current?.click()}>{Icons.upload}<span>Upload Audio</span></button>
                        <input ref={fileRef} type="file" accept="audio/*,.mp4" style={{display:'none'}} onChange={handleFileUpload}/>
                    </div>
                )}
                {recording && (
                    <div style={{textAlign:'center',padding:'20px 0'}}>
                        <div className="recording-pulse" style={{width:80,height:80,borderRadius:'50%',background:'rgba(239,68,68,0.2)',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
                            <div style={{width:20,height:20,borderRadius:'50%',background:'#EF4444'}}></div>
                        </div>
                        <div style={{fontSize:32,fontWeight:700,fontVariantNumeric:'tabular-nums',marginBottom:16}}>{formatTime(elapsed)}</div>
                        <button className="btn btn-danger" onClick={stopAndUpload}>{Icons.stop}<span>Stop & Analyze</span></button>
                    </div>
                )}
                {uploading && (
                    <div style={{textAlign:'center',padding:'20px 0'}}>
                        <div className="spinner" style={{width:32,height:32,margin:'0 auto 16px'}}></div>
                        <div style={{color:'var(--gold)',fontWeight:600}}>{status}</div>
                    </div>
                )}
                {error && <div style={{padding:'10px 14px',borderRadius:8,background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.2)',color:'#EF4444',fontSize:13,marginTop:16}}>{error}</div>}
            </div>
        </div>
    );
};

// ============ PIPELINE (DRAG & DROP) ============
const PipelinePage = () => {
    const [deals, setDeals] = useState([]);
    const [showAdd, setShowAdd] = useState(false);
    const [form, setForm] = useState({contact_name:'',title:'',treatment_interest:'',deal_value:0,source:'phone',contact_phone:'',contact_email:''});
    const [draggedDeal, setDraggedDeal] = useState(null);
    const [dragOverStage, setDragOverStage] = useState(null);

    const stages = ['new_inquiry','contacted','consultation_booked','consultation_done','proposal_sent','won','lost'];
    const stageLabels = {'new_inquiry':'New Inquiry','contacted':'Contacted','consultation_booked':'Consult Booked','consultation_done':'Consult Done','proposal_sent':'Proposal Sent','won':'Won','lost':'Lost'};
    const stageColors = {'new_inquiry':'var(--info)','contacted':'#8B5CF6','consultation_booked':'var(--gold)','consultation_done':'#F59E0B','proposal_sent':'#EC4899','won':'var(--success)','lost':'var(--danger)'};

    useEffect(()=>{ apiFetch('/pipeline').then(setDeals).catch(()=>{}); },[]);

    const addDeal = async () => {
        try { await apiFetch('/pipeline',{method:'POST',body:form}); setShowAdd(false); setForm({contact_name:'',title:'',treatment_interest:'',deal_value:0,source:'phone',contact_phone:'',contact_email:''}); apiFetch('/pipeline').then(setDeals); } catch(e){}
    };

    const moveStage = async (id, stage) => {
        // Optimistic update
        setDeals(prev => prev.map(d => d.id === id ? {...d, stage} : d));
        try {
            await apiFetch(`/pipeline/${id}`,{method:'PATCH',body:{stage}});
        } catch(e) {
            apiFetch('/pipeline').then(setDeals); // revert on failure
        }
    };

    const handleDragStart = (e, deal) => {
        setDraggedDeal(deal);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', deal.id);
        // Make the drag image slightly transparent
        setTimeout(() => { e.target.classList.add('dragging'); }, 0);
    };

    const handleDragEnd = (e) => {
        e.target.classList.remove('dragging');
        setDraggedDeal(null);
        setDragOverStage(null);
    };

    const handleDragOver = (e, stage) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (dragOverStage !== stage) setDragOverStage(stage);
    };

    const handleDragLeave = (e, stage) => {
        // Only clear if actually leaving the drop zone
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX; const y = e.clientY;
        if (x < rect.left || x > rect.right || y < rect.top || y > rect.bottom) {
            if (dragOverStage === stage) setDragOverStage(null);
        }
    };

    const handleDrop = (e, targetStage) => {
        e.preventDefault();
        setDragOverStage(null);
        if (draggedDeal && draggedDeal.stage !== targetStage) {
            moveStage(draggedDeal.id, targetStage);
        }
        setDraggedDeal(null);
    };

    // Compute pipeline value per stage
    const stageValue = (stage) => deals.filter(d=>d.stage===stage).reduce((sum,d)=>sum+(d.deal_value||0),0);
    const totalValue = deals.reduce((sum,d)=>sum+(d.deal_value||0),0);

    return (
        <div className="fade-in">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
                <div>
                    <h1 style={{fontSize:24,fontWeight:700}}>Pipeline</h1>
                    <div style={{display:'flex',gap:16,marginTop:4}}>
                        <span style={{color:'var(--text-muted)',fontSize:14}}>{deals.length} active deals</span>
                        <span style={{color:'var(--gold)',fontSize:14,fontWeight:600}}>Total: ${totalValue.toLocaleString()}</span>
                    </div>
                </div>
                <button className="btn btn-gold" onClick={()=>setShowAdd(!showAdd)}>{Icons.plus}<span>New Deal</span></button>
            </div>

            {/* Drag hint */}
            <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16,display:'flex',alignItems:'center',gap:6}}>
                <span style={{opacity:0.5}}>{Icons.drag}</span>
                Drag and drop deal cards between columns to change stages
            </div>

            {showAdd && (
                <div className="glass" style={{padding:24,borderRadius:12,marginBottom:20}}>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Contact Name *</label><input className="input" value={form.contact_name} onChange={e=>setForm({...form,contact_name:e.target.value})} required/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Deal Title *</label><input className="input" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} required/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Treatment</label><input className="input" placeholder="e.g. Hair Transplant" value={form.treatment_interest} onChange={e=>setForm({...form,treatment_interest:e.target.value})}/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Deal Value</label><input className="input" type="number" value={form.deal_value} onChange={e=>setForm({...form,deal_value:parseFloat(e.target.value)||0})}/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Phone</label><input className="input" value={form.contact_phone} onChange={e=>setForm({...form,contact_phone:e.target.value})}/></div>
                        <div><label style={{fontSize:12,fontWeight:600,color:'var(--text-muted)',display:'block',marginBottom:6}}>Source</label>
                            <select className="input" value={form.source} onChange={e=>setForm({...form,source:e.target.value})}><option value="phone">Phone</option><option value="walk_in">Walk-in</option><option value="website">Website</option><option value="referral">Referral</option><option value="social_media">Social Media</option><option value="ad">Ad</option></select>
                        </div>
                    </div>
                    <div style={{display:'flex',gap:8}}><button className="btn btn-gold btn-sm" onClick={addDeal}>Create Deal</button><button className="btn btn-ghost btn-sm" onClick={()=>setShowAdd(false)}>Cancel</button></div>
                </div>
            )}
            <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:16}} className="scrollbar-hide">
                {stages.map(stage => {
                    const stageDeals = deals.filter(d=>d.stage===stage);
                    const sv = stageValue(stage);
                    const isOver = dragOverStage === stage && draggedDeal?.stage !== stage;
                    return (
                        <div key={stage} className="stage-col" style={{flexShrink:0}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'0 4px'}}>
                                <div style={{width:8,height:8,borderRadius:'50%',background:stageColors[stage]}}></div>
                                <span style={{fontSize:13,fontWeight:600,color:'var(--text-secondary)'}}>{stageLabels[stage]}</span>
                                <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:'auto'}}>{stageDeals.length}</span>
                            </div>
                            {sv > 0 && <div style={{fontSize:11,color:stageColors[stage],fontWeight:600,marginBottom:8,padding:'0 4px'}}>${sv.toLocaleString()}</div>}
                            <div
                                className={`stage-drop-zone ${isOver ? 'drag-over' : ''}`}
                                onDragOver={(e) => handleDragOver(e, stage)}
                                onDragLeave={(e) => handleDragLeave(e, stage)}
                                onDrop={(e) => handleDrop(e, stage)}
                                style={{display:'flex',flexDirection:'column',gap:8,padding:4}}
                            >
                                {stageDeals.map(deal => (
                                    <div key={deal.id}
                                        className="glass pipeline-card"
                                        draggable="true"
                                        onDragStart={(e) => handleDragStart(e, deal)}
                                        onDragEnd={handleDragEnd}
                                        style={{padding:16,borderRadius:10,borderLeft:`3px solid ${stageColors[stage]}`}}
                                    >
                                        <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
                                            <span style={{color:'var(--text-muted)',marginTop:2,cursor:'grab',opacity:0.4}}>{Icons.drag}</span>
                                            <div style={{flex:1,minWidth:0}}>
                                                <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{deal.title}</div>
                                                <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>{deal.contact_name}</div>
                                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                                    <span style={{fontWeight:700,fontSize:14,color:'var(--gold)'}}>${(deal.deal_value||0).toLocaleString()}</span>
                                                    {deal.treatment_interest && <span className="badge badge-gold" style={{fontSize:10}}>{deal.treatment_interest}</span>}
                                                </div>
                                                {deal.source && <div style={{fontSize:10,color:'var(--text-muted)',marginTop:6}}>via {deal.source}</div>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {stageDeals.length === 0 && !isOver && (
                                    <div style={{padding:'20px',textAlign:'center',color:'var(--text-muted)',fontSize:12,opacity:0.5}}>
                                        Drop deals here
                                    </div>
                                )}
                                {isOver && (
                                    <div style={{padding:'16px',textAlign:'center',color:'var(--gold)',fontSize:12,borderRadius:8,border:'1px dashed rgba(212,175,55,0.3)',background:'rgba(212,175,55,0.04)'}}>
                                        Move to {stageLabels[stage]}
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                })}
            </div>
        </div>
    );
};

                <div><h1 style={{fontSize:24,fontWeight:700}}>Contacts</h1><p style={{color:'var(--text-muted)',fontSize:14,marginTop:4}}>{contacts.length} total contacts</p></div>
                <div style={{display:'flex',gap:10}}>
                    <div style={{position:'relative'}}><span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)'}}>{Icons.search}</span><input className="input" style={{paddingLeft:36,width:220}} placeholder="Search contacts..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
                    <a href="/api/contacts/csv" target="_blank" className="btn btn-ghost btn-sm">{Icons.download}<span>Export CSV</span></a>
                </div>
            </div>
            {filtered.length === 0 ? (
                <div className="glass" style={{padding:60,borderRadius:12,textAlign:'center'}}><p style={{color:'var(--text-muted)',fontSize:15}}>No contacts found</p></div>
            ) : (
                <div className="glass" style={{borderRadius:12,overflow:'hidden'}}>
                    <div style={{overflowX:'auto'}}>
                        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                            <thead><tr style={{borderBottom:'1px solid var(--border)'}}>
                                {['Name','Phone','Email','Calls','Deals','Treatments','Sentiment','Value'].map(h=>(
                                    <th key={h} style={{padding:'12px 16px',textAlign:'left',fontWeight:600,color:'var(--text-muted)',fontSize:11,textTransform:'uppercase',letterSpacing:'0.06em'}}>{h}</th>
                                ))}
                            </tr></thead>
                            <tbody>
                                {filtered.map(c=>(
                                    <tr key={c.id} className="table-row" style={{borderBottom:'1px solid rgba(255,255,255,0.03)'}}>
                                        <td style={{padding:'12px 16px',fontWeight:600}}>{c.name||'Unknown'}</td>
                                        <td style={{padding:'12px 16px',color:'var(--text-secondary)'}}>{c.phone||'-'}</td>
                                        <td style={{padding:'12px 16px',color:'var(--text-secondary)'}}>{c.email||'-'}</td>
                                        <td style={{padding:'12px 16px'}}>{c.total_calls}</td>
                                        <td style={{padding:'12px 16px'}}>{c.total_deals}</td>
                                        <td style={{padding:'12px 16px'}}>{c.treatments_interested ? <span className="badge badge-gold">{c.treatments_interested}</span> : '-'}</td>
                                        <td style={{padding:'12px 16px'}}>{c.latest_sentiment ? <span className={`badge ${c.latest_sentiment==='positive'?'badge-green':c.latest_sentiment==='negative'?'badge-red':'badge-gray'}`}>{c.latest_sentiment}</span> : '-'}</td>
                                        <td style={{padding:'12px 16px',fontWeight:600,color:'var(--gold)'}}>{c.deal_value ? `$${c.deal_value.toLocaleString()}` : '-'}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            )}
        </div>
    );
};

// ============ MAIN APP ============
const App = () => {
    const [authed, setAuthed] = useState(!!getToken());
    const [page, setPage] = useState('dashboard');
    const [selectedCall, setSelectedCall] = useState(null);
    const [user, setUser] = useState(null);

    useEffect(() => {
        if (authed) apiFetch('/auth/me').then(setUser).catch(()=>{clearToken();setAuthed(false);});
    }, [authed]);

    const logout = () => { clearToken(); setAuthed(false); setUser(null); };

    if (!authed) return <LoginPage onLogin={()=>setAuthed(true)}/>;

    const navItems = [
        {id:'dashboard',label:'Dashboard',icon:Icons.dashboard},
        {id:'calls',label:'Calls',icon:Icons.calls},
        {id:'pipeline',label:'Pipeline',icon:Icons.pipeline},
        {id:'contacts',label:'Contacts',icon:Icons.contacts},
        {id:'coaching',label:'Coaching',icon:Icons.coaching},
    ];

    const renderPage = () => {
        if (selectedCall) return <CallDetailPage callId={selectedCall} onBack={()=>setSelectedCall(null)}/>;
        switch(page) {
            case 'dashboard': return <DashboardPage/>;
            case 'calls': return <CallsPage onSelect={id=>{setSelectedCall(id);}} onRecord={()=>setPage('record')}/>;
            case 'record': return <RecordCallPage onBack={()=>setPage('calls')} onDone={(id)=>{setSelectedCall(id);setPage('calls');}}/>;
            case 'pipeline': return <PipelinePage/>;
            case 'contacts': return <ContactsPage/>;
            case 'coaching': return <CoachingPage/>;
            default: return <DashboardPage/>;
        }
    };

    return (
        <div style={{display:'flex',minHeight:'100vh',background:'var(--bg-primary)'}}>
            {/* Sidebar */}
            <aside className="glass-solid" style={{width:240,padding:'20px 12px',display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:50}}>
                <div style={{padding:'0 8px',marginBottom:32}}><Logo/></div>
                <nav style={{display:'flex',flexDirection:'column',gap:4,flex:1}}>
                    {navItems.map(item => (
                        <a key={item.id} className={`sidebar-link ${page===item.id && !selectedCall ? 'active':''}`} onClick={()=>{setPage(item.id);setSelectedCall(null);}}>
                            {item.icon}<span>{item.label}</span>
                        </a>
                    ))}
                </nav>
                <div style={{padding:'16px 8px',borderTop:'1px solid var(--border)'}}>
                    {user && <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{user.full_name}</div>}
                    {user && <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:12}}>{user.role}</div>}
                    <a className="sidebar-link" onClick={logout} style={{color:'var(--danger)'}}>{Icons.logout}<span>Sign Out</span></a>
                </div>
            </aside>
            {/* Main */}
            <main style={{flex:1,marginLeft:240,padding:'32px 40px',maxWidth:1200}}>
                {renderPage()}
            </main>
        </div>
    );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
