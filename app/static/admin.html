<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA Admin | Skin Business Accelerator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0A0A0A;
            --bg-card: #111111;
            --bg-card-hover: #1A1A1A;
            --bg-elevated: #141414;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.16);
            --orange: #E88725;
            --orange-light: #F5A623;
            --orange-dark: #C06E1A;
            --orange-glow: rgba(232, 135, 37, 0.15);
            --orange-glow-strong: rgba(232, 135, 37, 0.25);
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --text-muted: #666666;
            --success: #22C55E;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --accent: #8B5CF6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(232, 135, 37, 0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(232, 135, 37, 0.4); }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; transition: border-color 0.2s; }
        .card:hover { border-color: var(--border-hover); }
        .card-elevated { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; }

        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none; font-family: inherit; }
        .btn-primary { background: var(--orange); color: #000; }
        .btn-primary:hover { background: var(--orange-light); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(232, 135, 37, 0.3); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
        .btn-danger { background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.25); color: #EF4444; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }
        .btn-success { background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94, 0.25); color: #22C55E; }
        .btn-success:hover { background: rgba(34, 197, 94, 0.2); }
        .btn-sm { padding: 7px 14px; font-size: 13px; }
        .btn-xs { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

        .input { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(232, 135, 37, 0.1); }
        .input::placeholder { color: var(--text-muted); }
        select.input { cursor: pointer; }

        .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-green { background: rgba(34, 197, 94, 0.12); color: #22C55E; }
        .badge-red { background: rgba(239, 68, 68, 0.12); color: #EF4444; }
        .badge-blue { background: rgba(59, 130, 246, 0.12); color: #60A5FA; }
        .badge-yellow { background: rgba(245, 158, 11, 0.12); color: #F59E0B; }
        .badge-gray { background: rgba(160, 160, 160, 0.1); color: #A0A0A0; }
        .badge-orange { background: var(--orange-glow); color: var(--orange); }
        .badge-accent { background: rgba(139, 92, 246, 0.12); color: #A78BFA; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.35s ease-out forwards; }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.6s linear infinite; }

        .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 8px; color: var(--text-secondary); font-weight: 500; font-size: 14px; transition: all 0.2s; cursor: pointer; text-decoration: none; border: 1px solid transparent; }
        .sidebar-link:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.04); }
        .sidebar-link.active { color: var(--orange); background: var(--orange-glow); border-color: rgba(232, 135, 37, 0.2); }

        .table-row { transition: background 0.15s; }
        .table-row:hover { background: rgba(255, 255, 255, 0.02); }

        .toggle-track { width: 44px; height: 24px; border-radius: 12px; cursor: pointer; transition: background 0.2s; position: relative; }
        .toggle-track.on { background: rgba(34,197,94,0.4); }
        .toggle-track.off { background: rgba(160,160,160,0.15); }
        .toggle-thumb { width: 18px; height: 18px; border-radius: 50%; background: white; position: absolute; top: 3px; transition: left 0.2s; }
        .toggle-track.on .toggle-thumb { left: 23px; }
        .toggle-track.off .toggle-thumb { left: 3px; }
        .dim-bar { height: 6px; border-radius: 3px; transition: width 0.6s ease; }

        .mobile-header { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 60; background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 12px 16px; align-items: center; justify-content: space-between; }
        .hamburger { background: none; border: none; color: var(--text-primary); cursor: pointer; padding: 4px; }
        .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 55; }
        .mobile-overlay.show { display: block; }
        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .desktop-sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            .desktop-sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0 !important; padding: 72px 16px 24px 16px !important; }
        }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
        .modal-box { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 16px; padding: 32px; max-width: 520px; width: 90%; max-height: 90vh; overflow-y: auto; }

        .stat-card { padding: 24px; border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border); position: relative; overflow: hidden; flex: 1; min-width: 200px; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent-color, var(--orange)); opacity: 0.6; }
        .stat-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
        .stat-value { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
        .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

        .th-cell { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
        .td-cell { padding: 14px 16px; }

        .section-title { font-size: 22px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
        .section-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
    </style>
</head>

const { useState, useEffect, useRef, useCallback } = React;

// ============ API HELPERS ============
const API = '/api';
const getToken = () => localStorage.getItem('callcoach_admin_token');
const setToken = (t) => localStorage.setItem('callcoach_admin_token', t);
const clearToken = () => localStorage.removeItem('callcoach_admin_token');

const apiFetch = async (path, opts = {}) => {
    const headers = { ...opts.headers };
    const token = getToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;
    if (opts.body && !(opts.body instanceof FormData) && typeof opts.body !== 'string') {
        if (!headers['Content-Type']) headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(opts.body);
    }
    const res = await fetch(`${API}${path}`, { ...opts, headers });
    if (res.status === 401) { clearToken(); window.location.reload(); }
    if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        const detail = e.detail;
        const msg = typeof detail === 'string' ? detail : (Array.isArray(detail) ? detail.map(d => d.msg || String(d)).join(', ') : 'Request failed');
        throw new Error(msg);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
};

// ============ STAT CARD ============
const StatCard = ({ label, value, sub, color }) => (
    <div className="stat-card fade-in" style={{'--accent-color': color || 'var(--orange)'}}>
        <div className="stat-label">{label}</div>
        <div className="stat-value" style={{color: color || 'var(--text-primary)'}}>{value}</div>
        {sub && <div className="stat-sub">{sub}</div>}
    </div>
);

// ============ TOGGLE SWITCH ============
const Toggle = ({ value, onChange, label }) => (
    <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div className={`toggle-track ${value ? 'on' : 'off'}`} onClick={() => onChange(!value)}>
            <div className="toggle-thumb"/>
        </div>
        {label && <span style={{fontSize:13,color:'var(--text-secondary)'}}>{label}</span>}
    </div>
);

// ============ DIMENSION BAR ============
const DimensionBar = ({ label, value, max = 100 }) => {
    const pct = max > 0 && value ? (value / max) * 100 : 0;
    const color = !value ? 'var(--text-muted)' : value >= 80 ? 'var(--success)' : value >= 60 ? 'var(--orange)' : value >= 40 ? 'var(--warning)' : 'var(--danger)';
    return (
        <div style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                <span style={{fontSize:13,color:'var(--text-secondary)',fontWeight:500}}>{label}</span>
                <span style={{fontSize:13,fontWeight:700,color}}>{value ? value.toFixed(1) : 'N/A'}</span>
            </div>
            <div style={{height:6,borderRadius:3,background:'rgba(255,255,255,0.06)'}}>
                <div className="dim-bar" style={{width:`${pct}%`,background:color}}/>
            </div>
        </div>
    );
};

// ============ MODAL ============
const Modal = ({ children, onClose }) => (
    <div className="modal-overlay" onClick={onClose}>
        <div className="modal-box" onClick={e => e.stopPropagation()}>
            {children}
        </div>
    </div>
);

// ============ FORGOT PASSWORD MODAL ============
const ForgotPasswordModal = ({ onClose }) => {
    const [email, setEmail] = useState('');
    const [sent, setSent] = useState(false);
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');

    const handleSubmit = async (e) => {
        e.preventDefault(); setError(''); setLoading(true);
        try {
            await fetch('/api/auth/forgot-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) });
            setSent(true);
        } catch(err) { setError('Network error. Please try again.'); } finally { setLoading(false); }
    };

    return (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999,padding:20}} onClick={onClose}>
            <div className="card" style={{maxWidth:400,width:'100%',padding:32,borderRadius:16}} onClick={e=>e.stopPropagation()}>
                {sent ? (
                    <div style={{textAlign:'center'}}>
                        <div style={{width:48,height:48,borderRadius:'50%',background:'rgba(34,197,94,0.15)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:24,color:'var(--success)'}}>&#10003;</div>
                        <h3 style={{fontSize:16,fontWeight:700,marginBottom:8}}>Check Your Email</h3>
                        <p style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.6,marginBottom:20}}>If an account with that email exists, we've sent a password reset link.</p>
                        <button onClick={onClose} className="btn btn-primary" style={{width:'100%',justifyContent:'center'}}>Back to Login</button>
                    </div>
                ) : (
                    <>
                        <h3 style={{fontSize:16,fontWeight:700,marginBottom:8}}>Forgot Password</h3>
                        <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:20,lineHeight:1.5}}>Enter your email and we'll send a reset link.</p>
                        {error && <div style={{padding:'8px 12px',borderRadius:8,background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',color:'#EF4444',fontSize:12,marginBottom:12}}>{error}</div>}
                        <form onSubmit={handleSubmit}>
                            <div style={{marginBottom:16}}><input className="input" type="email" placeholder="admin@sba.com" value={email} onChange={e=>setEmail(e.target.value)} required/></div>
                            <button type="submit" className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} disabled={loading}>{loading ? <div className="spinner"/> : 'Send Reset Link'}</button>
                        </form>
                        <div style={{textAlign:'center',marginTop:14}}><a onClick={onClose} style={{fontSize:12,color:'var(--text-muted)',cursor:'pointer'}}>Cancel</a></div>
                    </>
                )}
            </div>
        </div>
    );
};

// ============ LOGIN PAGE ============
const AdminLoginPage = ({ onLogin }) => {
    const [form, setForm] = useState({ email: '', password: '' });
    const [error, setError] = useState('');
    const [loading, setLoading] = useState(false);
    const [showForgot, setShowForgot] = useState(false);

    const handleSubmit = async (e) => {
        e.preventDefault(); setError(''); setLoading(true);
        try {
            const data = await apiFetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(form.email)}&password=${encodeURIComponent(form.password)}`
            });
            if (!data.is_super_admin) {
                setError('Access denied. Super admin credentials required.');

// ============ DASHBOARD PAGE ============
const DashboardPage = () => {
    const [stats, setStats] = useState(null);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        apiFetch('/admin/dashboard').then(setStats).catch(console.error).finally(() => setLoading(false));
    }, []);

    if (loading) return <div style={{display:'flex',justifyContent:'center',padding:80}}><div className="spinner" style={{width:32,height:32}}/></div>;

    return (
        <div className="fade-in">
            <div className="section-title">Platform Dashboard</div>
            <div className="section-desc">Overview of all clinics, users, and calls across the platform.</div>
            {stats && (
                <>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))',gap:16,marginBottom:20}}>
                        <StatCard label="Total Clinics" value={stats.total_clinics} sub={`${stats.active_clinics} active`} color="var(--orange)"/>
                        <StatCard label="Total Users" value={stats.total_users} color="var(--info)"/>
                        <StatCard label="Total Calls" value={stats.total_calls} color="var(--accent)"/>
                        <StatCard label="Avg Score" value={stats.platform_avg_score ? stats.platform_avg_score.toFixed(1) : 'N/A'} color="var(--success)"/>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))',gap:16}}>
                        <StatCard label="Pipeline Value" value={`$${(stats.total_pipeline_value || 0).toLocaleString()}`} color="var(--warning)"/>
                        <StatCard label="Won Value" value={`$${(stats.total_won_value || 0).toLocaleString()}`} color="var(--success)"/>
                    </div>
                </>
            )}
        </div>
    );
};

// ============ CLINICS LIST PAGE ============
const ClinicsListPage = ({ onSelect }) => {
    const [clinics, setClinics] = useState([]);
    const [loading, setLoading] = useState(true);
    const [search, setSearch] = useState('');
    const [showCreate, setShowCreate] = useState(false);

    const load = () => {
        setLoading(true);
        apiFetch('/admin/clinics').then(setClinics).catch(console.error).finally(() => setLoading(false));
    };
    useEffect(load, []);

    const filtered = clinics.filter(c =>
        c.name.toLowerCase().includes(search.toLowerCase()) ||
        (c.city || '').toLowerCase().includes(search.toLowerCase()) ||
        (c.specialty || '').toLowerCase().includes(search.toLowerCase())
    );

    return (
        <div className="fade-in">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24,flexWrap:'wrap',gap:12}}>
                <div>
                    <div className="section-title">Clinic Accounts</div>
                    <p style={{fontSize:13,color:'var(--text-muted)',marginTop:4}}>{clinics.length} total clinics</p>
                </div>
                <button className="btn btn-primary" onClick={() => setShowCreate(true)}>{Icons.plus} New Clinic Account</button>
            </div>
            <div style={{marginBottom:20,position:'relative'}}>
                <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)'}}>{Icons.search}</span>
                <input className="input" style={{paddingLeft:38}} placeholder="Search clinics by name, city, or specialty..." value={search} onChange={e => setSearch(e.target.value)}/>
            </div>
            {loading ? (
                <div style={{display:'flex',justifyContent:'center',padding:40}}><div className="spinner"/></div>
            ) : (
                <div className="card" style={{overflow:'hidden'}}>
                    <table style={{width:'100%',borderCollapse:'collapse'}}>
                        <thead>
                            <tr style={{borderBottom:'1px solid var(--border)'}}>
                                <th className="th-cell">Clinic</th>
                                <th className="th-cell">City</th>
                                <th className="th-cell">Specialty</th>
                                <th className="th-cell" style={{textAlign:'center'}}>Users</th>
                                <th className="th-cell" style={{textAlign:'center'}}>Calls</th>
                                <th className="th-cell" style={{textAlign:'center'}}>Avg Score</th>
                                <th className="th-cell" style={{textAlign:'center'}}>Status</th>
                                <th className="th-cell" style={{textAlign:'center'}}>Leaderboard</th>
                            </tr>
                        </thead>
                        <tbody>
                            {filtered.map(c => (
                                <tr key={c.id} className="table-row" style={{borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={() => onSelect(c.id)}>
                                    <td className="td-cell">
                                        <div style={{fontWeight:600,fontSize:14}}>{c.name}</div>
                                        {c.email && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{c.email}</div>}
                                    </td>
                                    <td className="td-cell" style={{fontSize:13,color:'var(--text-secondary)'}}>{c.city || '-'}</td>
                                    <td className="td-cell" style={{fontSize:13,color:'var(--text-secondary)'}}>{c.specialty || '-'}</td>
                                    <td className="td-cell" style={{textAlign:'center',fontSize:14,fontWeight:600}}>{c.user_count || 0}</td>
                                    <td className="td-cell" style={{textAlign:'center',fontSize:14,fontWeight:600}}>{c.call_count || 0}</td>
                                    <td className="td-cell" style={{textAlign:'center'}}>
                                        {c.avg_score ? <span style={{fontWeight:700,fontSize:14,color: c.avg_score >= 70 ? 'var(--success)' : c.avg_score >= 50 ? 'var(--warning)' : 'var(--danger)'}}>{c.avg_score.toFixed(1)}</span> : <span style={{color:'var(--text-muted)'}}>-</span>}
                                    </td>
                                    <td className="td-cell" style={{textAlign:'center'}}>
                                        <span className={`badge ${c.is_active ? 'badge-green' : 'badge-red'}`}>{c.is_active ? 'Active' : 'Inactive'}</span>
                                    </td>
                                    <td className="td-cell" style={{textAlign:'center',color: c.leaderboard_visible ? 'var(--orange)' : 'var(--text-muted)'}}>
                                        {c.leaderboard_visible ? Icons.eye : Icons.eyeOff}
                                    </td>
                                </tr>
                            ))}
                            {filtered.length === 0 && (
                                <tr><td colSpan={8} style={{padding:40,textAlign:'center',color:'var(--text-muted)',fontSize:14}}>No clinics found.</td></tr>
                            )}
                        </tbody>
                    </table>
                </div>
            )}
            {showCreate && <CreateClinicModal onClose={() => setShowCreate(false)} onCreated={() => { setShowCreate(false); load(); }}/>}
        </div>
    );
};

// ============ CREATE CLINIC MODAL ============
const CreateClinicModal = ({ onClose, onCreated }) => {
    const [form, setForm] = useState({ clinic_name:'', clinic_phone:'', clinic_email:'', clinic_city:'', clinic_specialty:'', admin_email:'', admin_password:'', admin_full_name:'' });
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');

    const handleSubmit = async (e) => {
        e.preventDefault(); setError(''); setLoading(true);
        try {
            await apiFetch('/admin/clinics', { method: 'POST', body: form });
            onCreated();
        } catch (err) { setError(err.message); } finally { setLoading(false); }
    };

    return (
        <Modal onClose={onClose}>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>Create Clinic Account</h2>
            <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:24}}>Create a new clinic with an admin user.</p>
            {error && <div style={{padding:'10px 14px',borderRadius:8,background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',color:'#EF4444',fontSize:13,marginBottom:16}}>{error}</div>}
            <form onSubmit={handleSubmit}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--orange)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:12}}>Clinic Info</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
                    <input className="input" placeholder="Clinic Name *" value={form.clinic_name} onChange={e => setForm({...form, clinic_name: e.target.value})} required/>
                    <input className="input" placeholder="Phone" value={form.clinic_phone} onChange={e => setForm({...form, clinic_phone: e.target.value})}/>
                    <input className="input" placeholder="Clinic Email" value={form.clinic_email} onChange={e => setForm({...form, clinic_email: e.target.value})}/>
                    <input className="input" placeholder="City" value={form.clinic_city} onChange={e => setForm({...form, clinic_city: e.target.value})}/>
                    <input className="input" placeholder="Specialty" value={form.clinic_specialty} onChange={e => setForm({...form, clinic_specialty: e.target.value})} style={{gridColumn:'span 2'}}/>
                </div>
                <div style={{fontSize:11,fontWeight:700,color:'var(--orange)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:12}}>Admin User</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:24}}>
                    <input className="input" placeholder="Full Name *" value={form.admin_full_name} onChange={e => setForm({...form, admin_full_name: e.target.value})} required/>
                    <input className="input" type="email" placeholder="Email *" value={form.admin_email} onChange={e => setForm({...form, admin_email: e.target.value})} required/>
                    <input className="input" type="password" placeholder="Password *" value={form.admin_password} onChange={e => setForm({...form, admin_password: e.target.value})} required style={{gridColumn:'span 2'}}/>
                </div>
                <div style={{display:'flex',gap:12,justifyContent:'flex-end'}}>
                    <button type="button" className="btn btn-ghost" onClick={onClose}>Cancel</button>
                    <button type="submit" className="btn btn-primary" disabled={loading}>{loading ? <div className="spinner"/> : 'Create Account'}</button>
                </div>
            </form>
        </Modal>
    );
};

// ============ CLINIC DETAIL PAGE ============
const ClinicDetailPage = ({ clinicId, onBack }) => {
    const [clinic, setClinic] = useState(null);
    const [staff, setStaff] = useState([]);
    const [loading, setLoading] = useState(true);
    const [showAddUser, setShowAddUser] = useState(false);
    const [tab, setTab] = useState('overview');

    const loadClinic = () => {
        setLoading(true);
        Promise.all([
            apiFetch(`/admin/clinics/${clinicId}`),
            apiFetch(`/admin/clinics/${clinicId}/users`)
        ]).then(([clinicData, staffData]) => {
            setClinic(clinicData);
            setStaff(staffData);
        }).catch(console.error).finally(() => setLoading(false));
    };
    useEffect(loadClinic, [clinicId]);

    const toggleActive = async () => {
        if (!clinic) return;
        try {
            await apiFetch(`/admin/clinics/${clinicId}`, { method: 'PATCH', body: { is_active: !clinic.is_active } });
            loadClinic();
        } catch (err) { alert(err.message); }
    };

    const toggleLeaderboard = async () => {
        if (!clinic) return;
        try {
            await apiFetch(`/admin/clinics/${clinicId}`, { method: 'PATCH', body: { leaderboard_visible: !clinic.leaderboard_visible } });
            loadClinic();
        } catch (err) { alert(err.message); }
    };

    const toggleUserActive = async (userId, currentActive) => {
        try {
            await apiFetch(`/admin/clinics/${clinicId}/users/${userId}`, { method: 'PATCH', body: { is_active: !currentActive } });
            loadClinic();
        } catch (err) { alert(err.message); }
    };

    if (loading) return <div style={{display:'flex',justifyContent:'center',padding:80}}><div className="spinner" style={{width:32,height:32}}/></div>;
    if (!clinic) return <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>Clinic not found</div>;

    const detailTabs = ['overview','staff','settings'];

    return (
        <div className="fade-in">
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
                <button className="btn btn-ghost btn-sm" onClick={onBack}>{Icons.back} Back</button>
                <div style={{flex:1}}>
                    <div className="section-title">{clinic.name}</div>
                    <div style={{display:'flex',gap:8,marginTop:6,flexWrap:'wrap'}}>
                        <span className={`badge ${clinic.is_active ? 'badge-green' : 'badge-red'}`}>{clinic.is_active ? 'Active' : 'Inactive'}</span>
                        {clinic.city && <span className="badge badge-blue">{clinic.city}</span>}
                        {clinic.specialty && <span className="badge badge-accent">{clinic.specialty}</span>}
                    </div>
                </div>
            </div>

            {/* Tab Nav */}
            <div style={{display:'flex',gap:2,marginBottom:24,borderBottom:'1px solid var(--border)'}}>
                {detailTabs.map(t => (
                    <button key={t} onClick={() => setTab(t)} style={{
                        padding:'10px 20px',fontSize:13,fontWeight:600,cursor:'pointer',transition:'all 0.2s',
                        color: tab === t ? 'var(--orange)' : 'var(--text-muted)',
                        background:'transparent',
                        border:'none',borderBottom: tab === t ? '2px solid var(--orange)' : '2px solid transparent',fontFamily:'inherit',
                        borderRadius:0
                    }}>{t.charAt(0).toUpperCase() + t.slice(1)}</button>
                ))}
            </div>

            {/* Overview Tab */}
            {tab === 'overview' && (
                <div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))',gap:16,marginBottom:24}}>
                        <StatCard label="Total Staff" value={clinic.staff?.length || staff.length} color="var(--info)"/>
                        <StatCard label="Total Calls" value={clinic.total_calls || 0} color="var(--accent)"/>
                        <StatCard label="Avg Score" value={clinic.avg_score ? clinic.avg_score.toFixed(1) : 'N/A'} color="var(--success)"/>
                    </div>
                    {clinic.staff && clinic.staff.length > 0 && (
                        <div className="card" style={{padding:24}}>
                            <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Agent Performance</div>
                            <div style={{display:'grid',gap:12,gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))'}}>
                                {clinic.staff.map(s => (
                                    <div key={s.user_id} className="card-elevated" style={{borderRadius:10,padding:16}}>
                                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                            <div>
                                                <div style={{fontWeight:600,fontSize:14}}>{s.name}</div>
                                                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{s.role} | {s.total_calls} calls</div>
                                            </div>
                                            <div style={{fontSize:22,fontWeight:800,color: s.avg_score >= 70 ? 'var(--success)' : s.avg_score >= 50 ? 'var(--warning)' : 'var(--danger)'}}>
                                                {s.avg_score ? s.avg_score.toFixed(1) : '-'}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            )}

            {/* Staff Tab */}
            {tab === 'staff' && (
                <div>
                    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
                        <button className="btn btn-primary btn-sm" onClick={() => setShowAddUser(true)}>{Icons.plus} Add Staff</button>
                    </div>
                    <div className="card" style={{overflow:'hidden'}}>
                        <table style={{width:'100%',borderCollapse:'collapse'}}>
                            <thead>
                                <tr style={{borderBottom:'1px solid var(--border)'}}>
                                    <th className="th-cell">Name</th>
                                    <th className="th-cell">Email</th>
                                    <th className="th-cell" style={{textAlign:'center'}}>Role</th>
                                    <th className="th-cell" style={{textAlign:'center'}}>Status</th>
                                    <th className="th-cell" style={{textAlign:'center'}}>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {staff.map(u => (
                                    <tr key={u.id} className="table-row" style={{borderBottom:'1px solid var(--border)'}}>
                                        <td className="td-cell" style={{fontWeight:600,fontSize:14}}>{u.full_name}</td>
                                        <td className="td-cell" style={{fontSize:13,color:'var(--text-secondary)'}}>{u.email}</td>
                                        <td className="td-cell" style={{textAlign:'center'}}><span className={`badge ${u.role === 'admin' ? 'badge-orange' : u.role === 'manager' ? 'badge-blue' : 'badge-gray'}`}>{u.role}</span></td>
                                        <td className="td-cell" style={{textAlign:'center'}}><span className={`badge ${u.is_active ? 'badge-green' : 'badge-red'}`}>{u.is_active ? 'Active' : 'Inactive'}</span></td>
                                        <td className="td-cell" style={{textAlign:'center'}}>
                                            <button className={`btn btn-xs ${u.is_active ? 'btn-danger' : 'btn-success'}`} onClick={() => toggleUserActive(u.id, u.is_active)}>
                                                {u.is_active ? 'Deactivate' : 'Activate'}
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                                {staff.length === 0 && (
                                    <tr><td colSpan={5} style={{padding:40,textAlign:'center',color:'var(--text-muted)',fontSize:14}}>No staff members yet.</td></tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                    {showAddUser && <AddUserModal clinicId={clinicId} onClose={() => setShowAddUser(false)} onCreated={() => { setShowAddUser(false); loadClinic(); }}/>}
                </div>
            )}

            {/* Settings Tab */}
            {tab === 'settings' && (
                <div className="card" style={{padding:24}}>
                    <div style={{fontSize:16,fontWeight:700,marginBottom:24}}>Clinic Settings</div>
                    <div style={{display:'flex',flexDirection:'column',gap:0}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 0',borderBottom:'1px solid var(--border)'}}>
                            <div>
                                <div style={{fontWeight:600,fontSize:14}}>Clinic Status</div>
                                <div style={{fontSize:12,color:'var(--text-muted)',marginTop:3}}>Active clinics can log in and use the platform.</div>
                            </div>
                            <Toggle value={clinic.is_active} onChange={toggleActive} label={clinic.is_active ? 'Active' : 'Inactive'}/>
                        </div>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'18px 0',borderBottom:'1px solid var(--border)'}}>
                            <div>
                                <div style={{fontWeight:600,fontSize:14}}>Leaderboard Visibility</div>
                                <div style={{fontSize:12,color:'var(--text-muted)',marginTop:3}}>When hidden, agents cannot see the leaderboard.</div>
                            </div>
                            <Toggle value={clinic.leaderboard_visible} onChange={toggleLeaderboard} label={clinic.leaderboard_visible ? 'Visible' : 'Hidden'}/>
                        </div>
                        <div style={{padding:'18px 0'}}>
                            <div style={{fontWeight:600,fontSize:14,marginBottom:12}}>Clinic Details</div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:13}}>
                                <div><span style={{color:'var(--text-muted)'}}>Phone:</span> <span style={{color:'var(--text-secondary)',fontWeight:500}}>{clinic.phone || 'Not set'}</span></div>
                                <div><span style={{color:'var(--text-muted)'}}>Email:</span> <span style={{color:'var(--text-secondary)',fontWeight:500}}>{clinic.email || 'Not set'}</span></div>
                                <div><span style={{color:'var(--text-muted)'}}>City:</span> <span style={{color:'var(--text-secondary)',fontWeight:500}}>{clinic.city || 'Not set'}</span></div>
                                <div><span style={{color:'var(--text-muted)'}}>Specialty:</span> <span style={{color:'var(--text-secondary)',fontWeight:500}}>{clinic.specialty || 'Not set'}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

// ============ ADD USER MODAL ============
const AddUserModal = ({ clinicId, onClose, onCreated }) => {
    const [form, setForm] = useState({ full_name:'', email:'', password:'', role:'agent' });
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');

    const handleSubmit = async (e) => {
        e.preventDefault(); setError(''); setLoading(true);
        try {
            await apiFetch(`/admin/clinics/${clinicId}/users`, { method: 'POST', body: form });
            onCreated();
        } catch (err) { setError(err.message); } finally { setLoading(false); }
    };

    return (
        <Modal onClose={onClose}>
            <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>Add Staff Member</h2>
            <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:24}}>Add a new user to this clinic.</p>
            {error && <div style={{padding:'10px 14px',borderRadius:8,background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',color:'#EF4444',fontSize:13,marginBottom:16}}>{error}</div>}
            <form onSubmit={handleSubmit}>
                <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:24}}>
                    <input className="input" placeholder="Full Name *" value={form.full_name} onChange={e => setForm({...form, full_name: e.target.value})} required/>
                    <input className="input" type="email" placeholder="Email *" value={form.email} onChange={e => setForm({...form, email: e.target.value})} required/>
                    <input className="input" type="password" placeholder="Password *" value={form.password} onChange={e => setForm({...form, password: e.target.value})} required/>
                    <select className="input" value={form.role} onChange={e => setForm({...form, role: e.target.value})}>
                        <option value="agent">Agent</option>
                        <option value="manager">Manager</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div style={{display:'flex',gap:12,justifyContent:'flex-end'}}>
                    <button type="button" className="btn btn-ghost" onClick={onClose}>Cancel</button>
                    <button type="submit" className="btn btn-primary" disabled={loading}>{loading ? <div className="spinner"/> : 'Add User'}</button>
                </div>
            </form>
        </Modal>
    );
};

// ============ PLATFORM ANALYTICS PAGE ============
const AnalyticsPage = () => {
    const [averages, setAverages] = useState(null);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        apiFetch('/admin/analytics/platform-averages').then(setAverages).catch(console.error).finally(() => setLoading(false));
    }, []);

    if (loading) return <div style={{display:'flex',justifyContent:'center',padding:80}}><div className="spinner" style={{width:32,height:32}}/></div>;

    const dims = averages ? [
        { label: 'Greeting', value: averages.greeting },
        { label: 'Discovery', value: averages.discovery },
        { label: 'Presentation', value: averages.presentation },
        { label: 'Objection Handling', value: averages.objection_handling },
        { label: 'Closing', value: averages.closing },
        { label: 'Rapport', value: averages.rapport },
        { label: 'Active Listening', value: averages.active_listening },
        { label: 'Urgency Creation', value: averages.urgency_creation },
        { label: 'Follow-up Setup', value: averages.follow_up_setup },
    ] : [];

    return (
        <div className="fade-in">
            <div className="section-title">Platform Analytics</div>
            <div className="section-desc">Anonymized averages across all clinics. No individual clinic data is exposed here.</div>

            {averages && (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
                    <div className="card" style={{padding:28}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
                            <div>
                                <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Overall Platform Average</div>
                                <div style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.5}}>Based on aggregated scores across all clinics. Use these to benchmark individual clinic performance.</div>
                            </div>
                            <div style={{fontSize:36,fontWeight:800,color: averages.overall >= 70 ? 'var(--success)' : averages.overall ? 'var(--warning)' : 'var(--text-muted)',marginLeft:20}}>
                                {averages.overall ? averages.overall.toFixed(1) : 'N/A'}
                            </div>
                        </div>
                    </div>
                    <div className="card" style={{padding:28}}>
                        <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>Dimension Breakdown</div>
                        {dims.map(d => (
                            <DimensionBar key={d.label} label={d.label} value={d.value}/>
                        ))}
                    </div>
                </div>
            )}
            {!averages && <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>No analytics data available yet.</div>}
        </div>
    );
};

// ============ MAIN APP ============
const App = () => {
    const [authed, setAuthed] = useState(!!getToken());
    const [page, setPage] = useState('dashboard');
    const [selectedClinic, setSelectedClinic] = useState(null);
    const [user, setUser] = useState(null);
    const [sidebarOpen, setSidebarOpen] = useState(false);

    useEffect(() => {
        if (authed) apiFetch('/auth/me').then(u => {
            if (!u.is_super_admin) { clearToken(); setAuthed(false); return; }
            setUser(u);
        }).catch(() => { clearToken(); setAuthed(false); });
    }, [authed]);

    const logout = () => { clearToken(); setAuthed(false); setUser(null); };

    if (!authed) return <AdminLoginPage onLogin={() => setAuthed(true)}/>;

    const navItems = [
        { id: 'dashboard', label: 'Dashboard', icon: Icons.dashboard },
        { id: 'clinics', label: 'Clinic Accounts', icon: Icons.clinics },
        { id: 'analytics', label: 'Platform Analytics', icon: Icons.analytics },
    ];

    const renderPage = () => {
        if (selectedClinic) return <ClinicDetailPage clinicId={selectedClinic} onBack={() => setSelectedClinic(null)}/>;
        switch (page) {
            case 'dashboard': return <DashboardPage/>;
            case 'clinics': return <ClinicsListPage onSelect={id => { setSelectedClinic(id); }}/>;
            case 'analytics': return <AnalyticsPage/>;
            default: return <DashboardPage/>;
        }
    };

    const navTo = (id) => { setPage(id); setSelectedClinic(null); setSidebarOpen(false); };

    return (
        <div style={{display:'flex',minHeight:'100vh',background:'var(--bg-primary)'}}>
            {/* Mobile Header */}
            <div className="mobile-header">
                <button className="hamburger" onClick={() => setSidebarOpen(!sidebarOpen)}>
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <span style={{fontSize:15,fontWeight:800,color:'var(--orange)'}}>SBA Admin</span>
                <div style={{width:24}}/>
            </div>
            {/* Mobile Overlay */}
            <div className={`mobile-overlay ${sidebarOpen ? 'show' : ''}`} onClick={() => setSidebarOpen(false)}/>
            {/* Sidebar */}
            <aside className={`desktop-sidebar ${sidebarOpen ? 'open' : ''}`} style={{width:240,padding:'20px 12px',display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,bottom:0,zIndex:60,background:'var(--bg-secondary)',borderRight:'1px solid var(--border)'}}>
                <div style={{padding:'0 8px',marginBottom:32}}><Logo/></div>
                <nav style={{display:'flex',flexDirection:'column',gap:4,flex:1}}>
                    {navItems.map(item => (
                        <a key={item.id} className={`sidebar-link ${page === item.id && !selectedClinic ? 'active' : ''}`} onClick={() => navTo(item.id)}>
                            {item.icon}<span>{item.label}</span>
                        </a>
                    ))}
                </nav>
                <div style={{padding:'16px 8px',borderTop:'1px solid var(--border)'}}>
                    {user && <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{user.full_name}</div>}
                    <div style={{fontSize:11,color:'var(--orange)',marginBottom:14,fontWeight:600}}>Super Admin</div>
                    <a href="/" style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--text-secondary)',textDecoration:'none',marginBottom:10,padding:'4px 0',transition:'color 0.2s'}}>
                        {Icons.home} <span>Main App</span>
                    </a>
                    <a className="sidebar-link" onClick={logout} style={{color:'var(--danger)',padding:'8px 0',gap:8}}>
                        {Icons.logout}<span>Sign Out</span>
                    </a>
                    <div style={{fontSize:9,color:'var(--text-muted)',textAlign:'center',marginTop:16,letterSpacing:'0.1em',textTransform:'uppercase'}}>Powered by SBA</div>
                </div>
            </aside>
            {/* Main */}
            <main className="main-content" style={{flex:1,marginLeft:240,padding:'32px 40px',maxWidth:1200}}>
                {renderPage()}
            </main>
        </div>
    );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
