<svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Chrome gradient for silhouette and text -->
    <linearGradient id="chromeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C0C4CB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8EAED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F6F8;stop-opacity:1" />
    </linearGradient>

    <!-- Radial gradient for depth on silhouette -->
    <radialGradient id="silhouetteGradient" cx="35%" cy="30%">
      <stop offset="0%" style="stop-color:#F5F6F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0C4CB;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Main group for logo -->
  <g id="logoGroup">
    <!-- Woman profile silhouette with headset -->
    <g id="silhouette">
      <!-- Hair (flowing, organic shape) -->
      <path d="M 50 35 Q 45 30 42 40 Q 40 50 42 65 Q 44 75 50 82 L 50 35"
            fill="url(#silhouetteGradient)" stroke="url(#chromeGradient)" stroke-width="0.5"/>

      <!-- Head -->
      <circle cx="55" cy="55" r="18" fill="url(#silhouetteGradient)" stroke="url(#chromeGradient)" stroke-width="0.5"/>

      <!-- Hair flowing back and down -->
      <path d="M 65 45 Q 75 40 78 50 Q 80 60 78 72 Q 75 82 65 85 Q 63 85 62 80 Q 65 75 65 60 Z"
            fill="url(#silhouetteGradient)" stroke="url(#chromeGradient)" stroke-width="0.5"/>

      <!-- Hair volume on top -->
      <ellipse cx="55" cy="38" rx="16" ry="12" fill="url(#silhouetteGradient)" stroke="url(#chromeGradient)" stroke-width="0.5"/>

      <!-- Neck -->
      <rect x="51" y="70" width="8" height="10" fill="url(#chromeGradient)"/>

      <!-- Shoulders -->
      <path d="M 45 80 L 40 95 Q 42 98 55 100 Q 68 98 70 95 L 65 80 Z"
            fill="url(#silhouetteGradient)" stroke="url(#chromeGradient)" stroke-width="0.5"/>

      <!-- Ear -->
      <ellipse cx="72" cy="55" rx="4" ry="6" fill="url(#silhouetteGradient)" stroke="url(#chromeGradient)" stroke-width="0.5"/>

      <!-- Headset - Left ear cup -->
      <circle cx="70" cy="52" r="6" fill="none" stroke="url(#chromeGradient)" stroke-width="2"/>
      <circle cx="70" cy="52" r="4" fill="none" stroke="url(#chromeGradient)" stroke-width="1.5" opacity="0.7"/>

      <!-- Headset - Boom arm -->
      <path d="M 75 55 Q 85 58 88 68" fill="none" stroke="url(#chromeGradient)" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Headset - Boom tip (microphone) -->
      <circle cx="88" cy="68" r="2.5" fill="url(#chromeGradient)"/>

      <!-- Headset - Headband -->
      <path d="M 70 45 Q 75 38 85 40 Q 90 42 88 52" fill="none" stroke="url(#chromeGradient)" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Headset - Right ear cup -->
      <circle cx="88" cy="48" r="5.5" fill="none" stroke="url(#chromeGradient)" stroke-width="2"/>
      <circle cx="88" cy="48" r="3.5" fill="none" stroke="url(#chromeGradient)" stroke-width="1.5" opacity="0.7"/>
    </g>

    <!-- CallCoach main text -->
    <text x="100" y="125" font-family="Arial, sans-serif" font-size="36" font-weight="bold"
          text-anchor="middle" fill="url(#chromeGradient)" letter-spacing="-1">
      CallCoach
    </text>

    <!-- SKIN BUSINESS ACCELERATOR text -->
    <text x="100" y="152" font-family="Arial, sans-serif" font-size="10" font-weight="600"
          text-anchor="middle" fill="url(#chromeGradient)" letter-spacing="1.2" text-transform="uppercase">
      SKIN BUSINESS ACCELERATOR
    </text>

    <!-- AI SALES TRAINING & CRM text -->
    <text x="100" y="167" font-family="Arial, sans-serif" font-size="8" font-weight="500"
          text-anchor="middle" fill="#8A9099" letter-spacing="0.8" text-transform="uppercase" opacity="0.9">
      AI SALES TRAINING &amp; CRM
    </text>
  </g>
</svg>