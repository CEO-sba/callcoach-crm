<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chromeGradFull" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C0C4CB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A9099;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="faceGlowFull" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#F5F6F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0C4CB;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="headsetGradFull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4D8DE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A9099;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradFull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F6F8;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#E8EAED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0C4CB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Caller silhouette centered at left portion -->
  <g transform="translate(18, 10) scale(1.2)">
    <!-- Hair back volume -->
    <path d="M 28 18 Q 20 15 16 25 Q 13 35 15 50 Q 17 60 25 68 Q 28 70 30 65 Q 25 55 25 40 Q 25 28 28 18 Z"
          fill="url(#faceGlowFull)" opacity="0.9"/>
    <!-- Hair top volume -->
    <ellipse cx="38" cy="20" rx="22" ry="16" fill="url(#faceGlowFull)"/>
    <!-- Head -->
    <circle cx="40" cy="40" r="24" fill="url(#faceGlowFull)"/>
    <!-- Hair flowing right side -->
    <path d="M 52 28 Q 68 22 72 35 Q 75 48 72 60 Q 68 70 58 72 Q 56 70 57 65 Q 62 58 62 42 Q 62 32 52 28 Z"
          fill="url(#faceGlowFull)" opacity="0.9"/>
    <!-- Neck -->
    <rect x="33" y="60" width="14" height="16" rx="3" fill="url(#chromeGradFull)"/>
    <!-- Shoulders -->
    <path d="M 22 72 Q 18 78 14 90 Q 16 96 40 100 Q 64 96 66 90 Q 62 78 58 72 Z"
          fill="url(#faceGlowFull)" stroke="url(#chromeGradFull)" stroke-width="0.5"/>
    <!-- Ear -->
    <ellipse cx="66" cy="40" rx="5" ry="7" fill="url(#faceGlowFull)" stroke="url(#chromeGradFull)" stroke-width="0.5"/>
    <!-- Headset headband -->
    <path d="M 64 30 Q 72 20 82 24 Q 88 28 86 40"
          fill="none" stroke="url(#headsetGradFull)" stroke-width="4" stroke-linecap="round"/>
    <!-- Headset left ear cup -->
    <circle cx="64" cy="38" r="9" fill="none" stroke="url(#headsetGradFull)" stroke-width="3.5"/>
    <circle cx="64" cy="38" r="5.5" fill="none" stroke="url(#headsetGradFull)" stroke-width="2" opacity="0.6"/>
    <!-- Headset right ear cup -->
    <circle cx="86" cy="36" r="8" fill="none" stroke="url(#headsetGradFull)" stroke-width="3.5"/>
    <circle cx="86" cy="36" r="5" fill="none" stroke="url(#headsetGradFull)" stroke-width="2" opacity="0.6"/>
    <!-- Headset boom arm -->
    <path d="M 70 44 Q 82 50 86 62"
          fill="none" stroke="url(#headsetGradFull)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Microphone -->
    <circle cx="86" cy="62" r="4" fill="url(#headsetGradFull)"/>
    <circle cx="86" cy="62" r="2" fill="url(#chromeGradFull)" opacity="0.5"/>
  </g>

  <!-- Text block on the right -->
  <text x="160" y="72" font-family="'Playfair Display', Georgia, serif" font-weight="900" font-size="42" fill="url(#textGradFull)" letter-spacing="-1">CallCoach</text>
  <text x="160" y="98" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#8A9099" letter-spacing="3.5" text-transform="uppercase">SKIN BUSINESS ACCELERATOR</text>
  <text x="160" y="118" font-family="'Inter', sans-serif" font-weight="400" font-size="9.5" fill="#64748B" letter-spacing="2">AI SALES TRAINING &amp; CRM</text>
</svg>
